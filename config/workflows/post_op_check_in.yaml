# Serves EVERY business type. Business-specific facts come from what the
# owner taught in the Database tab — never from assumptions in these prompts.
id: post_op_check_in
name: "After-the-Job Check-In"
description: "Follow-up for customers whose job or service has started, to make sure everything's going well and build loyalty."
version: 2

target:
  patient_status: "treatment_started"

objective: |
  Check in with the customer after their job or service has begun. Make sure
  everything is going as expected, answer questions using only what the
  business taught you, and build long-term loyalty. Flag any complaint or
  problem to the owner immediately — do not attempt to resolve issues you
  weren't taught about.

voice:
  warmth: high
  formality: low
  audience: "a customer whose job or service is underway or recently finished"
  forbidden_phrases:
    - "as per our last message"
    - "per our records"

cadence:
  - day: 3
    channel: sms
    intent: "Quick check-in — how is everything going since the work started? Any questions?"
  - day: 7
    channel: sms
    intent: "Ask if everything is holding up / going smoothly. If the owner taught relevant care or usage tips, share one."
  - day: 14
    channel: email
    intent: "Warm wrap-up. Thank them for their business, invite them to reach out anytime, and mention any next step the owner taught (maintenance, follow-up visit, review)."

escalation:
  - trigger: "customer reports a problem, defect, or complaint with the work"
    action: "flag immediately for the owner; do not attempt to advise"
  - trigger: "customer wants to cancel or pause the job"
    action: "flag for the owner; send reassurance that someone will call"

knowledge_required:
  - practice_name
  - doctor_name
  - office_phone
  - office_hours

success_metric:
  primary: "customer stays happy through the job and comes back for the next one"
