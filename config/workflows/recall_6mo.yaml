# Serves EVERY business type. Business-specific facts come from what the
# owner taught in the Database tab — never from assumptions in these prompts.
id: recall_6mo
name: "Time-to-Come-Back Reminder"
description: "Re-engagement campaign for customers due for their next visit, service, or maintenance."
version: 2

target:
  patient_status: "recall_due"

objective: |
  Re-engage customers who are due for their next appointment, service, or
  maintenance (a cleaning, a tune-up, a seasonal service — whatever this
  business does on a repeat cycle). Make booking easy and handle hesitation
  gently. ONLY mention prices or offers the business actually taught you.
  Keep it brief and friendly.

voice:
  warmth: medium
  formality: medium
  audience: "an existing customer due for a repeat visit or service"
  forbidden_phrases:
    - "you're overdue"
    - "you missed"
    - "you haven't been in"

cadence:
  - day: 1
    channel: sms
    intent: "Friendly reminder that it's about time for their next visit/service. Make booking easy with the business's phone number."
  - day: 7
    channel: email
    intent: "Follow up if no response. Mention the value of staying on schedule for this kind of service. Offer flexible times."
  - day: 14
    channel: sms
    intent: "Final nudge. Keep it short. Offer to handle scheduling with one reply."

escalation:
  - trigger: "customer says they've moved or switched providers"
    action: "stop campaign, update customer record, flag for the owner"
  - trigger: "customer reports a problem or urgent issue"
    action: "flag for the owner immediately"

knowledge_required:
  - practice_name
  - doctor_name
  - office_phone
  - office_hours

success_metric:
  primary: "next appointment booked within 21 days of campaign start"
