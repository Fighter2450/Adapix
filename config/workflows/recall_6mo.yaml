id: recall_6mo
name: "6-Month Recall Reminder"
description: "Re-engagement campaign for patients due for a recall or follow-up visit."
version: 1

target:
  patient_status: "recall_due"

objective: |
  Re-engage patients who are due for a recall appointment. Make scheduling easy,
  remind them of the importance of regular check-ups, and handle any hesitation
  around cost or scheduling. Keep it brief and friendly.

voice:
  warmth: medium
  formality: medium
  audience: "existing patient or their parent"
  forbidden_phrases:
    - "you're overdue"
    - "you missed"
    - "you haven't been in"

cadence:
  - day: 1
    channel: sms
    intent: "Friendly reminder that it's time for their recall visit. Make booking easy with a link or phone number."
  - day: 7
    channel: email
    intent: "Follow up if no response. Mention the value of staying on schedule. Offer flexible times."
  - day: 14
    channel: sms
    intent: "Final nudge. Keep it short. Offer to handle scheduling with one reply."

escalation:
  - trigger: "patient says they've moved or switched providers"
    action: "stop campaign, update patient record, flag for office"
  - trigger: "patient reports a dental concern or pain"
    action: "flag for clinical staff immediately"

knowledge_required:
  - practice_name
  - doctor_name
  - office_phone
  - office_hours

success_metric:
  primary: "recall appointment booked within 21 days of campaign start"
