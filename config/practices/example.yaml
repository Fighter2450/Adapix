# Example practice configuration.
# Copy to <practice_id>.yaml for each real practice and fill in real values.

id: example
name: "Steel City Orthodontics"
doctor_name: "Dr. Sarah Bennett"
office_phone: "(412) 555-0142"
office_hours: "Monday-Thursday 8am-5pm, Friday 8am-2pm"
typical_treatment_duration: "18-24 months for braces, 12-18 months for clear aligners"

