<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Adapix</title>
<meta name="theme-color" content="#1a1a1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Adapix" />
<link rel="manifest" href="/app/manifest.json" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link rel="apple-touch-icon" href="/app/icon-192.png" />
<link rel="icon" href="/app/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ADAPIX DARK WARM — design system
   Canvas #1a1a1a · Sidebar #141414 · Cards #222 · Accent #7c6aff
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ===== VIBRANT — neon purple + rose on deep indigo ===== */
  --bg:#0b0b1c;
  --bg-2:#17142e;
  --bg-3:#211c3d;
  --sidebar-bg:#0c0a1d;
  --border:rgba(124,58,237,.18);
  --border-2:rgba(255,255,255,.05);
  --ink:#ece9ff;
  --ink-2:#b8b2e0;
  --ink-3:#827aa8;
  /* Keep old names — used in inline styles throughout render functions */
  --cyan:#a78bfa;
  --cyan-2:#7c3aed;
  --good:#34d399;
  --hot:#f43f5e;
  --warn:#fbbf24;
  --slate:#9ca3af;
  --slate-2:#b0b7c0;
  --slate-3:#9ca3af;
  /* Vibrant accent spectrum */
  --v-purple:#7c3aed;
  --v-violet:#a78bfa;
  --v-rose:#f43f5e;
  --v-pink:#f472b6;
  --v-cyan:#22d3ee;
  --v-lime:#a3e635;
  --v-amber:#fbbf24;
  --grad-brand:linear-gradient(135deg,#7c3aed,#a78bfa,#22d3ee);
  --grad-hot:linear-gradient(135deg,#f43f5e,#f472b6);
}

html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;overflow:hidden}

/* ---- Shell layout ---- */
.shell{display:grid;grid-template-columns:200px minmax(0,1fr);height:100vh}
.main{overflow-y:auto;padding:28px 32px;background:var(--bg);min-height:0}
@media(max-width:768px){
  .shell{grid-template-columns:1fr}
  /* !important: the base .sidebar{display:flex} is declared later in the
     sheet and would otherwise win the cascade at equal specificity. */
  .sidebar{display:none!important}
  body{overflow:auto}
  .main{height:calc(100vh - 56px);padding:20px 16px}
}

/* ---- Sidebar ---- */
.sidebar{
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
  position:sticky;top:0;
}
.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-mark{
  width:30px;height:30px;flex-shrink:0;object-fit:contain;
}
.sidebar-wordmark{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.sidebar-section{flex:1;padding:10px 10px 0;overflow-y:auto}
.sidebar-bottom{padding:10px 10px 16px;border-top:1px solid var(--border);flex-shrink:0}

/* ---- Sidebar nav items ---- */
.nav-item{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 10px;border-radius:8px;
  background:none;border:none;cursor:pointer;
  color:var(--ink-3);font-size:13.5px;font-weight:500;font-family:inherit;
  text-align:left;position:relative;
  transition:background .12s,color .12s;
  margin-bottom:2px;
}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--ink-2)}
.nav-item.on{
  background:rgba(124,106,255,.12);
  border-left:2px solid #7c6aff;
  color:#a78bfa;
  padding-left:8px;
}
.nav-item i{width:16px;height:16px;flex-shrink:0}
.nav-item span{flex:1}
.nav-badge{
  background:#f87171;color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:10px;
  min-width:18px;text-align:center;
  display:none;
}
.nav-badge.hot{background:#f87171}
.sidebar-run-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:8px 10px;border-radius:8px;
  background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.2);
  color:#a78bfa;font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;margin-top:4px;transition:background .12s;
}
.sidebar-run-btn:hover{background:rgba(124,106,255,.18)}
.sidebar-run-btn i{width:14px;height:14px;flex-shrink:0}

/* ---- Mobile bottom nav ---- */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--sidebar-bg);
  border-top:1px solid var(--border);
  height:56px;z-index:100;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.mobile-nav::-webkit-scrollbar{display:none}
.mobile-nav button{
  flex:0 0 68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;color:var(--ink-3);font-size:10px;font-family:inherit;cursor:pointer;
  height:100%;transition:color .12s;padding:0;white-space:nowrap;
}
.mobile-nav button.on{color:#a78bfa}
.mobile-nav button i{width:18px;height:18px}
@media(max-width:768px){
  .mobile-nav{display:flex}
}

/* ---- Push-notification prompt ---- */
.push-prompt{
  position:fixed;right:20px;bottom:76px;z-index:120;max-width:320px;
  background:linear-gradient(135deg,rgba(124,58,237,.16),rgba(34,211,238,.08)),#17142e;
  border:1px solid rgba(124,58,237,.35);border-radius:16px;padding:16px 18px;
  box-shadow:0 18px 50px rgba(0,0,0,.5);
}
.push-prompt b{color:#fff;font-size:14px;display:block;margin-bottom:4px}
.push-prompt p{font-size:12.5px;color:var(--ink-2);margin:0 0 12px;line-height:1.5}
.push-prompt .row{display:flex;gap:8px}
.push-prompt button{font-family:inherit;font-size:12.5px;font-weight:700;border-radius:9px;padding:8px 14px;cursor:pointer}
.push-prompt .yes{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:0}
.push-prompt .no{background:none;border:1px solid var(--border);color:var(--ink-3)}
@media(max-width:768px){.push-prompt{right:12px;left:12px;bottom:70px;max-width:none}}

/* ---- Toast ---- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#2d2d2d;color:var(--ink);border:1px solid var(--border);
  border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;z-index:9999;transition:opacity .2s,transform .2s;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#3d1f1f;border-color:rgba(248,113,113,.3);color:#f87171}

/* ---- Loader ---- */
.loader{padding:48px 24px;text-align:center;color:var(--ink-3);font-size:13px}

/* ---- Section eyebrow ---- */
.section-eyebrow{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ink-3);margin-bottom:16px;
}

/* ---- Row cards (queue, contacts list, settings list) ---- */
.rows{display:flex;flex-direction:column;gap:8px}
.row-card{
  display:flex;align-items:center;gap:12px;
  background:var(--bg-2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;transition:background .12s;
}
.row-card:hover{background:#282828}
.row-card.hot{border-color:rgba(248,113,113,.25)}
.row-card .text{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.row-card .text b{color:var(--ink);font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-card .text span{color:var(--ink-3);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{
  font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,.06);color:var(--ink-3);white-space:nowrap;flex-shrink:0;
}
.pill.hot{background:rgba(248,113,113,.12);color:#f87171}

/* ---- Buttons ---- */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:9px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;transition:filter .12s;
}
.btn-primary{background:#7c6aff;color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--ink-2);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.09)}

/* ---- Fail state ---- */
.fail{padding:32px 24px;color:var(--hot);text-align:center;font-size:13px}

/* ================================================================
   INBOX VIEW (formerly queue)
   ================================================================ */
.hero-card{
  background:var(--bg-2);border:1px solid var(--border);
  border-radius:12px;padding:20px;margin-bottom:20px;
}
.hero-card.alert{border-color:rgba(248,113,113,.25)}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hero-pill{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--ink-3)}
.hero-pill.ok{color:#4ade80}
.hero-pill.alert{color:#f87171}
.hero-pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.hero-pill.ok .hero-pill-dot{box-shadow:0 0 6px #4ade80}
.hero-pill.alert .hero-pill-dot{animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero-updated{font-size:11px;color:var(--ink-3)}
.hero-body{display:flex;align-items:flex-start;gap:14px}
.hero-icon{
  width:40px;height:40px;border-radius:10px;
  background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.2);
  display:flex;align-items:center;justify-content:center;color:#a78bfa;flex-shrink:0;
}
.hero-card.alert .hero-icon{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.2);color:#f87171}
.hero-text h2{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:5px;line-height:1.3}
.hero-text p{font-size:13px;color:var(--ink-2);line-height:1.6}
.hero-text .hl{color:#a78bfa;font-weight:600}
.esc-callout{
  display:flex;align-items:flex-start;gap:10px;margin-top:14px;padding:12px 14px;
  background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:9px;
}
.esc-callout-body{display:flex;flex-direction:column;gap:4px;font-size:12.5px}
.esc-callout-body strong{color:#f87171}
.esc-callout-body span{color:var(--ink-3)}
.esc-cta{
  display:inline-flex;align-items:center;gap:5px;margin-top:6px;
  padding:5px 10px;border-radius:7px;
  background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.25);
  color:#f87171;font-size:12px;font-weight:600;cursor:pointer;border-style:solid;font-family:inherit;
}

/* ================================================================
   RESULTS VIEW (formerly home stats+activity)
   ================================================================ */
.home-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.home-stat-card{
  background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:16px;
}
.home-stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:8px}
.home-stat-val{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-.02em;margin-bottom:4px}
.home-stat-val.cyan{color:#7c6aff}
.home-stat-val.green{color:#4ade80}
.home-stat-sub{font-size:12px;color:var(--ink-3)}
.home-chart-card{background:var(--bg-2);border:1px solid var(--border);border-radius:16px;padding:18px 20px 12px;margin:14px 0 22px}
.home-chart-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.home-chart-title{font-size:13px;font-weight:700;color:var(--ink-2);letter-spacing:.04em;text-transform:uppercase}
.home-chart-legend{display:flex;gap:16px;font-size:12.5px;color:var(--ink-2)}
.home-chart-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.home-chart{position:relative}
.home-chart svg{display:block;width:100%;height:170px}
.home-chart .grid{stroke:rgba(124,58,237,.12);stroke-width:1}
.home-chart .axis-lab{fill:var(--ink-3);font-size:10.5px}
.home-chart-tip{position:absolute;pointer-events:none;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:8px 11px;font-size:12.5px;color:var(--ink-2);display:none;white-space:nowrap;z-index:5;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.home-chart-tip b{color:var(--ink)}
.home-chart-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-3)}
.activity-meta{font-size:11px;color:var(--ink-3)}
.activity-feed{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.activity-empty{padding:32px 24px;text-align:center;color:var(--ink-3);font-size:13px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px}
.activity-row{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
  transition:background .1s;
}
.activity-row:hover{background:#252525}
.activity-icon{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);flex-shrink:0;
}
.activity-icon i{width:13px;height:13px}
.activity-escalation .activity-icon,.activity-emergency .activity-icon,.activity-call_failed .activity-icon{background:rgba(248,113,113,.1);color:#f87171}
.activity-sent .activity-icon,.activity-call_placed .activity-icon,.activity-call_plan .activity-icon{background:rgba(124,106,255,.1);color:#a78bfa}
.activity-reply .activity-icon,.activity-call_outcome .activity-icon{background:rgba(74,222,128,.1);color:#4ade80}
.activity-body{flex:1;min-width:0}
.activity-label{font-size:13px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activity-preview{font-size:12px;color:var(--ink-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activity-ts{font-size:11px;color:var(--ink-3);flex-shrink:0}

.call-recording{padding-left:38px}
.call-recording audio{filter:invert(1) grayscale(1) contrast(0.9);border-radius:6px}
.call-transcript-toggle{
  background:none;border:none;color:var(--cyan-2);font-size:12px;font-weight:600;
  cursor:pointer;padding:6px 0 0;font-family:inherit;
}
.call-transcript-toggle:hover{text-decoration:underline}
.call-transcript{
  margin-top:6px;padding:10px 12px;background:var(--bg-3);border:1px solid var(--border);
  border-radius:8px;font-size:12px;color:var(--ink-2);line-height:1.6;
  white-space:pre-wrap;max-height:220px;overflow-y:auto;
}

/* ================================================================
   CONTACTS (patients) VIEW
   ================================================================ */
.empty-row{background:var(--bg-2);border:1px solid var(--border);border-radius:10px}

/* CSV import */
.ci-dropzone{
  border:2px dashed rgba(255,255,255,.12);border-radius:10px;
  padding:40px 24px;text-align:center;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.ci-dropzone.drag-over{border-color:#7c6aff;background:rgba(124,106,255,.06)}
.ci-table{width:100%;border-collapse:collapse;font-size:12px}
.ci-table th{
  text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-3);padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap;
}
.ci-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--ink-2);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.ci-table tr:last-child td{border-bottom:none}
.ci-table tr:hover td{background:rgba(255,255,255,.02)}
.ci-success-icon{font-size:56px;margin-bottom:16px;line-height:1}

/* ================================================================
   SETTINGS view cards & forms
   ================================================================ */
.scard{
  background:var(--bg-2);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin-bottom:14px;
}
.scard-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:16px}
.spage-back{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--ink-3);font-size:13px;font-family:inherit;
  cursor:pointer;padding:0;margin-bottom:20px;transition:color .12s;
}
.spage-back:hover{color:var(--ink-2)}
.spage-back i{width:14px;height:14px}
.spage-head{margin-bottom:20px}
.spage-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px}
.spage-sub{font-size:13px;color:var(--ink-2);line-height:1.55}
.sform-row{margin-bottom:14px}
.sform-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sform-2col[hidden]{display:none}
.sform-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:6px}
.sform-input,.sform-select{
  width:100%;padding:10px 12px;background:var(--bg-3);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:var(--ink);font-size:13px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
.sform-input:focus,.sform-select:focus{border-color:#7c6aff}
textarea.sform-input{resize:vertical}
.sform-hint{font-size:11px;color:var(--ink-3);margin-top:5px;line-height:1.4}
.sform-save{
  padding:10px 20px;background:#7c6aff;color:#fff;border:none;border-radius:9px;
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:filter .12s;
}
.sform-save:hover{filter:brightness(1.1)}
.rp-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.sch-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-2)}
.sch-row:last-child{border-bottom:none}
.sch-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex-shrink:0}
.sch-body{flex:1}
.sch-name{font-size:13px;font-weight:600;color:var(--ink)}
.sch-val{font-size:12px;color:var(--ink-3)}
.sch-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(74,222,128,.1);color:#4ade80;flex-shrink:0}
.sch-badge.off{background:rgba(255,255,255,.05);color:var(--ink-3)}
.sch-connect{padding:6px 12px;border-radius:7px;background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.2);color:#a78bfa;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;flex-shrink:0}
.stoggle-row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid var(--border-2)}
.stoggle-row:last-child{border-bottom:none}
.stoggle-body{flex:1}
.stoggle-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.stoggle-hint{font-size:12px;color:var(--ink-3)}
.stoggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.stoggle input{opacity:0;width:0;height:0;position:absolute}
.stoggle-track{
  position:absolute;inset:0;border-radius:10px;background:rgba(255,255,255,.1);
  cursor:pointer;transition:background .2s;
}
.stoggle-track::after{
  content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;
  border-radius:8px;background:#fff;transition:transform .2s;
}
.stoggle input:checked ~ .stoggle-track{background:#7c6aff}
.stoggle input:checked ~ .stoggle-track::after{transform:translateX(16px)}
.stone-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.stone-opt{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--ink-2);font-size:13px;font-family:inherit;cursor:pointer;transition:all .12s}
.stone-opt.active{border-color:#7c6aff;background:rgba(124,106,255,.12);color:#a78bfa}
.splan-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(74,222,128,.1);color:#4ade80;margin-left:8px}
.mtabs{display:flex;gap:8px;margin-bottom:16px}

.station-row{

.st-status{

.st-status .st-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.st-status.boarding .st-dot{animation:blink 1.2s ease-in-out infinite}

.st-status.departing .st-dot{animation:blink 1.2s ease-in-out infinite}
.st-status.departed{color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2)}
.st-status.delayed{color:#fda4af;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25)}
.st-status.cancelled{color:var(--ink-3);background:rgba(255,255,255,.03);border:1px solid var(--border-2)}
.st-status.scheduled{color:#a78bfa;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.22)}
.station-empty{padding:28px 18px;text-align:center;font-size:13px;color:var(--ink-3)}
.st-status-wrap{display:inline-flex;align-items:center;gap:6px;justify-self:end}
.st-cancel{

}
.smember-row{display:flex;align-items:center;gap:12px;padding:8px 0}

.smember-name{font-size:13px;font-weight:600;color:var(--ink)}
.smember-role{font-size:12px;color:var(--ink-3)}
.sdanger-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(248,113,113,.25);background:rgba(248,113,113,.06);color:#f87171;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}

.stype-cat{font-size:11px;color:var(--ink-3)}
.stype-examples-hd{padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);border-bottom:1px solid var(--border)}

.stype-selected{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(124,106,255,.08);border:1px solid rgba(124,106,255,.2);border-radius:8px;margin-top:6px}

.stype-selected-cat{font-size:11px;color:var(--ink-3)}

.team-hero-title{font-size:22px;font-weight:800;color:var(--ink);margin-bottom:8px;letter-spacing:-.02em}

}

.agent-empty-thread p{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:18px}

.agent-empty-chip{
  padding:7px 12px;border-radius:8px;background:rgba(255,255,255,.05);

}
.agent-empty-chip:hover{background:rgba(124,106,255,.1);border-color:rgba(124,106,255,.25);color:#a78bfa}
.agent-chat-composer{
  border-top:1px solid var(--border);background:var(--sidebar-bg);

}

.agent-chat-input{
  flex:1;background:var(--bg-3);border:1px solid var(--border);
  border-radius:10px;color:var(--ink);font-size:14px;font-family:inherit;
  padding:10px 14px;resize:none;outline:none;line-height:1.5;max-height:120px;
  transition:border-color .15s;
}

.agent-chat-send,.chat-attach-btn,.chat-mic-btn{
  width:36px;height:36px;border-radius:9px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .12s;
}

.agent-chat-send:hover{background:#6b5be6}
.agent-chat-send svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chat-attach-btn,.chat-mic-btn{background:rgba(255,255,255,.05);color:var(--ink-3)}
.chat-attach-btn:hover,.chat-mic-btn:hover{background:rgba(255,255,255,.09)}

.chat-mic-btn[data-state="listening"]{background:rgba(248,113,113,.15);color:#f87171}
.chat-file-preview-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chat-file-chip{
  display:inline-flex;align-items:center;gap:6px;

}

.chat-file-chip-remove svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.chat-attachment-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-3);margin-top:5px}
.chat-attachment-badge svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.bubble-wrap{display:flex;flex-direction:column;gap:4px;max-width:75%}
.bubble-wrap.user{align-self:flex-end;align-items:flex-end}
.bubble-wrap.agent{align-self:flex-start;align-items:flex-start}
.bubble{padding:11px 14px;border-radius:12px;font-size:14px;line-height:1.6;word-break:break-word}
.bubble.user{background:#7c6aff;color:#fff;border-bottom-right-radius:4px}
.bubble.agent{background:var(--bg-2);color:var(--ink);border-bottom-left-radius:4px;border:1px solid var(--border)}
.bubble.agent p{margin:0 0 8px}
.bubble.agent p:last-child{margin-bottom:0}

.typing{display:flex;gap:4px;align-items:center;padding:11px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;width:fit-content}
.typing span{width:6px;height:6px;border-radius:3px;background:var(--ink-3);animation:typingBounce .9s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}

.tools-used-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}

  width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--ink-3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.auto-icon-btn:hover{background:rgba(255,255,255,.08);color:var(--ink)}
.auto-icon-btn.del:hover{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.25);color:#f87171}
.auto-icon-btn:disabled{opacity:.4;cursor:default}
.auto-pause-ghost{
  padding:5px 12px;border-radius:7px;border:1px solid var(--border);
  background:none;color:var(--ink-3);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:all .12s;
}
.auto-pause-ghost:hover{border-color:rgba(124,106,255,.3);color:#a78bfa}
.auto-pause-ghost.resume{color:#4ade80;border-color:rgba(74,222,128,.25)}
.auto-del-confirm{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2)}
.confirm-yes{padding:5px 10px;border-radius:7px;background:#f87171;border:none;color:#fff;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.confirm-no{padding:5px 10px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--ink-2);font-size:12px;font-family:inherit;cursor:pointer}
.auto-modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.auto-modal{
  background:#1e1e1e;border:1px solid var(--border);border-radius:14px;
  padding:28px;width:100%;max-width:520px;
}
.auto-modal h2{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:20px}
.auto-field{margin-bottom:16px}
.auto-field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:7px}
.auto-field input,.auto-field textarea,.auto-field select{
  width:100%;padding:10px 12px;background:var(--bg-3);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:var(--ink);font-size:13px;font-family:inherit;outline:none;
}
.auto-field input:focus,.auto-field textarea:focus,.auto-field select:focus{border-color:#7c6aff}
.am-presets{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.am-preset{
  padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--ink-2);font-size:12.5px;font-family:inherit;
  cursor:pointer;text-align:center;transition:all .12s;
}
.am-preset:hover{border-color:rgba(124,106,255,.3);color:#a78bfa}
.am-preset.selected{border-color:#7c6aff;background:rgba(124,106,255,.12);color:#a78bfa}
.am-preset.full-width{grid-column:span 2}
.am-time-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.am-time-row input,.am-time-row select{width:auto}
.am-time-label{font-size:13px;color:var(--ink-3)}
.am-custom-cron{display:none;margin-top:8px}
.am-custom-cron.visible{display:block}
.auto-modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

/* ================================================================
   VOICE OVERLAY
   ================================================================ */
.voice-overlay{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#1e1e1e;border:1px solid rgba(124,106,255,.3);border-radius:14px;
  padding:18px 24px;display:flex;align-items:center;gap:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:600;
}
.voice-overlay[hidden]{display:none}
.voice-waveform{display:flex;align-items:center;gap:3px;height:24px}
.voice-bar{
  width:3px;border-radius:2px;background:#7c6aff;
  animation:voiceWave .8s ease-in-out infinite;
}
.voice-bar:nth-child(1){animation-delay:0s;height:8px}
.voice-bar:nth-child(2){animation-delay:.1s;height:14px}
.voice-bar:nth-child(3){animation-delay:.2s;height:20px}
.voice-bar:nth-child(4){animation-delay:.1s;height:14px}
.voice-bar:nth-child(5){animation-delay:0s;height:8px}
@keyframes voiceWave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.voice-label{font-size:13px;color:var(--ink-2)}
.voice-stop-btn{
  display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;
  background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.25);
  color:#f87171;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;
}
.voice-stop-btn svg{width:12px;height:12px;fill:currentColor}

/* ================================================================
   VIBRANT ANIMATED SYSTEM — UI/UX Pro Max
   Neon purple + rose on deep indigo · animated gradient orbs,
   glowing glass, shimmer headings, spring micro-interactions.
   ================================================================ */
:root{
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.22,.61,.36,1);
  --dur-fast:150ms; --dur-med:260ms; --dur-slow:420ms;
}

/* ── Keyframes ── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes gradientPan{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes badgePop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.55)}50%{box-shadow:0 0 0 6px rgba(244,63,94,0)}}
@keyframes navSlideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes accentGlow{0%,100%{box-shadow:0 0 14px rgba(124,58,237,.3)}50%{box-shadow:0 0 30px rgba(124,58,237,.6)}}
@keyframes bgFloat{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(0,-16px,0) scale(1.06)}}
@keyframes bgFloat2{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(14px,12px,0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes spinGlow{to{transform:rotate(360deg)}}
@keyframes textShine{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* ── Animated gradient-orb background (fixed, behind everything) ── */
body::before{
  content:'';position:fixed;inset:-10%;z-index:0;pointer-events:none;
  background:
    radial-gradient(620px 620px at 12% 16%, rgba(124,58,237,.22), transparent 60%),
    radial-gradient(520px 520px at 90% 10%, rgba(244,63,94,.14), transparent 60%),
    radial-gradient(720px 720px at 78% 92%, rgba(34,211,238,.13), transparent 60%),
    radial-gradient(560px 560px at 18% 96%, rgba(163,230,53,.08), transparent 60%);
  animation:bgFloat 16s ease-in-out infinite alternate;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(420px 420px at 50% 40%, rgba(167,139,250,.10), transparent 70%);
  animation:bgFloat2 22s ease-in-out infinite alternate;
}
.shell{position:relative;z-index:1}
.main{background:transparent}

/* ── Sidebar: deep gradient panel with glow seam ── */
.sidebar{
  background:linear-gradient(180deg,#0e0b22,#0a0818);
  border-right:1px solid rgba(124,58,237,.22);
  box-shadow:1px 0 24px rgba(124,58,237,.08);
  position:sticky;top:0;z-index:2;
}

/* ── Sidebar nav items ── */
.nav-item{
  transition:background var(--dur-fast) var(--ease-out),
             color var(--dur-fast) var(--ease-out),
             transform var(--dur-fast) var(--ease-spring);
}
.nav-item:hover{background:rgba(124,58,237,.12);color:var(--ink);transform:translateX(3px)}
.nav-item:active{transform:translateX(1px) scale(.97)}
.nav-item.on{
  background:linear-gradient(135deg,rgba(124,58,237,.28),rgba(167,139,250,.14),rgba(34,211,238,.1));
  background-size:200% 200%;
  animation:navSlideIn var(--dur-med) var(--ease-out) both, gradientShift 6s ease infinite;
  border-left:none;color:#fff;padding-left:10px;
  box-shadow:inset 0 0 0 1px rgba(167,139,250,.3),0 4px 16px rgba(124,58,237,.28);
}
.nav-item.on::before{
  content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:3px;
  background:linear-gradient(180deg,#c4b5fd,#7c3aed,#22d3ee);
  box-shadow:0 0 12px rgba(124,58,237,.9);
}
.nav-item i{transition:transform var(--dur-fast) var(--ease-spring)}
.nav-item:hover i{transform:scale(1.15)}
.nav-item.on i{color:#c4b5fd}
.nav-badge{background:linear-gradient(135deg,#f43f5e,#f472b6)}
.nav-badge.hot{background:linear-gradient(135deg,#f43f5e,#f472b6);animation:pulseRing 1.8s ease-in-out infinite}

/* ── Run button: animated rainbow gradient + shine ── */
.sidebar-run-btn{
  background:linear-gradient(120deg,#7c3aed,#a78bfa,#22d3ee,#7c3aed);
  background-size:300% 100%;
  border:none;color:#fff;font-weight:700;
  box-shadow:0 6px 20px rgba(124,58,237,.4);
  animation:gradientPan 5s linear infinite;
  transition:transform var(--dur-fast) var(--ease-spring),box-shadow var(--dur-med);
  position:relative;overflow:hidden;
}
.sidebar-run-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  transform:translateX(-100%);transition:transform .5s var(--ease-out);
}
.sidebar-run-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 30px rgba(124,58,237,.6)}
.sidebar-run-btn:hover::after{transform:translateX(100%)}
.sidebar-run-btn:active{transform:translateY(0) scale(.97)}

/* ── Wordmark: animated shine ── */
.sidebar-wordmark{
  background:linear-gradient(90deg,#ece9ff,#a78bfa,#22d3ee,#ece9ff);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:textShine 5s linear infinite;
}

/* ── Section eyebrow: glowing gradient bar ── */
.section-eyebrow{display:flex;align-items:center;gap:9px}
.section-eyebrow::before{
  content:'';width:3px;height:13px;border-radius:3px;flex-shrink:0;
  background:linear-gradient(180deg,#c4b5fd,#7c3aed,#22d3ee);
  box-shadow:0 0 10px rgba(124,58,237,.7);
}

/* ── Ambient canvas wash ── */
.main{
  background:
    radial-gradient(900px 480px at 100% -10%, rgba(124,58,237,.10), transparent 60%),
    transparent;
}

/* ── Glass row cards w/ animated accent ── */
.row-card{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(40,34,72,.55),rgba(26,22,52,.45));
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  border:1px solid rgba(124,58,237,.16);
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 4px 16px rgba(0,0,0,.22);
  transition:background var(--dur-med) var(--ease-out),border-color var(--dur-med),
             transform var(--dur-fast) var(--ease-spring),box-shadow var(--dur-med);
}
.row-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,#c4b5fd,#7c3aed,#22d3ee);
  transform:scaleY(0);transform-origin:center;
  transition:transform var(--dur-med) var(--ease-spring);
}
.row-card:hover{
  background:linear-gradient(180deg,rgba(52,44,92,.7),rgba(34,28,66,.6));
  border-color:rgba(167,139,250,.4);transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(0,0,0,.35),0 0 0 1px rgba(124,58,237,.18),0 0 24px rgba(124,58,237,.16);
}
.row-card:hover::before{transform:scaleY(1)}
.row-card.hot{border-color:rgba(244,63,94,.3)}
.row-card.hot::before{background:linear-gradient(180deg,#fda4af,#f43f5e);transform:scaleY(1)}
.row-card:active{transform:translateY(0) scale(.997)}

/* ── Glass stat cards w/ gradient numbers ── */
.home-stat-card{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(40,34,72,.6),rgba(24,20,48,.5));
  backdrop-filter:blur(14px) saturate(1.25);-webkit-backdrop-filter:blur(14px) saturate(1.25);
  border:1px solid rgba(124,58,237,.18);
  transition:transform var(--dur-med) var(--ease-spring),box-shadow var(--dur-med),border-color var(--dur-med);
}
.home-stat-card::before{
  content:'';position:absolute;left:0;right:0;top:0;height:2px;
  background:linear-gradient(90deg,#7c3aed,#a78bfa,#22d3ee,#f43f5e);
  background-size:200% 100%;animation:gradientPan 4s linear infinite;opacity:.85;
}
.home-stat-card:hover{
  transform:translateY(-4px);
  box-shadow:0 14px 34px rgba(0,0,0,.4),0 0 0 1px rgba(124,58,237,.22),0 0 30px rgba(124,58,237,.2);
  border-color:rgba(167,139,250,.35);
}
.home-stat-val{font-variant-numeric:tabular-nums;
  background:linear-gradient(135deg,#ece9ff,#c4b5fd);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#ece9ff;
}
.home-stat-val.cyan{background:linear-gradient(135deg,#a78bfa,#7c3aed,#22d3ee);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#a78bfa}
.home-stat-val.green{background:linear-gradient(135deg,#86efac,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#34d399}

/* ── Hero card: glass with animated border glow ── */
.hero-card{
  position:relative;overflow:hidden;
  background:
    radial-gradient(600px 220px at 0% 0%, rgba(124,58,237,.16), transparent 60%),
    linear-gradient(180deg,rgba(40,34,72,.62),rgba(24,20,48,.52));
  backdrop-filter:blur(14px) saturate(1.25);-webkit-backdrop-filter:blur(14px) saturate(1.25);
  border:1px solid rgba(124,58,237,.22);
  box-shadow:0 10px 40px rgba(0,0,0,.32),0 0 30px rgba(124,58,237,.1);
  transition:border-color var(--dur-med),box-shadow var(--dur-med);
}
.hero-card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
  background:linear-gradient(120deg,rgba(124,58,237,.5),transparent 40%,transparent 60%,rgba(34,211,238,.4));
  background-size:200% 100%;animation:gradientPan 6s linear infinite;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
}
.hero-card.alert{border-color:rgba(244,63,94,.35);box-shadow:0 10px 40px rgba(0,0,0,.32),0 0 30px rgba(244,63,94,.14)}
.hero-icon{
  background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(34,211,238,.18));
  border-color:rgba(167,139,250,.4);color:#c4b5fd;
  animation:accentGlow 3.5s ease-in-out infinite, floatY 4s ease-in-out infinite;
}
.hero-card.alert .hero-icon{background:linear-gradient(135deg,rgba(244,63,94,.28),rgba(244,114,182,.16));color:#fda4af}
.hero-text h2{
  background:linear-gradient(90deg,#ffffff,#c4b5fd);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#fff;
}

/* ── Buttons ── */
.btn-primary{
  background:linear-gradient(120deg,#7c3aed,#a78bfa,#7c3aed);background-size:200% 100%;
  box-shadow:0 4px 16px rgba(124,58,237,.4);
  transition:background-position var(--dur-slow),box-shadow var(--dur-fast),transform var(--dur-fast) var(--ease-spring);
}
.btn-primary:hover{background-position:100% 50%;box-shadow:0 8px 26px rgba(124,58,237,.6);transform:translateY(-2px)}
.btn-primary:active{transform:translateY(0) scale(.96)}
.btn-ghost{transition:background var(--dur-fast),border-color var(--dur-fast),transform var(--dur-fast) var(--ease-spring)}
.btn-ghost:hover{background:rgba(124,58,237,.14);border-color:rgba(124,58,237,.3);transform:translateY(-1px)}
.btn-ghost:active{transform:scale(.96)}

/* ── Team cards ── */
.team-card{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(40,34,72,.5),rgba(26,22,52,.42));
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  border:1px solid rgba(124,58,237,.16);
  transition:background var(--dur-med),border-color var(--dur-med),
             transform var(--dur-fast) var(--ease-spring),box-shadow var(--dur-med);
}
.team-card:hover{
  background:linear-gradient(180deg,rgba(52,44,92,.66),rgba(34,28,66,.56));
  border-color:rgba(167,139,250,.4);transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.36),0 0 26px rgba(124,58,237,.2);
}
.team-card:active{transform:translateY(0) scale(.98)}
.team-card-icon{
  background:linear-gradient(135deg,rgba(124,58,237,.28),rgba(34,211,238,.16));color:#c4b5fd;
  transition:transform var(--dur-fast) var(--ease-spring);
}
.team-card:hover .team-card-icon{transform:scale(1.15) rotate(-8deg)}
.team-hero-title{
  background:linear-gradient(90deg,#fff,#c4b5fd,#22d3ee);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#fff;
  animation:textShine 6s linear infinite;
}
.team-hero-eyebrow{color:#a78bfa}

/* ── Activity rows ── */
.activity-row{
  background:linear-gradient(180deg,rgba(40,34,72,.5),rgba(26,22,52,.4));
  border:1px solid rgba(124,58,237,.14);
  transition:background var(--dur-fast),transform var(--dur-fast) var(--ease-spring),box-shadow var(--dur-fast);
}
.activity-row:hover{background:rgba(52,44,92,.6);transform:translateX(3px);box-shadow:0 4px 14px rgba(0,0,0,.26)}

/* ── Pills ── */
.pill{background:linear-gradient(135deg,rgba(124,58,237,.16),rgba(167,139,250,.08));border:1px solid rgba(124,58,237,.18);color:#c4b5fd}
.pill.hot{background:linear-gradient(135deg,rgba(244,63,94,.2),rgba(244,114,182,.1));border-color:rgba(244,63,94,.28);color:#fda4af}

/* ── Settings / scards glass ── */
.scard,.rp-card{
  background:linear-gradient(180deg,rgba(40,34,72,.55),rgba(24,20,48,.46));
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  border:1px solid rgba(124,58,237,.16);
  transition:border-color var(--dur-med),box-shadow var(--dur-med);
}
.scard:hover,.rp-card:hover{border-color:rgba(124,58,237,.3);box-shadow:0 8px 26px rgba(0,0,0,.3)}

/* ── Form inputs ── */
.sform-input:focus,.sform-select:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.18)}

/* ── Skeleton loader ── */
.skeleton{border-radius:6px;background:linear-gradient(90deg,rgba(124,58,237,.06) 25%,rgba(167,139,250,.16) 50%,rgba(124,58,237,.06) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
.skeleton-card{background:rgba(40,34,72,.4);border:1px solid rgba(124,58,237,.14);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.skeleton-icon{width:28px;height:28px;border-radius:7px;flex-shrink:0}
.skeleton-body{flex:1;display:flex;flex-direction:column;gap:8px}
.skeleton-line{height:11px;width:100%}.skeleton-line.short{width:55%}

/* ── Mobile nav glass ── */
.mobile-nav{background:linear-gradient(180deg,rgba(14,11,34,.92),rgba(10,8,24,.96));backdrop-filter:blur(12px);border-top:1px solid rgba(124,58,237,.22)}
.mobile-nav button.on{color:#c4b5fd}

/* ── Scrollbar ── */
.main::-webkit-scrollbar,.sidebar-section::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#7c3aed,#22d3ee);border-radius:5px}
.main::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#a78bfa,#22d3ee)}

/* ── Home view ── */
.home-greet{margin-bottom:22px}
.home-greet h1{
  font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.02em;line-height:1.1;
  background:linear-gradient(90deg,#fff,#c4b5fd,#22d3ee);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#fff;
  animation:textShine 6s linear infinite;
}
.home-greet-sub{font-size:13.5px;color:var(--ink-2);margin-top:6px}
.home-section-head{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px}
.home-see-all{
  background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:12.5px;font-weight:600;color:var(--cyan);padding:4px 2px;
  transition:color var(--dur-fast);
}
.home-see-all:hover{color:#c4b5fd;text-decoration:underline;text-underline-offset:3px}
@media(max-width:900px){.home-stat-row[style*="repeat(4"]{grid-template-columns:repeat(2,1fr)!important}}

/* ── Home: "still needs your input" bubbles ── */
.setup-gaps{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.setup-bubble{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 14px 9px 12px;border-radius:999px;cursor:pointer;
  background:linear-gradient(135deg,rgba(251,191,36,.14),rgba(244,63,94,.08));
  border:1px solid rgba(251,191,36,.3);color:#fde68a;
  font-size:12.5px;font-weight:600;font-family:inherit;
  transition:transform .15s,box-shadow .2s,border-color .2s;
  animation:bubbleIn .35s cubic-bezier(0.16,1,.3,1) both;
}
.setup-bubble:hover{transform:translateY(-2px);border-color:rgba(251,191,36,.55);box-shadow:0 8px 20px -8px rgba(251,191,36,.35)}
.setup-bubble .dot{width:6px;height:6px;border-radius:50%;background:#fbbf24;flex-shrink:0;animation:blink 1.6s ease-in-out infinite}
.setup-bubble .chev{color:#fde68a;opacity:.7;font-size:13px}
@keyframes bubbleIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@media(prefers-reduced-motion:reduce){.setup-bubble{animation:none}.setup-bubble .dot{animation:none}}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

</style>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

<body>

  <!-- ====== SIDEBAR ====== -->

    <div class="sidebar-logo">
      <img src="/static/adapix_mark.svg" alt="Adapix" class="sidebar-mark" />

      <button class="nav-item" data-view="contacts"><i data-lucide="users"></i><span>Contacts</span></button>

        <i data-lucide="phone"></i><span>Calls</span>
        <span class="nav-badge" id="ct-calls"></span>
      </button>
      <button class="nav-item" data-view="messages"><i data-lucide="send"></i><span>SMS &amp; Email</span></button>
      <button class="nav-item" data-view="station"><i data-lucide="train-front"></i><span>Station</span></button>
      <button class="nav-item" data-view="team"><i data-lucide="bot"></i><span>AI Team</span></button>
      <button class="nav-item" data-view="database"><i data-lucide="database"></i><span>Database</span></button>

  <!-- ====== MAIN ====== -->
  <main class="main" id="main">

  </main>
</div>

<!-- Mobile bottom nav -->
<nav class="mobile-nav" id="bn">
  <button data-view="home"><i data-lucide="layout-dashboard"></i><span>Home</span></button>
  <button data-view="inbox"><i data-lucide="inbox"></i><span>Inbox</span></button>
  <button data-view="station"><i data-lucide="train-front"></i><span>Station</span></button>
  <button data-view="messages"><i data-lucide="send"></i><span>SMS/Email</span></button>
  <button data-view="calls"><i data-lucide="phone"></i><span>Calls</span></button>
  <button data-view="contacts"><i data-lucide="users"></i><span>Contacts</span></button>
  <button data-view="team"><i data-lucide="bot"></i><span>AI Team</span></button>
  <button data-view="database"><i data-lucide="database"></i><span>Database</span></button>
  <button data-view="settings"><i data-lucide="settings"></i><span>Settings</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
  // The SW scope is /app/ but this page is /app (no slash), so
  // navigator.serviceWorker.ready never resolves here. Await the
  // registration itself instead — push works off the registration,
  // not off page control.
  window.adapixSwReg = async function(){
    const reg = await navigator.serviceWorker.register('/app/sw.js');
    if (reg.active) return reg;
    await new Promise(res => {
      const w = reg.installing || reg.waiting;
      if (!w) return res();
      w.addEventListener('statechange', function f(){
        if (w.state === 'activated' || w.state === 'redundant'){ w.removeEventListener('statechange', f); res(); }
      });
    });
    return reg;
  };
  if ('serviceWorker' in navigator) window.adapixSwReg().then(async reg => {
    // The server's subscription list lives on ephemeral disk and is
    // wiped by every deploy. If this browser already holds a push
    // subscription, silently re-register it so pushes keep landing.
    try {
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        const j = sub.toJSON();
        fetch('/api/v1/notify/subscribe', {method:'POST', credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({endpoint:j.endpoint, keys:j.keys, user_agent:navigator.userAgent})});
      }
    } catch(_){}
  }).catch(()=>{});

  const $ = (id)=>document.getElementById(id);
  const main = $('main');

  const state = {
    view: 'home', feed: null, dashboard: null, patients: null, settingsPage: null, contactsPage: null, calls: null,
    // Set right before navigating to the Database tab from a Home "still
    // missing" bubble, so that view can scroll to + focus the exact field
    // the user needs to fill in. Cleared once consumed.
    focusDbField: null,
  };

  // Plain-English labels for the internal contact statuses.
  // (Internal values stay the same so the follow-up engine keeps working.)
  const STATUS_LABELS = {
    consulted_not_started: 'Lead',
    treatment_started:     'Customer',
    explicitly_declined:   'Not interested',
    paused:                'Paused',
  };
  const statusLabel = s => STATUS_LABELS[s] || (s || '').replace(/_/g,' ') || 'Lead';

  // Plain-English labels for why a conversation got handed to a human.
  const ESC_LABELS = {
    clinical_question: 'Has a question',
    callback_request:  'Wants a call back',
    decline:           'Not interested',
    emergency:         'Urgent',
    stop:              'Asked to stop',
    pricing:           'Asking about price',
    other:             'Needs a look',
    escalation:        'Needs a look',
  };
  const escLabel = c => ESC_LABELS[c] || (c || '').replace(/_/g,' ') || 'Needs a look';

  function escapeHTML(s){
    return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function toast(msg, err){
    const t = $('toast'); t.textContent = msg; t.classList.toggle('err', !!err); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
  async function api(path, opts){
    const res = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'},credentials:'include'}, opts||{}));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // -------- Load --------
  async function load(){
    try{
      const l = $('loader');
      if (l) l.textContent = 'loading…';  // #loader is removed after first boot
      const [feed, dashboard, calls] = await Promise.all([
        api('/api/v1/feed').catch(()=>({escalations:[], approvals:[], digest:{}})),
        api('/api/v1/dashboard').catch(()=>({widgets:[]})),
        api('/api/v1/calls').catch(()=>({pending:[], history:[]})),
      ]);
      state.feed = feed;
      state.dashboard = dashboard;
      state.calls = calls;
      render();
    } catch(e){
      main.innerHTML = '<div class="fail">Could not load. ' + escapeHTML(e.message) + '</div>';
    }
  }

  // Re-fetch just the feed so new drafts/escalations appear without a full
  // page reload. Repaints the Inbox only when it's safe (no draft mid-edit).
  async function refreshFeed(){
    let feed;
    try { feed = await api('/api/v1/feed'); } catch(_) { return; }
    state.feed = feed;
    if (state.view === 'inbox' && !document.querySelector('[data-draft-editor]:not([hidden])')) {
      render();
    } else {
      const escCount = (feed.escalations || []).length;
      const total = escCount + (feed.approvals || []).length;
      const badge = $('ct-inbox');
      if (badge) { badge.textContent = total || ''; badge.style.display = total ? '' : 'none'; badge.classList.toggle('hot', escCount > 0); }
    }
  }

  // -------- Render dispatch --------
  function render(){
    document.querySelectorAll('#leftnav button[data-view], #bn button').forEach(b=>{
      b.classList.toggle('on', b.dataset.view === state.view);
    });
    const escCount = (state.feed && state.feed.escalations) ? state.feed.escalations.length : 0;
    const apprCount = (state.feed && state.feed.approvals) ? state.feed.approvals.length : 0;
    const total = escCount + apprCount;
    const badge = $('ct-inbox');
    if (badge) { badge.textContent = total || ''; badge.style.display = total ? '' : 'none'; badge.classList.toggle('hot', escCount > 0); }

    const callsPending = (state.calls && state.calls.pending) ? state.calls.pending.length : 0;
    const callsBadge = $('ct-calls');
    if (callsBadge) { callsBadge.textContent = callsPending || ''; callsBadge.style.display = callsPending ? '' : 'none'; }

    if (state.view === 'home')       renderHomeView();
    else if (state.view === 'inbox')     renderInboxView();
    else if (state.view === 'contacts')  renderPatientsView();
    else if (state.view === 'calls')     renderCallsView();
    else if (state.view === 'messages')  renderMessagesView();
    else if (state.view === 'station')   renderStationView();
    else if (state.view === 'team')      renderTeam();
    else if (state.view === 'database')  renderDatabaseView();
    else if (state.view === 'workshop')  renderWorkshop();
    else if (state.view === 'settings')  renderSettingsLink();
  }

  function renderActivityRow(ev){
    const ts = ev.ts ? new Date(ev.ts) : null;
    const ago = ts ? timeAgo(ts) : '';
    const iconMap = {
      sent:        '<i data-lucide="send"></i>',
      draft:       '<i data-lucide="file-edit"></i>',
      reply:       '<i data-lucide="reply"></i>',
      rejected:    '<i data-lucide="x-circle"></i>',
      escalation:  '<i data-lucide="alert-triangle"></i>',
      emergency:   '<i data-lucide="alert-octagon"></i>',
      outbound:    '<i data-lucide="arrow-up-right"></i>',
      call_placed: '<i data-lucide="phone-outgoing"></i>',
      call_plan:   '<i data-lucide="phone"></i>',
      call_outcome:'<i data-lucide="phone-incoming"></i>',
      call_failed: '<i data-lucide="phone-off"></i>',
    };
    const icon = iconMap[ev.kind] || '<i data-lucide="dot"></i>';
    return `
      <div class="activity-row activity-${ev.kind}">
        <div class="activity-icon">${icon}</div>
        <div class="activity-body">
          <div class="activity-label">${escapeHTML(ev.label||'')}</div>
          ${ev.preview ? `<div class="activity-preview">${escapeHTML(ev.preview)}</div>` : ''}
        </div>
        <div class="activity-ts">${ago}</div>
      </div>`;
  }

  function timeAgo(d){
    const sec = Math.max(1, Math.floor((Date.now() - d.getTime())/1000));
    if (sec < 60)   return sec + 's ago';
    const min = Math.floor(sec/60);
    if (min < 60)   return min + 'm ago';
    const hr = Math.floor(min/60);
    if (hr  < 24)   return hr + 'h ago';
    return Math.floor(hr/24) + 'd ago';
  }

  // -------- INBOX view (new nav entry = queue + hero alert) --------
  // -------- HOME view — the morning glance: stats + what needs you --------
  // Home activity chart: two thin lines, recessive grid, crosshair tooltip.
  function loadHomeChart(){
    api('/api/v1/stats/daily?days=30').then(j => {
      const el = document.getElementById('home-chart');
      if (!el || state.view !== 'home') return;
      drawHomeChart(el, j.days || []);
      if (!loadHomeChart._resizeWired){
        loadHomeChart._resizeWired = true;
        let rt;
        window.addEventListener('resize', () => {
          clearTimeout(rt);
          rt = setTimeout(() => {
            const el2 = document.getElementById('home-chart');
            if (el2 && state.view === 'home') drawHomeChart(el2, j.days || []);
          }, 150);
        });
      }
    }).catch(() => {});
  }

  function drawHomeChart(el, days){
    const W = Math.max(320, el.clientWidth || 640), H = 170, L = 34, R = 12, T = 12, B = 24;
    const iw = W - L - R, ih = H - T - B;
    const n = days.length;
    if (!n) return;
    const maxRaw = Math.max(1, ...days.map(d => Math.max(d.sent, d.replies)));
    const step = Math.max(1, Math.ceil(maxRaw / 3));
    const yMax = step * 3;
    const x = i => L + (n <= 1 ? iw / 2 : i * iw / (n - 1));
    const y = v => T + ih - (v / yMax) * ih;
    const path = key => days.map((d, i) => (i ? 'L' : 'M') + x(i).toFixed(1) + ' ' + y(d[key]).toFixed(1)).join('');

    let grid = '', labs = '';
    for (let g = 0; g <= 3; g++){
      const gy = y(g * step);
      grid += `<line class="grid" x1="${L}" y1="${gy}" x2="${W-R}" y2="${gy}"></line>`;
      labs += `<text class="axis-lab" x="${L-7}" y="${gy+3.5}" text-anchor="end">${g*step}</text>`;
    }
    [0, Math.floor((n-1)/2), n-1].forEach(i => {
      if (i < 0 || !days[i]) return;
      const d = new Date(days[i].date + 'T00:00:00');
      const lab = (d.getMonth()+1) + '/' + d.getDate();
      const anchor = i === 0 ? 'start' : (i === n-1 ? 'end' : 'middle');
      labs += `<text class="axis-lab" x="${x(i).toFixed(1)}" y="${H-7}" text-anchor="${anchor}">${lab}</text>`;
    });

    const total = days.reduce((a,d) => a + d.sent + d.replies, 0);
    el.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" aria-label="Daily follow-ups sent and replies received, last 30 days">
        ${grid}${labs}
        <path d="${path('sent')}" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
        <path d="${path('replies')}" fill="none" stroke="#0891b2" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
        <line id="hc-cross" x1="0" y1="${T}" x2="0" y2="${T+ih}" stroke="rgba(236,233,255,.35)" stroke-width="1" style="display:none"></line>
        <circle id="hc-dot-s" r="4" fill="#8b5cf6" stroke="var(--bg-2)" stroke-width="2" style="display:none"></circle>
        <circle id="hc-dot-r" r="4" fill="#0891b2" stroke="var(--bg-2)" stroke-width="2" style="display:none"></circle>
      </svg>
      <div class="home-chart-tip" id="hc-tip"></div>
      ${total === 0 ? '<div class="home-chart-empty">No activity yet - this fills in as Adapix works</div>' : ''}`;

    const svg = el.querySelector('svg'), tip = el.querySelector('#hc-tip');
    const cross = el.querySelector('#hc-cross'), dotS = el.querySelector('#hc-dot-s'), dotR = el.querySelector('#hc-dot-r');
    function move(ev){
      const rect = svg.getBoundingClientRect();
      const px = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
      const vx = px;
      let i = Math.round((vx - L) / (iw / Math.max(1, n - 1)));
      i = Math.max(0, Math.min(n - 1, i));
      const d = days[i], cx = x(i);
      cross.setAttribute('x1', cx); cross.setAttribute('x2', cx); cross.style.display = '';
      dotS.setAttribute('cx', cx); dotS.setAttribute('cy', y(d.sent)); dotS.style.display = '';
      dotR.setAttribute('cx', cx); dotR.setAttribute('cy', y(d.replies)); dotR.style.display = '';
      const dt = new Date(d.date + 'T00:00:00');
      tip.innerHTML = `<b>${dt.toLocaleDateString(undefined,{month:'short',day:'numeric'})}</b><br>` +
        `<span style="color:#a78bfa">&#9679;</span> Sent: <b>${d.sent}</b> &nbsp; <span style="color:#22d3ee">&#9679;</span> Replies: <b>${d.replies}</b>`;
      tip.style.display = 'block';
      const tipX = Math.min(rect.width - tip.offsetWidth - 6, Math.max(6, px + 14));
      tip.style.left = tipX + 'px';
      tip.style.top = '8px';
    }
    function leave(){ tip.style.display='none'; cross.style.display='none'; dotS.style.display='none'; dotR.style.display='none'; }
    svg.addEventListener('mousemove', move);
    svg.addEventListener('touchstart', move, {passive:true});
    svg.addEventListener('touchmove', move, {passive:true});
    svg.addEventListener('mouseleave', leave);
    svg.addEventListener('touchend', leave);
  }

  function renderHomeView(){
    const feed  = state.feed || {};
    const d     = feed.digest || {};
    const escs  = feed.escalations || [];
    const apprs = (feed.approvals || []).filter(m => m.channel !== 'call');
    const callsPending = (state.calls && state.calls.pending) ? state.calls.pending.length : 0;
    const needsYou = escs.length + apprs.length + callsPending;

    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const dateLine = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

    // A successful call = it connected, the conversation happened, and the
    // outcome came back — works whether the business sells, books, or resolves.
    const successfulCalls = ((state.calls && state.calls.history) || [])
      .filter(c => c.direction === 'inbound').length;

    // Top 3 things that need a human — escalations first, then drafts, then call plans
    const previewItems = [
      ...escs.map(e => ({kind:'esc', e})),
      ...apprs.map(m => ({kind:'draft', m})),
      ...((state.calls && state.calls.pending) || []).map(c => ({kind:'call', c})),
    ].slice(0, 3);

    const previewHtml = previewItems.length
      ? '<div class="rows">' + previewItems.map(it => {
          if (it.kind === 'esc') {
            const fromCall = it.e.channel === 'call';
            const detail = fromCall ? (it.e.call_summary || it.e.reasoning || '') : (it.e.reasoning || '');
            return `
            <div class="row-card hot" style="cursor:pointer" onclick="goView('inbox')">
              <div class="text"><b>${escapeHTML(it.e.patient)}</b><span>${escapeHTML(escLabel(it.e.category) + (detail ? ' · ' + detail : ''))}</span></div>
              <span class="pill hot">${escapeHTML(escLabel(it.e.category))}</span>
              <span style="color:var(--ink-3);font-size:18px;flex:0 0 auto">›</span>
            </div>`;
          }
          if (it.kind === 'draft') {
            return `
            <div class="row-card" style="cursor:pointer" onclick="goView('inbox')">
              <div class="text"><b>${escapeHTML(it.m.patient)}</b><span>${escapeHTML((it.m.body||'').slice(0,140))}</span></div>
              <span class="pill">draft to review</span>
              <span style="color:var(--ink-3);font-size:18px;flex:0 0 auto">›</span>
            </div>`;
          }
          return `
          <div class="row-card" style="cursor:pointer" onclick="goView('calls')">
            <div class="text"><b>${escapeHTML(it.c.patient)}</b><span>Goal: ${escapeHTML((it.c.goal||'').slice(0,140))}</span></div>
            <span class="pill" style="display:inline-flex;align-items:center;gap:4px;color:var(--cyan)"><i data-lucide="phone" style="width:12px;height:12px"></i> call plan</span>
            <span style="color:var(--ink-3);font-size:18px;flex:0 0 auto">›</span>
          </div>`;
        }).join('') + '</div>'
      : `
        <div style="text-align:center;padding:28px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px">
          <div style="font-size:24px;margin-bottom:8px;color:var(--good)">✓</div>
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px">Nothing needs you right now.</div>
          <div style="font-size:12.5px;color:var(--ink-2)">Adapix is on it — you'll see anything important here first.</div>
        </div>`;

    main.innerHTML = `
      <div class="home-greet" style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
        <div>
          <h1>${greet}.</h1>
          <div class="home-greet-sub">${dateLine} — here's where things stand.</div>
        </div>
        <button id="home-pause-btn" class="btn btn-ghost" hidden style="flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;padding:9px 16px;font-size:12.5px;font-weight:600"></button>
      </div>

      <div id="home-paused-banner" style="display:none;align-items:center;gap:10px;padding:12px 16px;margin-bottom:18px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:12px;font-size:13px;color:#fde68a">
        <i data-lucide="pause-circle" style="width:16px;height:16px;flex-shrink:0"></i>
        Adapix is paused — no new follow-ups will be drafted until you resume. Anything already waiting in your Inbox can still be sent or rejected by hand.
      </div>

      <div id="home-setup-gaps"></div>

      <div class="home-stat-row" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
        <div class="home-stat-card" style="cursor:pointer" onclick="goView('contacts')">
          <div class="home-stat-label">Won back this month</div>
          <div class="home-stat-val green" id="home-won">$0</div>
          <div class="home-stat-sub" id="home-won-sub">Mark wins on the Contacts tab</div>
        </div>
        <div class="home-stat-card">
          <div class="home-stat-label">Sent today</div>
          <div class="home-stat-val cyan">${d.sent_today || 0}</div>
          <div class="home-stat-sub">Follow-ups Adapix sent for you</div>
        </div>
        <div class="home-stat-card" style="cursor:pointer" onclick="goView('inbox')">
          <div class="home-stat-label">Waiting on you</div>
          <div class="home-stat-val" style="${needsYou ? 'background:linear-gradient(135deg,#fda4af,#f43f5e);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent' : ''}">${needsYou}</div>
          <div class="home-stat-sub">${needsYou ? 'Replies, drafts & call plans' : 'All caught up'}</div>
        </div>
        <div class="home-stat-card" style="cursor:pointer" onclick="goView('calls')">
          <div class="home-stat-label">Successful calls</div>
          <div class="home-stat-val green" id="home-calls">${successfulCalls}</div>
          <div class="home-stat-sub">Conversations completed</div>
        </div>

    renderLucide(main);

    // "Still needs your input" bubbles — checks the Database tab's fields
    // (identity, description, pricing) plus the calling-number/email
    // connections, and only shows what's actually missing. Recomputed every
    // time Home loads, so a bubble simply stops appearing once its field is
    // filled in — no separate dismiss/tracking state needed.
    api('/api/v1/database').then(d => {
      // Master pause switch — real control over the automation engine.
      const pauseBtn = document.getElementById('home-pause-btn');
      const pausedBanner = document.getElementById('home-paused-banner');
      function renderPause(paused){
        if (!pauseBtn) return;
        pauseBtn.hidden = false;
        pauseBtn.innerHTML = paused
          ? '<i data-lucide="play" style="width:14px;height:14px"></i> Resume Adapix'
          : '<i data-lucide="pause" style="width:14px;height:14px"></i> Pause Adapix';
        pauseBtn.style.borderColor = paused ? 'rgba(251,191,36,.4)' : '';
        pauseBtn.style.color = paused ? '#fde68a' : '';
        if (pausedBanner) pausedBanner.style.display = paused ? 'flex' : 'none';
        renderLucide(pauseBtn.parentElement);
        if (pausedBanner && paused) renderLucide(pausedBanner);
      }
      renderPause(!!d.paused);
      let paused = !!d.paused;
      if (pauseBtn) pauseBtn.addEventListener('click', async () => {
        pauseBtn.disabled = true;
        try {
          const r = await api('/api/v1/org/pause', { method:'POST', body: JSON.stringify({paused: !paused}) });
          paused = r.paused;
          renderPause(paused);
          toast(paused ? 'Adapix paused — nothing new will be drafted' : 'Adapix resumed');
        } catch(_){ toast('Could not update', true); }
        pauseBtn.disabled = false;
      });

      const gapsEl = document.getElementById('home-setup-gaps');
      if (!gapsEl) return;
      const gaps = [];
      if (!(d.business_name || '').trim()) gaps.push({label: 'Add your business name', focus: 'db-name'});
      if (!(d.owner_name || '').trim()) gaps.push({label: 'Tell Adapix what to call you', focus: 'db-owner'});
      if (!(d.phone || '').trim()) gaps.push({label: 'Add a contact number', focus: 'db-phone'});
      if (!(d.description || '').trim()) gaps.push({label: 'Describe what your business does', focus: 'db-description'});
      if (!(d.services || []).length) gaps.push({label: 'Add your pricing', focus: 'db-svc-name'});
      if (!d.calling_number) gaps.push({label: 'Set up your calling number', channels: true});
      if (!d.email_connected) gaps.push({label: 'Connect your email', channels: true});

      // Notifications bubble: shows until THIS device is subscribed.
      // Async check, so render the rest first and append when known.
      async function pushOffOnThisDevice(){
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
        try {
          const reg = await window.adapixSwReg();
          return !(await reg.pushManager.getSubscription());
        } catch(_) { return false; }
      }

      function paintGaps(){
        if (!gaps.length) { gapsEl.innerHTML = ''; return; }
        gapsEl.innerHTML = `
          <div class="setup-gaps">
            ${gaps.map((g, i) => `<button class="setup-bubble" data-gap-idx="${i}"><span class="dot"></span>${escapeHTML(g.label)}<span class="chev">›</span></button>`).join('')}
          </div>`;
        gapsEl.querySelectorAll('.setup-bubble').forEach(btn => {
          btn.addEventListener('click', () => {
            const g = gaps[Number(btn.dataset.gapIdx)];
            if (g.notifications) { goView('settings'); goSettingsView('notifications'); }
            else if (g.website_import) { goView('settings'); goSettingsView('profile'); }
            else if (g.channels) { goView('settings'); goSettingsView('channels'); }
            else { state.focusDbField = g.focus; goView('database'); }
          });
        });
      }
      paintGaps();
      pushOffOnThisDevice().then(off => {
        if (!off || state.view !== 'home') return;
        gaps.push({label: 'Turn on notifications', notifications: true});
        paintGaps();
      });
      // Website import staged and waiting for review -> yellow reminder
      api('/api/v1/website-import').then(j => {
        if (state.view !== 'home') return;
        if (j.status === 'ready'){
          gaps.push({label: 'Review what Adapix read from your website', website_import: true});
          paintGaps();
        }
      }).catch(() => {});
    }).catch(() => {});

    loadHomeChart();

    api('/api/v1/wins/summary').then(w => {
      const el = document.getElementById('home-won');
      const sub = document.getElementById('home-won-sub');
      if (!el) return;
      el.textContent = '$' + Math.round(w.month_total || 0).toLocaleString();
      if (sub && w.month_count) sub.textContent = w.month_count + ' job' + (w.month_count !== 1 ? 's' : '') + ' recovered \u00b7 $' + Math.round(w.all_total).toLocaleString() + ' all time';
    }).catch(() => {});

    // Fill in the contacts count if it wasn't loaded yet
    if (!state.patients) {
      api('/api/v1/patients').then(j => {
        state.patients = j.patients || [];
        const el = document.getElementById('home-watch');
        if (el) el.textContent = state.patients.length;
      }).catch(()=>{});
    }

    // Same for calls (lazy fallback if the boot fetch didn't land)
    if (!state.calls) {
      api('/api/v1/calls').then(j => {
        state.calls = j;
        const el = document.getElementById('home-calls');
        if (el) el.textContent = (j.history || []).filter(c => c.direction === 'inbound').length;
      }).catch(()=>{});
    }

    // One-shot mini activity feed (Results has the live-refreshing full one)
    api('/api/v1/activity?limit=5').then(j => {
      const el = document.getElementById('home-activity');
      if (!el) return;
      const evs = (j.events || []).slice(0, 5);
      el.innerHTML = evs.length
        ? evs.map(renderActivityRow).join('')
        : '<div class="activity-empty">Adapix is up and running. Everything it does for you will show up here.</div>';
      renderLucide(el);
    }).catch(()=>{});
  }

        kbList.querySelectorAll('.db-kb-del').forEach(btn => btn.addEventListener('click', async () => {
