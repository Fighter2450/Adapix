@media(prefers-reduced-motion:reduce){.voice-bar{animation:none;opacity:.6;transform:scaleY(.6)}.voice-bar:nth-child(3){opacity:1;transform:scaleY(1)}}
.voice-label{font-size:12.5px;color:var(--slate);letter-spacing:.03em}
.voice-stop-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,68,68,.35);background:rgba(255,68,68,.08);color:#ff4444;font-size:12.5px;font-family:inherit;cursor:pointer;transition:background .15s,border-color .15s}
.voice-stop-btn:hover{background:rgba(255,68,68,.16);border-color:rgba(255,68,68,.55)}
.voice-stop-btn svg{width:12px;height:12px;fill:currentColor;stroke:none}

/* Utility */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.row-card{cursor:pointer}
.row-card:active{transform:scale(.99)}

/* Contact import */
.ci-dropzone{border:1.5px dashed rgba(0,212,255,.25);border-radius:12px;padding:40px 24px;text-align:center;transition:border-color .15s,background .15s;cursor:pointer}
.ci-dropzone.drag-over{border-color:var(--cyan-2);background:rgba(0,212,255,.06)}
.ci-table{width:100%;border-collapse:collapse;font-size:12px}
.ci-table th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
.ci-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--ink-2);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.ci-table tr:last-child td{border-bottom:none}
.ci-table tr:hover td{background:rgba(255,255,255,.02)}
.ci-success-icon{font-size:56px;margin-bottom:16px;line-height:1}
</style>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>

<div class="window">
  <!-- =========== TOP BAR =========== -->
  <div class="topbar">
    <div class="dots">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
    </div>
    <div class="brand">
      <div class="mark"><img src="/static/adapix_mark.svg" alt="Adapix" /></div>
      <b>Adapix</b>
      <div class="pulse"></div>
    </div>
    <div class="topnav" id="topnav">
      <button class="on" data-view="home">Home</button>
      <button data-view="queue">Queue <span class="ct" id="ct-queue">0</span></button>
      <button data-view="patients">Customers</button>
      <button data-view="concierge">Tasks</button>
      <button data-view="team">AI Team</button>
      <button data-view="workshop">Automations</button>
      <button data-view="settings">Settings</button>
    </div>
    <div class="actions">
      <button class="icon-btn icon-btn--label" id="run-campaigns" title="Run campaigns now"><i data-lucide="play"></i><span>Run</span></button>
      <button class="icon-btn" id="reload" title="Reload"><i data-lucide="refresh-cw"></i></button>
      <a class="cta" href="/chat">Chat with Adapix →</a>
    </div>
  </div>

  <!-- =========== 3-COLUMN BODY =========== -->
  <div class="body">
    <!-- Left icon sidebar -->
    <nav class="leftnav" id="leftnav">
      <button class="on" data-view="home" title="Home"><i data-lucide="home"></i></button>
      <button data-view="queue" title="Queue"><i data-lucide="inbox"></i></button>
      <button data-view="patients" title="Customers"><i data-lucide="users"></i></button>
      <button data-view="concierge" title="Tasks"><i data-lucide="sparkles"></i></button>
      <button data-view="team" title="AI Team"><i data-lucide="cpu"></i></button>
      <button data-view="workshop" title="Automations"><i data-lucide="plug"></i></button>
      <button data-view="settings" title="Settings"><i data-lucide="settings"></i></button>
      <div class="spacer"></div>
      <a href="/chat" class="chat-icon" title="Chat with Adapix" style="width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;"><i data-lucide="message-circle"></i></a>
    </nav>

    <!-- Main column -->
    <main class="main" id="main">
      <div class="loader" id="loader">loading…</div>
    </main>

    <!-- Right stats pane -->
    <aside class="rightpane" id="rightpane">
      <div class="loader" style="padding:14px">loading stats…</div>
    </aside>
  </div>
</div>

<!-- Mobile bottom nav (only shown when sidebars hidden) -->
<nav class="bn" id="bn">
  <button class="on" data-view="home"><div class="glyph"><i data-lucide="home"></i></div>Home</button>
  <button data-view="queue"><div class="glyph"><i data-lucide="inbox"></i></div>Queue</button>
  <button data-view="patients"><div class="glyph"><i data-lucide="users"></i></div>Contacts</button>
  <button data-view="concierge"><div class="glyph"><i data-lucide="sparkles"></i></div>Tasks</button>
  <button data-view="workshop"><div class="glyph"><i data-lucide="plug"></i></div>Connect</button>
  <button data-view="settings"><div class="glyph"><i data-lucide="settings"></i></div>Settings</button>
</nav>

<div class="toast" id="toast"></div>

<script>
(function(){
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/app/sw.js').catch(()=>{});

  const $ = (id)=>document.getElementById(id);
  const main = $('main');
  const rightpane = $('rightpane');

  const state = {
    view: 'home', feed: null, dashboard: null, patients: null, settingsPage: null, contactsPage: null,
  };

  function escapeHTML(s){
    return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function toast(msg, err){
    const t = $('toast'); t.textContent = msg; t.classList.toggle('err', !!err); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
  async function api(path, opts){
    const res = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'},credentials:'include'}, opts||{}));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // -------- Load --------
  async function load(){
    try{
      $('loader').textContent = 'loading…';
      const [feed, dashboard] = await Promise.all([
        api('/api/v1/feed').catch(()=>({escalations:[], approvals:[], digest:{}})),
        api('/api/v1/dashboard').catch(()=>({widgets:[]})),
      ]);
      state.feed = feed;
      state.dashboard = dashboard;
      render();
    } catch(e){
      main.innerHTML = '<div class="fail">Could not load. ' + escapeHTML(e.message) + '</div>';
    }
  }

  // -------- Render dispatch --------
  function render(){
    document.querySelectorAll('#topnav button, #leftnav button[data-view], #bn button').forEach(b=>{
      b.classList.toggle('on', b.dataset.view === state.view);
    });
    // Queue count in top nav
    const escCount = (state.feed && state.feed.escalations) ? state.feed.escalations.length : 0;
    const apprCount = (state.feed && state.feed.approvals) ? state.feed.approvals.length : 0;
    $('ct-queue').textContent = escCount + apprCount;

    if (state.view === 'home')      renderHome();
    else if (state.view === 'queue')    renderQueue();
    else if (state.view === 'patients') renderPatientsView();
    else if (state.view === 'concierge')renderConcierge();
    else if (state.view === 'team')     renderTeam();
    else if (state.view === 'workshop') renderWorkshop();
    else if (state.view === 'settings') renderSettingsLink();

    renderRightPane();
  }

  // -------- HOME view --------
  function renderHome(){
    const feed = state.feed || {};
    const escs = feed.escalations || [];
    const apprs = feed.approvals || [];
    const d = feed.digest || {};
    const watched = (state.patients || []).length;
    const hasEsc = escs.length > 0;
    const sentToday = d.sent_today || 0;
    const booked = d.booked_recently || 0;

    // Queue nav badge — red for escalations, cyan for drafts only
    const badge = document.getElementById('ct-queue');
    if (badge) {
      const total = escs.length + apprs.length;
      badge.textContent = total;
      badge.classList.toggle('hot', hasEsc);
      badge.style.display = total ? '' : 'none';
    }

    const pillState = hasEsc ? 'alert' : 'ok';
    const pillText  = hasEsc
      ? `${escs.length} item${escs.length > 1 ? 's' : ''} flagged`
      : sentToday > 0 ? `${sentToday} sent today` : 'Running · All systems normal';

    const watchedTxt = watched
      ? `<span class="hl">${watched} patient${watched !== 1 ? 's' : ''}</span>`
      : `<span class="hl">your patients</span>`;

    let heroHeadline, heroDesc;
    if (hasEsc) {
      heroHeadline = `Adapix flagged ${escs.length} message${escs.length > 1 ? 's' : ''}`;
      heroDesc = `Still watching ${watchedTxt}. ${escs.length > 1 ? 'These conversations require' : 'This conversation requires'} a human response — Adapix can\'t resolve ${escs.length > 1 ? 'these' : 'this'} automatically.`;
    } else if (sentToday > 0 && booked > 0) {
      heroHeadline = `Sent ${sentToday} message${sentToday !== 1 ? 's' : ''} · booked ${booked} appointment${booked !== 1 ? 's' : ''}`;
      heroDesc = `Watching ${watchedTxt} — following up on schedule and converting conversations into booked appointments. Nothing needs your attention right now.`;
    } else if (sentToday > 0) {
      heroHeadline = `Adapix sent ${sentToday} follow-up${sentToday !== 1 ? 's' : ''} today`;
      heroDesc = `Watching ${watchedTxt} and staying in contact on your behalf. Adapix will surface anything that needs a human response.`;
    } else if (booked > 0) {
      heroHeadline = `Adapix booked ${booked} appointment${booked !== 1 ? 's' : ''} this week`;
      heroDesc = `Watching ${watchedTxt} — handling reminders and converting replies into bookings. Nothing needs your attention right now.`;
    } else if (watched > 0) {
      heroHeadline = `Adapix is watching ${watched} patient${watched !== 1 ? 's' : ''}`;
      heroDesc = `Monitoring conversations and queuing follow-ups. Adapix will surface anything that needs a human response.`;
    } else {
      heroHeadline = 'Adapix is ready and listening';
      heroDesc = 'Add contacts and Adapix will handle follow-ups, rebooking, and reminders automatically.';
    }

    const escNames = escs.slice(0, 2).map(e => escapeHTML(e.patient || '')).filter(Boolean).join(', ');
    const escCallout = hasEsc ? `
      <div class="esc-callout">
        <div style="flex:0 0 15px;margin-top:1px;color:#F85149"><i data-lucide="alert-triangle" style="width:15px;height:15px"></i></div>
        <div class="esc-callout-body">
          <strong>${escs.length} patient${escs.length > 1 ? 's' : ''} need${escs.length === 1 ? 's' : ''} a human response</strong>
          <span>${escNames || 'Open the queue to review'}</span>
          <br><button class="esc-cta" onclick="document.querySelector('#topnav button[data-view=queue]').click()"><i data-lucide="arrow-right" style="width:11px;height:11px"></i> Go to Queue</button>
        </div>
      </div>` : '';

    main.innerHTML = `
      <div class="section-eyebrow">Today · ${new Date().toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'})}</div>

      <div class="hero-card ${hasEsc ? 'alert' : ''}">
        <div class="hero-top">
          <div class="hero-pill ${pillState}">
            <span class="hero-pill-dot"></span>
            ${pillText}
          </div>
          <span class="hero-updated">Updated just now</span>
        </div>
        <div class="hero-body">
          <div class="hero-icon">
            <i data-lucide="${hasEsc ? 'alert-triangle' : 'bot'}" style="width:22px;height:22px"></i>
          </div>
          <div class="hero-text">
            <h2>${escapeHTML(heroHeadline)}</h2>
            <p>${heroDesc}</p>
          </div>
        </div>
        ${escCallout}
      </div>

      <div class="home-stat-row">
        <div class="home-stat-card">
          <div class="home-stat-label">Sent today</div>
          <div class="home-stat-val cyan">${sentToday}</div>
          <div class="home-stat-sub">Messages delivered</div>
        </div>
        <div class="home-stat-card">
          <div class="home-stat-label">Contacts watched</div>
          <div class="home-stat-val">${watched}</div>
          <div class="home-stat-sub">Active conversations</div>
        </div>
        <div class="home-stat-card">
          <div class="home-stat-label">Booked recently</div>
          <div class="home-stat-val green">${booked}</div>
          <div class="home-stat-sub">Appointments attributed</div>
        </div>
      </div>

      <div class="section-eyebrow" style="margin-top:4px;display:flex;align-items:center;justify-content:space-between">
        <span>Recent activity</span>
        <span class="activity-meta" id="activityMeta">&nbsp;</span>
      </div>
      <div class="activity-feed" id="activityFeed">
        <div class="activity-empty">Adapix is online. Activity will appear here as messages are sent.</div>
      </div>
    `;
    renderLucide(main);
    refreshActivity();
  }

  // -------- Activity feed --------
  let _activityTimer = null;
  async function refreshActivity(){
    const feedEl = document.getElementById('activityFeed');
    const metaEl = document.getElementById('activityMeta');
    if (!feedEl) return;
    try {
      const r = await fetch('/api/v1/activity?limit=40', {credentials:'include'});
      const j = await r.json();
      const events = j.events || [];
      if (!events.length){
        feedEl.innerHTML = '<div class="activity-empty">Adapix is online. First activity will appear here.</div>';
        metaEl.textContent = 'standing by';
      } else {
        feedEl.innerHTML = events.map(renderActivityRow).join('');
        renderLucide(feedEl);
        const todayCount = j.today_count || 0;
        const lastTs = j.last_action_ts ? new Date(j.last_action_ts) : null;
        const lastAgo = lastTs ? timeAgo(lastTs) : '—';
        metaEl.textContent = `${todayCount} today · last action ${lastAgo}`;
      }
    } catch(_){}
    clearTimeout(_activityTimer);
    _activityTimer = setTimeout(refreshActivity, 20000);
  }

  function renderActivityRow(ev){
    const ts = ev.ts ? new Date(ev.ts) : null;
    const ago = ts ? timeAgo(ts) : '';
    const iconMap = {
      sent:       '<i data-lucide="send"></i>',
      draft:      '<i data-lucide="file-edit"></i>',
      reply:      '<i data-lucide="reply"></i>',
      rejected:   '<i data-lucide="x-circle"></i>',
      escalation: '<i data-lucide="alert-triangle"></i>',
      emergency:  '<i data-lucide="alert-octagon"></i>',
      outbound:   '<i data-lucide="arrow-up-right"></i>',
    };
    const icon = iconMap[ev.kind] || '<i data-lucide="dot"></i>';
    return `
      <div class="activity-row activity-${ev.kind}">
        <div class="activity-icon">${icon}</div>
        <div class="activity-body">
          <div class="activity-label">${escapeHTML(ev.label||'')}</div>
          ${ev.preview ? `<div class="activity-preview">${escapeHTML(ev.preview)}</div>` : ''}
        </div>
        <div class="activity-ts">${ago}</div>
      </div>`;
  }

  function timeAgo(d){
    const sec = Math.max(1, Math.floor((Date.now() - d.getTime())/1000));
    if (sec < 60)   return sec + 's ago';
    const min = Math.floor(sec/60);
    if (min < 60)   return min + 'm ago';
    const hr = Math.floor(min/60);
    if (hr  < 24)   return hr + 'h ago';
    return Math.floor(hr/24) + 'd ago';
  }

  // -------- QUEUE view --------
  function renderQueue(){
    const feed = state.feed || {};
    const escs  = feed.escalations || [];
    const apprs = feed.approvals   || [];
    const total = escs.length + apprs.length;

    let html = '<div class="section-eyebrow">Queue · ' + total + ' item' + (total===1?'':'s') + '</div>';

    if (!total){
      html += `
        <div style="text-align:center;padding:48px 20px">
          <div style="font-size:32px;margin-bottom:12px;color:var(--good)">✓</div>
          <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px">You're all caught up.</div>
          <div style="font-size:13.5px;color:var(--slate);max-width:340px;margin:0 auto 20px;line-height:1.6">
            No escalations or drafts waiting for your review right now.
          </div>
          <button class="btn btn-primary" onclick="goView('concierge')" style="padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;background:linear-gradient(180deg,var(--cyan-2),var(--cyan));color:#04243a;border:0;cursor:pointer">Start a task →</button>
        </div>`;
    } else {
      if (escs.length){
        html += '<div class="section-eyebrow" style="color:var(--hot);margin-bottom:12px">Needs your reply · ' + escs.length + '</div>';
        html += '<div class="rows">' + escs.map(e => `
          <div class="row-card ${e.category==='emergency'?'hot':''}" style="cursor:pointer" onclick="goView('patients')" title="Open conversation">
            <div class="text"><b>${escapeHTML(e.patient)}</b><span>${escapeHTML((e.category||'').replace(/_/g,' ') + (e.reasoning ? ' · ' + e.reasoning : ''))}</span></div>
            <span class="pill hot">${escapeHTML((e.category||'escalation').replace(/_/g,' '))}</span>
            <span style="color:var(--slate-3);font-size:18px;flex:0 0 auto">›</span>
          </div>`).join('') + '</div>';
      }
      if (apprs.length){
        html += '<div class="section-eyebrow" style="margin-top:24px;margin-bottom:12px">Drafts awaiting approval · ' + apprs.length + '</div>';
        html += '<div class="rows">' + apprs.map(m => `
          <div class="row-card" style="cursor:pointer" onclick="goView('patients')" title="Open conversation">
            <div class="text"><b>${escapeHTML(m.patient)}</b><span>${escapeHTML((m.body||'').slice(0,200))}</span></div>
            <span class="pill">draft</span>
            <span style="color:var(--slate-3);font-size:18px;flex:0 0 auto">›</span>
          </div>`).join('') + '</div>';
      }
    }
    main.innerHTML = html;
  }

  // -------- CONTACTS / PATIENTS view --------
  async function renderPatientsView(){
    if (state.contactsPage === 'import') { renderContactsImport(); return; }

    main.innerHTML = '<div class="loader">loading…</div>';
    try {
      const j = await fetch('/api/v1/patients', {credentials:'include'}).then(r=>r.json());
      state.patients = j.patients || [];
    } catch(_){ state.patients = []; }

    const importBtn = `<button id="go-import" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;background:rgba(0,184,230,.1);border:1px solid rgba(0,184,230,.25);color:var(--cyan-2);font-size:13px;font-weight:600;cursor:pointer"><i data-lucide="upload"></i>Import contacts</button>`;

    if (!state.patients.length){
      main.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div class="section-eyebrow" style="margin:0">Contacts</div>
          ${importBtn}
        </div>
        <div class="empty-row" style="text-align:center;padding:48px 24px">
          <div style="font-size:32px;margin-bottom:12px;opacity:.3">👤</div>
          <div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:6px">No contacts yet</div>
          <div style="font-size:13px;color:var(--ink-2)">Import a CSV to get started — Adapix begins follow-up automatically.</div>
        </div>`;
    } else {
      const statusColors = {consulted_not_started:'var(--warn)',treatment_started:'var(--good)',explicitly_declined:'var(--hot)',paused:'var(--ink-3)'};
      main.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div class="section-eyebrow" style="margin:0">Contacts · ${state.patients.length}</div>
          ${importBtn}
        </div>
        <div class="rows">${state.patients.slice(0,200).map(p => `
          <div class="row-card" style="cursor:default">
            <div class="text">
              <b>${escapeHTML((p.first_name||'') + ' ' + (p.last_name||''))}</b>
              <span>${escapeHTML(p.preferred_channel||'sms')}${p.treatment_type ? ' · ' + escapeHTML(p.treatment_type) : ''}${p.treatment_plan_amount ? ' · $' + Number(p.treatment_plan_amount).toLocaleString() : ''}</span>
            </div>
            <span class="pill" style="color:${statusColors[p.status]||'var(--ink-3)'};">${escapeHTML((p.status||'').replace(/_/g,' '))}</span>
          </div>`).join('')}
        </div>`;
    }
    renderLucide(main);
    main.querySelector('#go-import').addEventListener('click', () => goContactsView('import'));
  }

  function goContactsView(page){
    state.contactsPage = page;
    renderPatientsView();
  }

  function renderContactsImport(){
    main.innerHTML = `
      <button class="spage-back" id="ci-back">← Contacts</button>
      <div class="spage-head">
        <div class="spage-title">Import contacts</div>
        <div class="spage-sub">Upload a CSV and Adapix starts follow-up campaigns automatically. Only first_name, last_name, and phone or email are required.</div>
      </div>

      <div class="scard" style="margin-bottom:16px">
        <div class="scard-title">Step 1 — Get the template</div>
        <p style="font-size:13px;color:var(--ink-2);margin-bottom:14px">Download, fill it in with your contacts, then upload it below.</p>
        <a href="/api/v1/contacts/template.csv" download style="display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--ink);font-size:13px;font-weight:500;text-decoration:none"><i data-lucide="download"></i> Download template CSV</a>
      </div>

      <div class="scard" id="ci-upload-card">
        <div class="scard-title">Step 2 — Upload your CSV</div>
        <div class="ci-dropzone" id="ci-dropzone">
          <div style="font-size:36px;margin-bottom:14px;opacity:.35">📂</div>
          <div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:6px">Drop your CSV file here</div>
          <div style="font-size:12px;color:var(--ink-3);margin-bottom:18px">or</div>
          <label style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:9px;background:rgba(0,184,230,.1);border:1px solid rgba(0,184,230,.25);color:var(--cyan-2);font-size:13px;font-weight:600;cursor:pointer">
            <i data-lucide="upload"></i> Choose file
            <input type="file" id="ci-file" accept=".csv,text/csv" style="display:none">
          </label>
        </div>
      </div>

      <div id="ci-preview-card" style="display:none">
        <div class="scard" style="margin-bottom:16px">
          <div class="scard-title" id="ci-preview-title">Preview</div>
          <div id="ci-preview-table" style="overflow-x:auto;margin-bottom:18px;border-radius:8px;background:var(--bg-3);border:1px solid rgba(255,255,255,.05)"></div>
          <button id="ci-import-btn" style="padding:12px 28px;border-radius:10px;background:linear-gradient(180deg,var(--cyan-2),#00a8cc);color:#04243a;font-size:14px;font-weight:800;border:0;cursor:pointer;font-family:inherit">Import contacts →</button>
        </div>
      </div>

      <div id="ci-success" style="display:none;text-align:center;padding:56px 24px">

    const dropzone     = main.querySelector('#ci-dropzone');
    const uploadCard   = main.querySelector('#ci-upload-card');
    const previewCard  = main.querySelector('#ci-preview-card');

    async function handleFile(file){
      if (!file || !file.name.toLowerCase().endsWith('.csv')){ toast('Please select a .csv file'); return; }
      pendingFile = file;
      dropzone.style.opacity = '.4';
      dropzone.style.pointerEvents = 'none';

      const fd = new FormData();
      fd.append('file', file);
      fd.append('preview', 'true');

      try {
        const j = await fetch('/api/v1/contacts/import', {method:'POST', credentials:'include', body:fd}).then(r=>r.json());
        const rows = j.preview || [];
        const total = j.total || 0;
        const cols = (j.columns || []).filter(c => c);

        previewTitle.textContent = total + ' contact' + (total !== 1 ? 's' : '') + ' found';
        importBtn.textContent = 'Import ' + total + ' contact' + (total !== 1 ? 's' : '') + ' →';

        const th = cols.map(c => `<th>${escapeHTML(c)}</th>`).join('');
        const trs = rows.map(r => `<tr>${cols.map(c => `<td>${escapeHTML(r[c]||'')}</td>`).join('')}</tr>`).join('');
        previewTable.innerHTML = `<table class="ci-table"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`
          + (total > 5 ? `<div style="padding:8px 10px;font-size:11px;color:var(--ink-3)">Showing first 5 of ${total} rows</div>` : '');

        uploadCard.style.display = 'none';
        previewCard.style.display = 'block';
      } catch(e){
        toast('Could not read CSV — check the file format');
        dropzone.style.opacity = '';
        dropzone.style.pointerEvents = '';
      }
    }

    importBtn.addEventListener('click', async () => {
      if (!pendingFile) return;
      importBtn.textContent = 'Importing…';
      importBtn.disabled = true;

      const fd = new FormData();
      fd.append('file', pendingFile);
      fd.append('preview', 'false');

      try {
        const j = await fetch('/api/v1/contacts/import', {method:'POST', credentials:'include', body:fd}).then(r=>r.json());
        previewCard.style.display = 'none';
        successEl.style.display = 'block';
        main.querySelector('#ci-success-count').textContent = j.imported + ' contact' + (j.imported !== 1 ? 's' : '') + ' imported';
        if (j.errors && j.errors.length) toast(j.errors.length + ' row(s) skipped — check format');
      } catch(e){
        toast('Import failed — please try again');
        importBtn.textContent = 'Import contacts →';
        importBtn.disabled = false;
      }
    });

    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
  }

    const input = document.getElementById('agent-input');

    // --- Pending file attachments ---
    let pendingFiles = [];

    function renderAgentFileChips(){
      const row = document.getElementById('agent-file-preview');
      if (!row) return;
      row.innerHTML = '';
      pendingFiles.forEach((pf, i) => {
        const chip = document.createElement('div');
        chip.className = 'chat-file-chip';

        } else {
          chip.innerHTML = `<span class="chat-file-chip-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span class="chat-file-chip-name">${escapeHTML(pf.file.name)}</span>`;
        }
        const rm = document.createElement('button');

        rm.onclick = () => { pendingFiles.splice(i, 1); renderAgentFileChips(); };
        chip.appendChild(rm);
        row.appendChild(chip);
      });
    }

    // Attach button → file picker
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      Array.from(fileInput.files).forEach(file => {
        const pf = { file };
        if (file.type.startsWith('image/')) pf.url = URL.createObjectURL(file);
        pendingFiles.push(pf);
      });
      fileInput.value = '';
      renderAgentFileChips();
    });

    // --- Voice (Web Speech API) ---
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    const voiceOverlay = document.getElementById('voice-overlay');
    const voiceLabel = voiceOverlay ? voiceOverlay.querySelector('.voice-label') : null;

    function voiceError(msg) {
      if (voiceLabel) voiceLabel.textContent = msg;
      if (voiceOverlay) {
        voiceOverlay.removeAttribute('hidden');
        setTimeout(() => {
          voiceOverlay.setAttribute('hidden', '');
          if (voiceLabel) voiceLabel.textContent = 'Listening…';
        }, 3000);
      }
    }

    function stopVoice() {
      try { if (recognition) recognition.stop(); } catch(_) {}
      recognition = null;
      micBtn.dataset.state = 'idle';
      micBtn.setAttribute('aria-label', 'Voice input');
      if (voiceOverlay) voiceOverlay.setAttribute('hidden', '');
      if (voiceLabel) voiceLabel.textContent = 'Listening…';
    }

    if (!SpeechRec) {
      micBtn.style.opacity = '0.35';
      micBtn.style.cursor = 'not-allowed';
      micBtn.title = 'Voice input not supported in this browser (use Chrome or Edge)';
    } else {
      micBtn.addEventListener('click', () => {
        if (micBtn.dataset.state === 'listening') { stopVoice(); return; }

        recognition = new SpeechRec();
        recognition.continuous = true;      // keep listening until user stops
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        let baseLen = input.value.length;  // where to splice in new text
        let finalTranscript = '';

        micBtn.dataset.state = 'listening';
        micBtn.setAttribute('aria-label', 'Stop recording');
        if (voiceLabel) voiceLabel.textContent = 'Listening…';
        if (voiceOverlay) voiceOverlay.removeAttribute('hidden');

        recognition.onresult = (e) => {
          let interim = '';
          // Only process new results (from resultIndex onward)
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
            else interim = e.results[i][0].transcript;
          }
          input.value = input.value.substring(0, baseLen) + finalTranscript + interim;
          input.dispatchEvent(new Event('input'));
        };

        recognition.onend = () => {
          // In continuous mode onend fires on stop() or network drop
          if (micBtn.dataset.state === 'listening') stopVoice();
        };

        recognition.onerror = (e) => {
          const MSGS = {
            'not-allowed':         'Microphone access denied — check browser permissions',
            'service-not-allowed': 'Speech service blocked — try Chrome on localhost',
            'no-speech':           'No speech detected — try speaking louder',
            'network':             'Network error — speech API needs internet',
            'audio-capture':       'No microphone found',
          };
          if (e.error !== 'aborted') voiceError(MSGS[e.error] || `Mic error: ${e.error}`);
          stopVoice();
        };

        try { recognition.start(); }
        catch(err) { voiceError('Could not start microphone: ' + err.message); stopVoice(); }
      });
    }

    // Voice stop button
    if (voiceOverlay) {
      voiceOverlay.querySelector('.voice-stop-btn')?.addEventListener('click', stopVoice);
    }

    // Auto-resize textarea
    input.addEventListener('input', () => {

    input.addEventListener('keydown', e => {

    sendBtn.addEventListener('click', sendAgentMessage);

    async function sendAgentMessage(){
      const text = input.value.trim();
      if (!text && !pendingFiles.length) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      const thread = document.getElementById('agent-thread');
      thread.querySelector('.agent-empty-thread')?.remove();

      // Show user bubble with attachment badges
      const fileNames = pendingFiles.map(f => f.file.name);
      appendBubble(thread, 'user', text || '(attachment)', null, null, null, fileNames);

      // Build FormData (supports files)
      const fd = new FormData();
      fd.append('message', text);
      pendingFiles.forEach(pf => fd.append('files', pf.file));
      pendingFiles = [];
      renderAgentFileChips();

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      thread.appendChild(typing);
      thread.scrollTop = thread.scrollHeight;

      try {
        const r = await fetch('/api/v1/team-agents/' + slug + '/chat/send', {
          method: 'POST',
          credentials: 'include',
          body: fd,
        });
        const j = await r.json();
        typing.remove();
        appendBubble(thread, 'agent', j.reply || j.detail || 'Error', j.tools_used, j.document_path, slug);
      } catch(e) {
        typing.remove();
        appendBubble(thread, 'agent', 'Something went wrong — please try again.');
      } finally {
        sendBtn.disabled = false;
        thread.scrollTop = thread.scrollHeight;
        input.focus();
      }
    }

    async function loadAgentHistory(slug){
      try {
        const r = await fetch('/api/v1/team-agents/' + slug + '/chat/history', {credentials:'include'});
        const j = await r.json();
        const msgs = j.messages || [];
        if (!msgs.length) return;
        const thread = document.getElementById('agent-thread');
        thread.innerHTML = '';
        msgs.forEach(m => appendBubble(thread, m.role === 'user' ? 'user' : 'agent', m.content, m.tools_used));
        thread.scrollTop = thread.scrollHeight;
      } catch(_){}
    }

    function appendBubble(thread, role, text, toolsUsed, documentPath, slug, attachmentNames){
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap ' + role;
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      if (role === 'agent' && window.marked) {
        div.innerHTML = marked.parse(text || '');
      } else {
        div.textContent = text;
      }
      wrap.appendChild(div);
      if (role === 'agent' && toolsUsed && toolsUsed.length) {
        const bar = document.createElement('div');
        bar.className = 'tools-used-bar';
        bar.innerHTML = toolsUsed.map(t => `<span class="tool-tag">${escapeHTML(t)}</span>`).join('');
        wrap.appendChild(bar);
      }
      if (documentPath) {
        const dl = document.createElement('a');
        dl.className = 'doc-download-link';
        dl.href = '/api/v1/team-agents/' + (slug||'') + '/documents/' + encodeURIComponent(documentPath);
        dl.textContent = '📄 ' + documentPath;
        dl.target = '_blank';
        wrap.appendChild(dl);
      }
      // Attachment badges on user bubbles
      if (role === 'user' && attachmentNames && attachmentNames.length) {
        attachmentNames.forEach(name => {

  async function loadPluginStatus(){

      const j = await fetch('/api/v1/connectors', {credentials:'include'}).then(r => r.json());

      (j.connectors || []).forEach(c => { byId[c.id] = c; });

  function pluginPill(status){
    if (!status) return { label:'Unknown', cls:'idle' };
    if (status.connected)  return { label:'Live',          cls:'live' };

    return { label:'Needs setup', cls:'setup' };

  async function loadAutomations(){
    const r = await fetch('/api/v1/automations', {credentials:'include'});
    if (!r.ok) return [];
    return (await r.json()).automations || [];
  }

  function cronToHuman(cron){
    try {
      const parts = cron.split(' ');
      if (parts.length < 5) return cron;
      const [min, hr, dom, , dow] = parts;
      if (hr === '*') return 'Every hour';
      const h = parseInt(hr), m = parseInt(min);
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const time = h12 + ':' + (m < 10 ? '0'+m : String(m)) + ' ' + ampm;
      if (dow === '1-5') return 'Weekdays at ' + time;
      if (dow !== '*'){
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        return 'Every ' + (days[parseInt(dow)] || dow) + ' at ' + time;
      }
      if (dom !== '*') return 'Monthly, day ' + dom + ' at ' + time;
      return 'Daily at ' + time;
    } catch(_){ return cron; }
  }

  function timeAgo(iso){
    if (!iso) return 'Never';
    const ms = Date.now() - new Date(iso).getTime();
    const s = Math.floor(ms/1000);
    if (s < 60) return 'Just now';
    const m = Math.floor(s/60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m/60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
  }

  let autoFilter = 'all';

  async function renderAutomations(filter){
    filter = filter || autoFilter;
    autoFilter = filter;
    const autos = await loadAutomations().catch(()=>[]);

    // Update tab counts
    const ctAll    = document.getElementById('tab-ct-all');
    const ctActive = document.getElementById('tab-ct-active');
    const ctPaused = document.getElementById('tab-ct-paused');
    if (ctAll)    ctAll.textContent    = autos.length;
    if (ctActive) ctActive.textContent = autos.filter(a=>a.status==='active').length;
    if (ctPaused) ctPaused.textContent = autos.filter(a=>a.status==='paused').length;

    // Errors tab — show only when errors exist
    const errored = autos.filter(a => a.last_run_status === 'error');
    const tabs = document.getElementById('autos-tabs');
    if (tabs){
      let errTab = document.getElementById('tab-errors');
      if (errored.length && !errTab){
        errTab = document.createElement('button');
        errTab.className = 'autos-tab';
        errTab.id = 'tab-errors';
        errTab.dataset.filter = 'errors';
        errTab.innerHTML = 'Errors <span class="autos-tab-count" style="background:rgba(248,81,73,.12);color:#F85149">'+errored.length+'</span>';
        tabs.appendChild(errTab);
        errTab.addEventListener('click', () => {
          document.querySelectorAll('.autos-tab').forEach(t => t.classList.remove('active'));
          errTab.classList.add('active');
          autoFilter = 'errors';
          renderAutomations('errors');
        });
      } else if (errTab){
        if (!errored.length) errTab.remove();
        else errTab.querySelector('.autos-tab-count').textContent = errored.length;
      }
    }

    // Apply filter
    let filtered = autos;
    if (filter === 'active')  filtered = autos.filter(a => a.status === 'active');
    if (filter === 'paused')  filtered = autos.filter(a => a.status === 'paused');
    if (filter === 'errors')  filtered = errored;

    const container = document.getElementById('autos-list-container');
    if (!container) return;

    if (!filtered.length){
      container.innerHTML = '<div class="autos-empty">'
        + '<div class="autos-empty-icon"><i data-lucide="clock" style="width:36px;height:36px"></i></div>'
        + '<div class="autos-empty-title">'+(filter==='all'?'Schedule your first automation':'Nothing here yet')+'</div>'
        + '<div class="autos-empty-body">'+(filter==='all'
            ? 'Tell Adapix a URL and what to look for. It checks the page on your schedule and saves the result — no code, no manual checking.'
            : 'No automations match this filter right now.')+'</div>'
        + (filter==='all' ? '<button class="autos-new-btn" onclick="showAutoModal()"><i data-lucide="plus" style="width:16px;height:16px"></i> Create automation</button>' : '')
        + '</div>';
      lucide.createIcons();
      return;
    }

    container.innerHTML = '<div class="autos-list">' + filtered.map(a => {
      const isActive = a.status === 'active';
      const isError  = a.last_run_status === 'error';

      let runBadge = '';
      if (a.last_run_status === 'ok')
        runBadge = '<span class="run-badge ok"><i data-lucide="check" style="width:12px;height:12px"></i> Success</span>';
      else if (a.last_run_status === 'error')
        runBadge = '<span class="run-badge fail"><i data-lucide="x" style="width:12px;height:12px"></i> Failed</span>';

      const runTs = a.last_run_at
        ? '<span class="run-ts">'+new Date(a.last_run_at).toLocaleString()+'</span>'
        : '';

      const dlBtn = a.has_result
        ? '<button class="auto-icon-btn dl auto-dl-btn" data-id="'+a.id+'" title="Download result"><i data-lucide="download" style="width:14px;height:14px"></i></button>'
        : '';

      const errorBanner = isError
        ? '<div class="auto-error-banner">Last run failed. Check the URL is accessible and the task description is clear, then retry.</div>'
        : '';

      return '<div class="auto-card'
        + (!isActive ? ' paused'      : '')
        + (isError   ? ' error-state' : '')
        + '" data-id="'+a.id+'">'
        + '<div class="auto-card-top">'
        +   '<div class="auto-name-row">'
        +     '<span class="auto-status-dot '+(isActive?'active':'paused')+'"></span>'
        +     '<span class="auto-name">'+escapeHTML(a.name)+'</span>'
        +   '</div>'
        +   '<span class="auto-fmt-pill'+(isActive?'':' paused')+'">'+a.output_format.toUpperCase()+'</span>'
        + '</div>'
        + '<div class="auto-card-meta">'
        +   '<div class="meta-cell">'
        +     '<div class="meta-label">Schedule</div>'
        +     '<div class="meta-schedule">'+escapeHTML(cronToHuman(a.schedule))+'</div>'
        +     '<div class="meta-cron">'+escapeHTML(a.schedule)+'</div>'
        +   '</div>'
        +   '<div class="meta-cell">'
        +     '<div class="meta-label">Task</div>'
        +     '<div class="meta-task" title="'+escapeAttr(a.task)+'">'+escapeHTML(a.task)+'</div>'
        +   '</div>'
        +   '<div class="meta-cell">'
        +     '<div class="meta-label">Last run</div>'
        +     '<div class="meta-value">'+timeAgo(a.last_run_at)+'</div>'
        +   '</div>'
        + '</div>'
        + '<div class="auto-card-run">'+runBadge+runTs+'</div>'
        + errorBanner
        + '<div class="auto-card-footer">'
        +   '<div class="auto-actions-left">'
        +     '<button class="auto-icon-btn run auto-run-btn" data-id="'+a.id+'" title="'+(isError?'Retry now':'Run now')+'">'
        +       '<i data-lucide="'+(isError?'rotate-ccw':'play')+'" style="width:14px;height:14px"></i>'
        +     '</button>'
        +     dlBtn
        +     '<div class="auto-action-divider"></div>'
        +     '<button class="auto-pause-ghost'+(isActive?'':' resume')+' auto-pause-btn" data-id="'+a.id+'">'+(isActive?'Pause':'Resume')+'</button>'
        +   '</div>'
        +   '<div class="auto-actions-right">'
        +     '<button class="auto-icon-btn edit auto-edit-btn" data-id="'+a.id
        +       +'" data-auto=\''+JSON.stringify(a).replace(/'/g,"&#39;")+'\' title="Edit">'
        +       '<i data-lucide="pencil" style="width:13px;height:13px"></i>'
        +     '</button>'
        +     '<button class="auto-icon-btn del auto-del-btn" data-id="'+a.id+'" title="Delete">'
        +       '<i data-lucide="trash-2" style="width:13px;height:13px"></i>'
        +     '</button>'
        +   '</div>'
        + '</div>'
        + '</div>';
    }).join('') + '</div>';

    lucide.createIcons();

    // Expand task on click
    container.querySelectorAll('.meta-task').forEach(el => {
      el.addEventListener('click', () => el.classList.toggle('expanded'));
    });

    // Run buttons
    container.querySelectorAll('.auto-run-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const card = container.querySelector('.auto-card[data-id="'+id+'"]');
        btn.disabled = true;
        const runArea = card && card.querySelector('.auto-card-run');
        if (runArea) runArea.innerHTML = '<span class="run-badge running">Running — up to 60 seconds…</span>';
        card && card.querySelectorAll('.auto-edit-btn,.auto-del-btn,.auto-pause-btn').forEach(b => { b.disabled = true; });
        try {
          await fetch('/api/v1/automations/'+id+'/run', {method:'POST',credentials:'include'});
          toast('Automation started — results appear when done.');
          setTimeout(()=>renderAutomations(filter), 5000);
        } catch(e){ toast('Failed to start automation.'); renderAutomations(filter); }
      });
    });

    // Download buttons
    container.querySelectorAll('.auto-dl-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = '/api/v1/automations/'+btn.dataset.id+'/download';
        a.download = '';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
    });

    // Pause/resume buttons
    container.querySelectorAll('.auto-pause-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch('/api/v1/automations/'+btn.dataset.id+'/pause', {method:'POST',credentials:'include'});
        await renderAutomations(filter);
      });
    });

    // Delete — inline confirm
    container.querySelectorAll('.auto-del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const card = container.querySelector('.auto-card[data-id="'+id+'"]');
        const footer = card && card.querySelector('.auto-card-footer');
        if (!footer) return;
        footer.innerHTML = '<div class="auto-del-confirm">'
          + '<span>Delete this automation?</span>'
          + '<button class="confirm-yes">Yes, delete</button>'
          + '<button class="confirm-no">Cancel</button>'
          + '</div>';
        footer.querySelector('.confirm-yes').addEventListener('click', async () => {
          await fetch('/api/v1/automations/'+id, {method:'DELETE',credentials:'include'});
          await renderAutomations(filter);
        });
        footer.querySelector('.confirm-no').addEventListener('click', () => renderAutomations(filter));
      });
    });

    // Edit buttons
    container.querySelectorAll('.auto-edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        try { showAutoModal(JSON.parse(btn.dataset.auto)); } catch(_){}
      });
    });
  }

  function detectPreset(cron){
    try {
      const [min, hr, dom, , dow] = (cron||'0 9 * * *').split(' ');
      if (hr === '*') return { preset:'hourly', hour:'9', minute:'00', ampm:'AM' };
      const h = parseInt(hr), m = parseInt(min);
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const mm = m < 10 ? '0'+m : String(m);
      if (dow === '1-5') return { preset:'weekdays', hour:String(h12), minute:mm, ampm };
      if (dow === '1')   return { preset:'mon',      hour:String(h12), minute:mm, ampm };
      if (dom !== '*')   return { preset:'monthly',  hour:String(h12), minute:mm, ampm };
      if (dow === '*')   return { preset:'daily',    hour:String(h12), minute:mm, ampm };
      return { preset:'custom', hour:'9', minute:'00', ampm:'AM', customCron: cron };
    } catch(_){
      return { preset:'daily', hour:'9', minute:'00', ampm:'AM' };
    }
  }

  function buildCronFromModal(){
    const preset = (document.getElementById('am-selected-preset')||{}).value || 'daily';
    if (preset === 'hourly') return '0 * * * *';
    if (preset === 'custom'){
      return ((document.getElementById('am-custom-cron-val')||{}).value||'').trim() || '0 9 * * *';
    }
    const hr12 = Math.min(12, Math.max(1, parseInt(((document.getElementById('am-hour')||{}).value)||'9') || 9));
    const m    = Math.min(59, Math.max(0,  parseInt(((document.getElementById('am-min')||{}).value)||'0')  || 0));
    const ampm = ((document.getElementById('am-ampm')||{}).value) || 'AM';
    const hr24 = ampm === 'PM' ? (hr12 === 12 ? 12 : hr12 + 12) : (hr12 === 12 ? 0 : hr12);
    if (preset === 'daily')    return m+' '+hr24+' * * *';
    if (preset === 'weekdays') return m+' '+hr24+' * * 1-5';
    if (preset === 'mon')      return m+' '+hr24+' * * 1';
    if (preset === 'monthly')  return m+' '+hr24+' 1 * *';
    return m+' '+hr24+' * * *';
  }

  function showAutoModal(existing){
    const isEdit = !!existing;
    const p = detectPreset(isEdit ? existing.schedule : '0 9 * * *');

    const PRESETS = [
      { key:'daily',    label:'Every day at…' },
      { key:'weekdays', label:'Every weekday (Mon–Fri) at…' },
      { key:'mon',      label:'Every Monday at…' },
      { key:'hourly',   label:'Every hour' },
      { key:'monthly',  label:'1st of every month at…' },
      { key:'custom',   label:'Custom cron expression…', fullWidth:true },
    ];

    const presetButtons = PRESETS.map(ps =>
      '<button type="button" class="am-preset'
      + (p.preset === ps.key ? ' selected' : '')
      + (ps.fullWidth ? ' full-width' : '')
      + '" data-preset="'+ps.key+'">'
      + escapeHTML(ps.label)
      + '</button>'
    ).join('');

    const showTime = p.preset !== 'hourly' && p.preset !== 'custom';

    const backdrop = document.createElement('div');
    backdrop.className = 'auto-modal-backdrop';
    backdrop.innerHTML = '<div class="auto-modal" style="max-height:90vh;overflow-y:auto">'
      + '<h2>'+(isEdit?'Edit automation':'New automation')+'</h2>'

      + '<div class="auto-field"><label>Name</label>'
      +   '<input id="am-name" placeholder="e.g. Daily competitor pricing" autofocus value="'+escapeHTML(isEdit?existing.name:'')+'"></div>'

      + '<div class="auto-field"><label>What to extract</label>'
      +   '<textarea id="am-task" rows="3" placeholder="Find all product prices and their names. Include any discounts or sale prices shown.">'+escapeHTML(isEdit?existing.task:'')+'</textarea></div>'

      + '<div class="auto-field"><label>Schedule</label>'
      +   '<div class="am-presets">'+presetButtons+'</div>'
      +   '<input type="hidden" id="am-selected-preset" value="'+p.preset+'">'
      +   '<div id="am-time-row" class="am-time-row" style="display:'+(showTime?'flex':'none')+'">'
      +     '<span class="am-time-label">at</span>'
      +     '<input id="am-hour" type="number" min="1" max="12" value="'+p.hour+'" style="width:52px" placeholder="9">'
      +     '<span style="font-size:13px;color:var(--slate-3)">:</span>'
      +     '<input id="am-min" type="number" min="0" max="59" value="'+p.minute+'" style="width:52px" placeholder="00">'
      +     '<select id="am-ampm" style="width:70px">'
      +       '<option value="AM"'+(p.ampm==='AM'?' selected':'')+'>AM</option>'
      +       '<option value="PM"'+(p.ampm==='PM'?' selected':'')+'>PM</option>'
      +     '</select>'
      +   '</div>'
      +   '<div id="am-custom-cron" class="am-custom-cron'+(p.preset==='custom'?' visible':'')+'">'
      +     '<input id="am-custom-cron-val" placeholder="e.g. 0 9 * * 1" value="'+(p.preset==='custom'&&isEdit?escapeHTML(existing.schedule):'')+'">'
      +   '</div>'
      + '</div>'

      + '<div class="auto-field"><label>Website URL</label>'
      +   '<input id="am-url" placeholder="https://example.com/pricing" value="'+escapeHTML(isEdit?existing.url:'')+'"></div>'

      + '<div class="auto-field"><label>Output format</label>'
      +   '<select id="am-format">'
      +     '<option value="docx"'+(isEdit&&existing.output_format==='docx'?' selected':'')+'>Word document (.docx)</option>'
      +     '<option value="txt"'+(isEdit&&existing.output_format==='txt'?' selected':'')+'>Plain text (.txt)</option>'
      +     '<option value="json"'+(isEdit&&existing.output_format==='json'?' selected':'')+'>JSON (.json)</option>'
      +   '</select></div>'

      + '<div class="auto-modal-actions">'
      +   '<button class="auto-pause-ghost" id="am-cancel">Cancel</button>'
      +   '<button class="autos-new-btn" id="am-save">'+(isEdit?'Save changes':'Create automation')+'</button>'
      + '</div>'
      + '</div>';

    document.body.appendChild(backdrop);

    // Preset selection
    backdrop.querySelectorAll('.am-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        backdrop.querySelectorAll('.am-preset').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const preset = btn.dataset.preset;
        document.getElementById('am-selected-preset').value = preset;
        const timeRow    = document.getElementById('am-time-row');
        const customCron = document.getElementById('am-custom-cron');
        timeRow.style.display = (preset !== 'hourly' && preset !== 'custom') ? 'flex' : 'none';
        customCron.classList[preset === 'custom' ? 'add' : 'remove']('visible');
      });
    });

    document.getElementById('am-cancel').addEventListener('click', () => backdrop.remove());
    backdrop.addEventListener('click', e => { if(e.target === backdrop) backdrop.remove(); });

    document.getElementById('am-save').addEventListener('click', async () => {
      const name = document.getElementById('am-name').value.trim();
      const url  = document.getElementById('am-url').value.trim();
      const task = document.getElementById('am-task').value.trim();
      if (!name || !url || !task){ toast('Name, URL, and task are required.'); return; }
      const body = {
        name, url, task,
        schedule:      buildCronFromModal(),
        output_format: document.getElementById('am-format').value,
      };
      const endpoint = isEdit ? '/api/v1/automations/'+existing.id : '/api/v1/automations';
      const method   = isEdit ? 'PATCH' : 'POST';
      const r = await fetch(endpoint, {method, credentials:'include',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      if (r.ok){
        backdrop.remove();
        toast(isEdit ? 'Automation updated.' : 'Automation created.');
        await renderAutomations(autoFilter);
      } else {
        toast('Save failed — check the server logs.');
      }
    });
  }

  async function handlePluginAction(key, action){
    if (action === 'help'){
      toast('Add credentials to your .env file, then restart the server.');
      return;
    }
    if (action === 'connect'){
      const path = key === 'google'
        ? '/api/v1/oauth/google/start'
        : key === 'microsoft' ? '/api/v1/oauth/microsoft/start' : null;
      if (!path) { toast('This plug-in does not need a connect step.'); return; }
      const r = await fetch(path, {credentials:'include'}).then(r => r.json());
      if (r.url) window.location.href = r.url;
      return;
    }
    if (action === 'test'){
      toast('Sending test message for ' + key + '…');
      try {
        const r = await fetch('/api/v1/' + key + '/test', {
          method: 'POST',
          credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({to: 'test@adapix.com'}),
        });
        const j = await r.json().catch(()=>({}));
        if (r.ok) toast(key + ' test sent successfully.');
        else toast('Test failed: ' + (j.detail || r.status));
      } catch(e) {
        toast('Test failed — check that ' + key + ' credentials are set in .env');
      }
      return;
    }
  }

          <div class="scard-title">Business hours</div>
          <div class="sform-2col">
            <div class="sform-row"><label class="sform-label">Weekdays (Mon&ndash;Fri)</label><input class="sform-input" placeholder="9:00 AM &ndash; 5:00 PM" /></div>

        </div>

    } else if (page === 'channels'){
      body = `
        <div class="scard">
          <div class="scard-title">Connected channels</div>
          <div class="sch-row">
            <div class="sch-icon"><i data-lucide="message-square" style="width:16px;height:16px"></i></div>
            <div class="sch-body"><div class="sch-name">SMS</div><div class="sch-val">Not configured</div></div>
            <span class="sch-badge off">Disconnected</span>
            <button class="sch-connect" data-action="connect-sms">Connect</button>
          </div>
          <div class="sch-row">
            <div class="sch-icon"><i data-lucide="mail" style="width:16px;height:16px"></i></div>
            <div class="sch-body"><div class="sch-name">Email</div><div class="sch-val">Not configured</div></div>
            <span class="sch-badge off">Disconnected</span>
            <button class="sch-connect" data-action="connect-email">Connect</button>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title">Notify me when</div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Customer needs a human reply</div><div class="stoggle-hint">Escalations &mdash; Adapix could not handle it automatically</div></div>
            <label class="stoggle"><input type="checkbox" checked /><span class="stoggle-track"></span></label>

          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Drafts are ready to review</div><div class="stoggle-hint">When Adapix writes messages waiting for your approval</div></div>
            <label class="stoggle"><input type="checkbox" checked /><span class="stoggle-track"></span></label>
          </div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Campaign pass completes</div><div class="stoggle-hint">Summary after each automated send cycle</div></div>
            <label class="stoggle"><input type="checkbox" /><span class="stoggle-track"></span></label>
          </div>
        </div>
        <button class="sform-save" data-action="save">Save changes</button>`;

    } else if (page === 'rules'){
      body = `
        <div class="scard">
          <div class="scard-title">Timing</div>
          <div class="sform-row">
            <label class="sform-label">First follow-up after appointment</label>
            <select class="sform-input sform-select"><option>Same day</option><option>1 day later</option><option selected>2 days later</option><option>3 days later</option><option>1 week later</option></select>
            <div class="sform-hint">When Adapix sends the first post-visit check-in</div>
          </div>
          <div class="sform-row">
            <label class="sform-label">Re-contact window</label>
            <select class="sform-input sform-select"><option>Once</option><option selected>Up to 2 times</option><option>Up to 3 times</option><option>Until they respond</option></select>
            <div class="sform-hint">How many times Adapix follows up without a reply</div>
          </div>
          <div class="sform-row">
            <label class="sform-label">Win-back: reach dormant customers after</label>
            <select class="sform-input sform-select"><option>3 months</option><option>6 months</option><option selected>12 months</option><option>18 months</option><option>Never</option></select>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title">Tone</div>
          <div class="sform-row">
            <label class="sform-label">Default message tone</label>
            <div class="stone-opts">
              <button class="stone-opt">Formal</button>
              <button class="stone-opt active">Warm</button>
              <button class="stone-opt">Casual</button>
              <button class="stone-opt">Concise</button>
            </div>
            <div class="sform-hint">Applies to all automated messages. You can override per-campaign in chat.</div>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title">Approval</div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Auto-approve routine messages</div><div class="stoggle-hint">Standard follow-ups and reminders send without your review. Unusual messages still queue for approval.</div></div>
            <label class="stoggle"><input type="checkbox" /><span class="stoggle-track"></span></label>
          </div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Require approval for win-back messages</div><div class="stoggle-hint">Always review messages to dormant customers before they send</div></div>
            <label class="stoggle"><input type="checkbox" checked /><span class="stoggle-track"></span></label>
          </div>
        </div>
        <button class="sform-save" data-action="save">Save changes</button>`;

    } else if (page === 'account'){
      body = `
        <div class="scard">
          <div class="scard-title">Current plan</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div>
              <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px">Starter &nbsp;<span class="splan-badge">Active</span></div>
              <div style="font-size:13px;color:var(--slate-2)">Up to 200 contacts &middot; 500 messages/mo</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            <div style="background:rgba(255,255,255,.04);border-radius:9px;padding:13px 14px"><div style="font-size:11px;color:var(--slate-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Messages</div><div style="font-size:22px;font-weight:700;color:#00D4FF">0</div><div style="font-size:11px;color:var(--slate-3)">of 500 this month</div></div>
            <div style="background:rgba(255,255,255,.04);border-radius:9px;padding:13px 14px"><div style="font-size:11px;color:var(--slate-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Contacts</div><div style="font-size:22px;font-weight:700;color:#E6EDF3">0</div><div style="font-size:11px;color:var(--slate-3)">of 200 max</div></div>
            <div style="background:rgba(255,255,255,.04);border-radius:9px;padding:13px 14px"><div style="font-size:11px;color:var(--slate-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Renews</div><div style="font-size:22px;font-weight:700;color:#3FB950">&mdash;</div><div style="font-size:11px;color:var(--slate-3)">billing not set up</div></div>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title">Team members</div>
          <div class="smember-row">
            <div class="smember-av">RC</div>
            <div><div class="smember-name">You</div><div class="smember-role">Owner</div></div>
          </div>
          <div style="margin-top:14px">
            <button class="sch-connect" style="font-size:13px;padding:7px 14px" data-action="invite">+ Invite team member</button>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title" style="color:#F85149">Danger zone</div>
          <div style="font-size:13px;color:var(--slate-2);margin-bottom:14px;line-height:1.55">Deactivating pauses all automations and prevents Adapix from sending messages. You can reactivate at any time.</div>
          <button class="sdanger-btn" data-action="deactivate">Deactivate practice</button>
        </div>`;
    }

    main.innerHTML = `
      <div class="spage">
        <button class="spage-back" data-action="back"><i data-lucide="arrow-left" style="width:14px;height:14px"></i> Settings</button>
        <div class="spage-head">
          <div class="spage-title">${meta.title}</div>
          <div class="spage-sub">${meta.sub}</div>
        </div>
        ${body}
      </div>`;

    renderLucide(main);

    main.querySelector('[data-action="back"]').addEventListener('click', () => goSettingsView(null));

    main.querySelectorAll('.sform-save, [data-action="save"]').forEach(btn => {
      btn.addEventListener('click', () => toast('Changes saved'));
    });
    const inv = main.querySelector('[data-action="invite"]');
    if (inv) inv.addEventListener('click', () => toast('Invite link copied — feature coming soon'));
    const deact = main.querySelector('[data-action="deactivate"]');
    if (deact) deact.addEventListener('click', () => toast('Contact support to deactivate your account', true));
    const conSms = main.querySelector('[data-action="connect-sms"]');
    if (conSms) conSms.addEventListener('click', () => toast('SMS setup coming soon'));
    const conEmail = main.querySelector('[data-action="connect-email"]');
    if (conEmail) conEmail.addEventListener('click', () => toast('Email setup coming soon'));

    main.querySelectorAll('.stone-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        main.querySelectorAll('.stone-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Specialty picker (profile page only)
    if (page === 'profile') {
      const stypeSearch = main.querySelector('#stype-search');
      const stypeDD    = main.querySelector('#stype-dropdown');
      const stypeSel   = main.querySelector('#stype-selected');
      const stypeSelN  = main.querySelector('#stype-selected-name');
      const stypeSelC  = main.querySelector('#stype-selected-cat');
      const stypeClr   = main.querySelector('#stype-clear');

      function stypeFuzzy(it, q){
        const n = it.name.toLowerCase(), c = it.cat.toLowerCase();
        if (n.startsWith(q)) return 1000;
        const ni = n.indexOf(q); if (ni >= 0) return 800 - ni;
        const ci = c.indexOf(q); if (ci >= 0) return 400 - ci;
        return -1;
      }

      function stypeRenderDD(items, showHdr){
        const rows = items.map(it =>
          `<div class="stype-row" data-id="${it.id}"><b>${it.name}</b><span class="stype-cat">${it.cat}</span></div>`
        ).join('');
        const hdr = showHdr ? '<div class="stype-examples-hd">Examples — start typing to search 200+ types</div>' : '';
        const notListed = '<div class="stype-row notlisted" data-id="__other"><b>Not listed — describe it yourself</b><span class="stype-cat">free text</span></div>';
        stypeDD.innerHTML = items.length === 0
          ? '<div class="stype-empty">No matches — try another word</div>' + notListed
          : hdr + rows + notListed;
        stypeDD.hidden = false;
        stypeDD.querySelectorAll('[data-id]').forEach(el => {
          el.addEventListener('mousedown', e => {
            e.preventDefault();
            const id = el.dataset.id;
            if (id === '__other'){
              stypeSearch.value = '';
              stypeDD.hidden = true;
              stypeSel.hidden = true;
              return;
            }
            const it = BUSINESS_TYPES.find(x => x.id === id);
            if (!it) return;
            stypeSearch.value = it.name;
            stypeSelN.textContent = it.name;
            stypeSelC.textContent = it.cat;
            stypeSel.hidden = false;
            stypeDD.hidden = true;
          });
        });
      }

      function stypeShowDefaults(){
        const items = STYPE_DEFAULTS.map(id => BUSINESS_TYPES.find(b => b.id === id)).filter(Boolean);
        stypeRenderDD(items, true);
      }

      stypeSearch.addEventListener('focus', stypeShowDefaults);
      stypeSearch.addEventListener('input', () => {
        const q = stypeSearch.value.trim().toLowerCase();
        if (!q){ stypeShowDefaults(); return; }
        const items = BUSINESS_TYPES
          .map(it => ({it, s: stypeFuzzy(it, q)}))
          .filter(x => x.s >= 0)
          .sort((a, b) => b.s - a.s)
          .slice(0, 8)
          .map(x => x.it);
        stypeRenderDD(items, false);
      });
      stypeSearch.addEventListener('blur', () => { setTimeout(() => { stypeDD.hidden = true; }, 120); });
      stypeClr.addEventListener('click', () => {
        stypeSearch.value = '';
        stypeSel.hidden = true;
      });
    }
  }

  function renderRightPane(){
    const feed = state.feed || {};
    const d = feed.digest || {};
    const sent = d.sent_today || 0;
    const esc = (feed.escalations || []).length;
    const dr = (feed.approvals || []).length;
    const booked = d.booked_recently || 0;
    const totalMsgs = sent + dr;
    const arc = Math.min(100, Math.round((sent / Math.max(1, totalMsgs)) * 100));
    const rp = document.getElementById('rightpane');
    if (!rp) return;
    rp.innerHTML =
        '<div class="rp-card today-card">'
      +   '<div class="rp-eyebrow">Today</div>'
      +   '<div class="stat-grid">'
      +     '<div class="stat-tile stat-sent"><div class="stat-icon"><i data-lucide="send"></i></div><div class="stat-num">'+sent+'</div><div class="stat-lbl">Sent</div></div>'
      +     '<div class="stat-tile stat-esc"><div class="stat-icon"><i data-lucide="alert-circle"></i></div><div class="stat-num">'+esc+'</div><div class="stat-lbl">Flagged</div></div>'
      +     '<div class="stat-tile stat-draft"><div class="stat-icon"><i data-lucide="file-edit"></i></div><div class="stat-num">'+dr+'</div><div class="stat-lbl">Drafts</div></div>'
      +     '<div class="stat-tile stat-booked"><div class="stat-icon"><i data-lucide="calendar-check"></i></div><div class="stat-num">'+booked+'</div><div class="stat-lbl">Booked</div></div>'
      +   '</div>'
      +   '<div class="rp-progress"><div class="rp-progress-bar" style="width:'+arc+'%"></div></div>'
      +   '<div class="rp-progress-lbl"><span>'+sent+' sent</span><span>'+dr+' pending review</span></div>'
      + '</div>'
      + '<div class="rp-card device-card">'
      +   '<div class="device-visual"><div class="device-box"><div class="device-glow"></div><div class="device-label">ADAPT</div></div></div>'
      +   '<div class="device-body">'
      +     '<div class="rp-eyebrow" style="margin-bottom:8px">Your appliance</div>'
      +     '<div class="device-name">Adapt 1.0</div>'
      +     '<div class="device-rows">'
      +       '<div class="device-row"><div class="device-row-dot"></div><span>Connection</span><b>Online</b></div>'
      +       '<div class="device-row"><span class="device-row-icon">⏱</span><span>Uptime</span><b>'+formatUptime(Date.now()-(state._bootedAt||Date.now()))+'</b></div>'
      +       '<div class="device-row"><span class="device-row-icon">⌥</span><span>Version</span><b>v0.1.0</b></div>'
      +     '</div>'
      +   '</div>'
      + '</div>';
    renderLucide(rp);
  }

  function formatUptime(ms){
    const s = Math.floor(ms/1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s/60);
    if (m < 60) return m + 'm';
    const h = Math.floor(m/60);
    return h + 'h ' + (m%60) + 'm';
  }

  async function loadFeed(){
    try { state.feed = await fetch('/api/v1/feed', {credentials:'include'}).then(r=>r.json()); }
    catch(_){ state.feed = {}; }
  }

  function goView(name){
    state.view = name;
    state.settingsPage = null;
    state.contactsPage = null;
    document.querySelectorAll('#topnav button, #leftnav button').forEach(b => {
      b.classList.toggle('on', b.dataset.view === name);
    });
    render();
  }

  function goSettingsView(page){
    state.settingsPage = page;
    renderSettingsLink();
  }

  function bindNav(){
    document.querySelectorAll('#topnav button, #leftnav button').forEach(b => {
      if (!b.dataset.view) return;
      b.addEventListener('click', () => goView(b.dataset.view));
    });
    const rl = document.getElementById('reload');
    if (rl) rl.addEventListener('click', async () => { await loadFeed(); render(); });

    const runBtn = document.getElementById('run-campaigns');
    if (runBtn) runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      runBtn.innerHTML = '<i data-lucide="loader-2" style="animation:spin .7s linear infinite"></i><span>Running…</span>';
      renderLucide(runBtn);
      try {
        const r = await fetch('/api/v1/campaigns/run', {method:'POST', credentials:'include'});
        const j = await r.json();
        const composed = (j.results||[]).reduce((s,x)=>s+(x.composed||0),0);
        const errs = (j.errors||[]).length;
        if (errs && !composed) {
          toast('Campaign pass hit an error — Claude API may be busy. Will retry in 5 min.');
        } else if (composed > 0) {
          toast(composed + ' message' + (composed===1?'':'s') + ' drafted — check the Queue tab to approve.');
          await loadFeed(); render();
        } else {
          toast('No messages due right now. Campaigns are up to date.');
        }
      } catch(e) {
        toast('Could not reach server. Is it running?');
      } finally {
        runBtn.disabled = false;
        runBtn.innerHTML = '<i data-lucide="play"></i><span>Run</span>';
        renderLucide(runBtn);
      }
    });
  }

  (async function init(){
    state._bootedAt = Date.now();
    bindNav();
    if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': '1.75' } });
    await loadFeed();
    document.getElementById('loader')?.remove();
    render();
    setInterval(()=>{ try { renderRightPane(); } catch(_){} }, 60000);
  })();
})();
</script>
