<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Adapix</title>
<meta name="theme-color" content="#040b1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Adapix" />
<link rel="manifest" href="/app/manifest.json" />
<link rel="icon" type="image/svg+xml" href="/static/adapix_mark.svg" />
<link rel="apple-touch-icon" href="/app/icon-192.png" />
<link rel="icon" href="/app/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d2c5d; --navy-2:#08193a; --navy-3:#040b1a;
  --cyan:#00b8e6; --cyan-2:#00d4ff; --cyan-3:#aef0ff;
  --ink:#ffffff; --slate:#a9bbd9; --slate-2:#7fa0d6; --slate-3:#4a6a99;
  --line:rgba(0,184,230,.18);
  --warn:#f4cc77; --hot:#ff8c86; --good:#79e08e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Inter','SF Pro Display',system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(ellipse at 25% -10%, rgba(0,100,180,.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 110%, rgba(0,80,150,.28) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 30%, rgba(0,212,255,.08) 0%, transparent 50%),
    linear-gradient(180deg, #0a1834 0%, #061634 100%);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  line-height:1.45;
  min-height:100vh;
  letter-spacing:-.003em;
  font-feature-settings:"ss01","cv11";
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
button{font:inherit;cursor:pointer;color:inherit;background:transparent;border:0}
a{color:inherit;text-decoration:none}

/* ================================================================
   The outer "window" container — full-bleed, fills the entire viewport.
   The body's gradient background is what you see through any
   semi-transparent overlays.
   ================================================================ */
.window{
  max-width:none;
  margin:0;
  border-radius:0;
  background:transparent;
  border:0;
  box-shadow:none;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.window > .body{
  flex:1;
}

/* ================================================================
   Top bar — traffic lights + Adapix brand + horizontal nav + actions
   ================================================================ */
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:13px 22px;
  border-bottom:1px solid rgba(255,255,255,.05);
  background:rgba(8,18,42,.72);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  position:sticky;top:0;z-index:50;
}
.dots{display:flex;gap:7px;flex:0 0 auto}
.dot{width:11px;height:11px;border-radius:50%}
.dot.r{background:#ff5f56}
.dot.y{background:#ffbd2e}
.dot.g{background:#27c93f}
.brand{display:flex;align-items:center;gap:11px;margin-left:10px}
.brand .mark{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 0 12px rgba(0,212,255,.45));
}
.brand .mark img{width:100%;height:100%;object-fit:contain;display:block}
.brand b{font-size:15.5px;font-weight:700;letter-spacing:-.005em;color:#fff}
.brand .pulse{
  width:7px;height:7px;border-radius:50%;background:var(--cyan-2);
  box-shadow:0 0 10px var(--cyan);animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(.7);opacity:.5}
  50%{transform:scale(1.2);opacity:1}
}

.topnav{display:flex;gap:4px;margin-left:14px;flex:1;min-width:0;overflow-x:auto}
.topnav button{
  padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--slate);white-space:nowrap;letter-spacing:-.005em;
  transition:background .25s cubic-bezier(.16,1,.3,1),color .25s cubic-bezier(.16,1,.3,1),transform .15s;
}
.topnav button:active{transform:scale(.96)}
.topnav button:hover{background:rgba(255,255,255,.04);color:#fff}
.topnav button.on{
  background:rgba(0,184,230,.12);color:var(--cyan-2);
  position:relative;
}
.topnav button.on::after{
  content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;border-radius:2px 2px 0 0;
  background:var(--cyan-2);box-shadow:0 0 8px var(--cyan);
}
.topnav button .ct{
  display:inline-block;margin-left:5px;font-family:'JetBrains Mono',monospace;
  font-size:10.5px;color:#aef0ff;background:rgba(0,184,230,.15);
  padding:1px 6px;border-radius:5px;transition:color .2s,background .2s;
}
.topnav button .ct.hot{color:#F85149;background:rgba(248,81,73,.15)}

.actions{display:flex;gap:8px;align-items:center}
.icon-btn{
  width:34px;height:34px;border-radius:9px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--slate);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:background .12s,color .12s;
}
.icon-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.icon-btn--label{width:auto;padding:0 12px;gap:6px;font-size:13px;font-weight:600}
.icon-btn--label span{letter-spacing:-.005em}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
.cta{
  padding:0 16px;height:34px;border-radius:9px;
  background:linear-gradient(160deg, var(--cyan-2) 0%, var(--cyan) 100%);color:#031428;
  font-weight:700;font-size:12.5px;letter-spacing:.02em;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 8px 22px -8px rgba(0,212,255,.65),0 0 0 1px rgba(0,212,255,.35) inset;
  transition:box-shadow .2s,transform .15s;
}
.cta:hover{
  box-shadow:0 14px 30px -6px rgba(0,212,255,.9),0 0 0 1px rgba(174,240,255,.5) inset;
  transform:translateY(-1px);
}
.cta:active{transform:translateY(0)}

/* ================================================================
   3-column body — narrow icon sidebar | main | stats pane
   ================================================================ */
.body{
  display:grid;
  grid-template-columns:62px minmax(0,1fr) 320px;
  min-height:600px;
}
@media (max-width:980px){
  .body{grid-template-columns:1fr;min-height:auto}
  .leftnav,.rightpane{display:none}
  .topnav{display:none}
}

/* Left icon sidebar */
.leftnav{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 0;
  border-right:1px solid var(--line);
  background:rgba(0,0,0,.14);
}
.leftnav button{
  width:42px;height:42px;border-radius:11px;
  color:var(--slate-2);
  display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;position:relative;
  transition:background .12s,color .12s,border-color .12s;
}
.leftnav button svg,.leftnav .chat-icon svg{
  width:18px;height:18px;stroke:currentColor;stroke-width:1.75;fill:none;
}
.leftnav button:hover{color:#fff;background:rgba(255,255,255,.05)}
.leftnav button.on{
  color:var(--cyan-2);background:rgba(0,184,230,.10);
  border-color:rgba(0,184,230,.32);
  box-shadow:0 0 0 1px rgba(0,184,230,.06), 0 8px 18px -10px rgba(0,212,255,.5);
}
.leftnav button.on::before{
  content:"";position:absolute;left:-1px;top:9px;bottom:9px;width:2.5px;
  background:var(--cyan-2);border-radius:2px;box-shadow:0 0 10px var(--cyan);
}
.leftnav .spacer{flex:1}
.leftnav .chat-icon{
  background:linear-gradient(140deg, rgba(0,184,230,.22), rgba(0,184,230,.06));
  border-color:rgba(0,184,230,.4);color:#fff;
}

/* Main column */
.main{
  padding:24px 26px 28px;
  min-width:0;
  overflow:auto;
}
@media (max-width:980px){.main{padding:18px 16px 110px}}

.section-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--cyan-2);font-weight:700;
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.section-eyebrow::after{
  content:"";flex:1;height:1px;
  background:linear-gradient(90deg, rgba(0,184,230,.28) 0%, rgba(0,184,230,.10) 40%, transparent 100%);
}

/* ================================================================
   FEATURED CARD — the big "AI assistant" callout with the glowing
   avatar overlapping the left edge. This is the centerpiece of Home.
   ================================================================ */
.featured{
  position:relative;
  background:
    radial-gradient(ellipse at 100% 0%, rgba(0,212,255,.14) 0%, transparent 55%),
    radial-gradient(ellipse at 0% 100%, rgba(94,106,210,.10) 0%, transparent 50%),
    linear-gradient(140deg, rgba(0,184,230,.06), rgba(13,28,60,.45));
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:24px 28px;
  margin-bottom:18px;
  overflow:hidden;
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 20px 50px -28px rgba(0,40,80,.6);
  transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s cubic-bezier(.16,1,.3,1);
  box-shadow:0 12px 32px -20px rgba(0,40,80,.5), 0 0 0 1px rgba(255,255,255,.02) inset;
}
.featured.hot{
  background:linear-gradient(140deg, rgba(255,96,88,.10), rgba(60,18,18,.4));
  border-color:rgba(255,96,88,.4);
}
.featured-avatar{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 13px 5px 10px;border-radius:999px;
  background:rgba(0,212,255,.12);
  border:1px solid rgba(0,212,255,.32);
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;font-weight:700;color:var(--cyan-2);
  margin-bottom:14px;
  box-shadow:0 0 18px -6px rgba(0,212,255,.35);
}
.featured-avatar::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:var(--good);
  box-shadow:0 0 0 0 rgba(121,224,142,.7);
  animation:livePulse 1.8s ease-out infinite;
}
.featured.hot .featured-avatar{
  background:rgba(255,96,88,.10);border-color:rgba(255,96,88,.35);color:var(--hot);
}
.featured.hot .featured-avatar::before{
  background:var(--hot);box-shadow:0 0 0 0 rgba(255,140,134,.7);
}
@keyframes livePulse{
  0%   {box-shadow:0 0 0 0 rgba(121,224,142,.55)}
  70%  {box-shadow:0 0 0 9px rgba(121,224,142,0)}
  100% {box-shadow:0 0 0 0 rgba(121,224,142,0)}
}

/* ================================================================
   HOME — mission-control hero card
   ================================================================ */
.hero-card{
  position:relative;overflow:hidden;
  background:#161B22;
  border:1px solid rgba(0,212,255,.20);
  border-radius:14px;padding:24px;margin-bottom:16px;
  box-shadow:0 0 0 1px rgba(0,212,255,.06),0 6px 24px rgba(0,212,255,.06);
  transition:border-color .3s,box-shadow .3s;
}
.hero-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,#00B8E6 40%,#00D4FF 60%,transparent 100%);
  opacity:.65;
}
.hero-card::after{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(0,212,255,.06) 0%,transparent 70%);
  pointer-events:none;
}
.hero-card.alert{
  border-color:rgba(248,81,73,.25);
  box-shadow:0 0 0 1px rgba(248,81,73,.06),0 6px 24px rgba(248,81,73,.05);
}
.hero-card.alert::before{
  background:linear-gradient(90deg,transparent 0%,#F85149 40%,#ff7875 60%,transparent 100%);
}
.hero-card.alert::after{
  background:radial-gradient(circle,rgba(248,81,73,.05) 0%,transparent 70%);
}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.hero-pill{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:100px;padding:5px 12px 5px 8px;
  font-size:12px;font-weight:600;letter-spacing:.02em;border:1px solid;
}
.hero-pill.ok{background:rgba(63,185,80,.12);border-color:rgba(63,185,80,.25);color:#3FB950}
.hero-pill.alert{background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.25);color:#F85149}
.hero-pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex:0 0 7px}
.hero-pill.ok .hero-pill-dot{animation:heroPulse 2s ease-out infinite}
@keyframes heroPulse{
  0%  {box-shadow:0 0 0 0 rgba(63,185,80,.5)}
  70% {box-shadow:0 0 0 6px rgba(63,185,80,0)}
  100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}
}
.hero-updated{font-size:11px;color:var(--slate-3)}
.hero-body{display:flex;align-items:flex-start;gap:18px}
.hero-icon{
  width:48px;height:48px;border-radius:12px;flex:0 0 48px;
  background:rgba(0,212,255,.10);border:1px solid rgba(0,212,255,.15);
  color:#00D4FF;display:flex;align-items:center;justify-content:center;
}
.hero-card.alert .hero-icon{
  background:rgba(248,81,73,.10);border-color:rgba(248,81,73,.15);color:#F85149;
}
.hero-text h2{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px;margin:0 0 5px}
.hero-text p{font-size:13.5px;color:var(--slate-2);line-height:1.55;margin:0}
.hero-text .hl{color:#00D4FF;font-weight:600}
/* Escalation callout inside hero */
.esc-callout{
  margin-top:16px;padding:13px 15px;
  background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.20);
  border-radius:10px;display:flex;align-items:flex-start;gap:12px;
}
.esc-callout-body{flex:1}
.esc-callout-body strong{font-size:13px;color:#fff;display:block;margin-bottom:3px}
.esc-callout-body span{font-size:12px;color:var(--slate-2);line-height:1.5}
.esc-cta{
  margin-top:8px;display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:6px;font-size:12px;font-weight:600;
  background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.30);
  color:#F85149;cursor:pointer;text-decoration:none;
}
.esc-cta:hover{background:rgba(248,81,73,.22)}
/* Stat row */
.home-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.home-stat-card{
  background:#161B22;border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:16px;
}
.home-stat-label{
  font-size:11px;font-weight:500;color:var(--slate-3);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;
}
.home-stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1;color:#E6EDF3}
.home-stat-val.cyan{color:#00D4FF}
.home-stat-val.green{color:#3FB950}
.home-stat-sub{font-size:11.5px;color:var(--slate-3);margin-top:4px}

/* ================================================================
   SETTINGS SUB-VIEWS
   ================================================================ */
.spage{max-width:620px;margin:0 auto;padding:24px 32px}
.spage-back{display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;
  padding:6px 12px 6px 8px;border-radius:8px;font-size:12.5px;font-weight:600;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--slate-2);cursor:pointer;font:inherit;transition:all .15s}
.spage-back:hover{background:rgba(255,255,255,.09);color:#fff}
.spage-head{margin-bottom:24px}
.spage-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;margin:0 0 5px}
.spage-sub{font-size:13.5px;color:var(--slate-2);margin:0}
.scard{background:#161B22;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:22px 24px;margin-bottom:14px}
.scard-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate-3);margin-bottom:16px}
.sform-row{margin-bottom:16px}
.sform-row:last-child{margin-bottom:0}
.sform-label{font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px;display:block}
.sform-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
  border-radius:8px;padding:10px 12px;font-size:13.5px;color:#E6EDF3;outline:none;
  font:inherit;box-sizing:border-box;transition:border-color .15s}
.sform-input:focus{border-color:rgba(0,184,230,.45)}
.sform-input::placeholder{color:var(--slate-3)}
.sform-select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
  border-radius:8px;padding:10px 12px;font-size:13.5px;color:#E6EDF3;outline:none;
  font:inherit;box-sizing:border-box;cursor:pointer;appearance:none}
.sform-hint{font-size:11.5px;color:var(--slate-3);margin-top:5px;line-height:1.5}
.sform-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sform-save{height:38px;padding:0 20px;border-radius:8px;font-size:13px;font-weight:600;
  background:var(--cyan-2);color:#031428;border:none;cursor:pointer;font:inherit;transition:background .15s}
.sform-save:hover{background:var(--cyan)}
/* Toggle */
.stoggle-row{display:flex;align-items:flex-start;justify-content:space-between;
  gap:16px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stoggle-row:last-child{border-bottom:none;padding-bottom:0}
.stoggle-row:first-child{padding-top:0}
.stoggle-body{flex:1}
.stoggle-label{font-size:13.5px;font-weight:600;color:#E6EDF3}
.stoggle-hint{font-size:12px;color:var(--slate-3);margin-top:2px;line-height:1.5}
.stoggle{position:relative;width:40px;height:22px;flex:0 0 40px;margin-top:1px}
.stoggle input{opacity:0;width:0;height:0;position:absolute}
.stoggle-track{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:11px;cursor:pointer;transition:background .2s}
.stoggle-track::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.stoggle input:checked + .stoggle-track{background:var(--cyan-2)}
.stoggle input:checked + .stoggle-track::before{transform:translateX(18px)}
/* Tone selector */
.stone-opts{display:flex;gap:8px}
.stone-opt{flex:1;padding:10px 6px;border:1px solid rgba(255,255,255,.10);border-radius:9px;
  background:rgba(255,255,255,.04);color:var(--slate);font-size:12.5px;font-weight:500;
  cursor:pointer;text-align:center;font:inherit;transition:all .15s}
.stone-opt.active{border-color:var(--cyan-2);color:#fff;background:rgba(0,212,255,.08);font-weight:600}
/* Channel status */
.sch-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sch-row:last-child{border-bottom:none;padding-bottom:0}
.sch-row:first-child{padding-top:0}
.sch-icon{width:36px;height:36px;border-radius:9px;flex:0 0 36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--slate-2)}
.sch-body{flex:1}
.sch-name{font-size:13.5px;font-weight:600;color:#E6EDF3}
.sch-val{font-size:12px;color:var(--slate-3);margin-top:2px}
.sch-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px}
.sch-badge.on{background:rgba(63,185,80,.12);color:#3FB950;border:1px solid rgba(63,185,80,.25)}
.sch-badge.off{background:rgba(255,255,255,.06);color:var(--slate-3);border:1px solid rgba(255,255,255,.08)}
.sch-connect{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;
  background:rgba(0,212,255,.10);border:1px solid rgba(0,212,255,.25);color:var(--cyan-2);cursor:pointer;font:inherit}
/* Plan badge */
.splan-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
  border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.04em;
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.25);color:var(--cyan-2)}
/* Member row */
.smember-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.smember-row:last-child{border-bottom:none;padding-bottom:0}
.smember-row:first-child{padding-top:0}
.smember-av{width:34px;height:34px;border-radius:50%;background:rgba(0,184,230,.12);
  border:1px solid rgba(0,184,230,.2);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--cyan-2);flex:0 0 34px}
.smember-name{font-size:13.5px;font-weight:600;color:#E6EDF3}
.smember-role{font-size:12px;color:var(--slate-3)}
.sdanger-btn{padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:600;
  background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);color:#F85149;cursor:pointer;font:inherit}
.sdanger-btn:hover{background:rgba(248,81,73,.15)}
/* Specialty picker */
.stype-wrap{position:relative}
.stype-dropdown{position:absolute;z-index:20;left:0;right:0;top:calc(100% + 4px);max-height:260px;overflow-y:auto;background:#1c2128;border:1px solid rgba(0,184,230,.22);border-radius:10px;box-shadow:0 16px 40px rgba(0,0,0,.4);padding:4px}
.stype-row{padding:9px 12px;border-radius:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:background .12s}
.stype-row:hover{background:rgba(0,184,230,.12)}
.stype-row b{color:#fff;font-weight:600;font-size:14px}
.stype-cat{color:var(--ink-2);font-size:12px;white-space:nowrap}
.stype-row.notlisted{border-top:1px solid rgba(255,255,255,.06);margin-top:3px;padding-top:11px}
.stype-row.notlisted b{color:#00D4FF}
.stype-selected{margin-top:6px;padding:10px 13px;border-radius:9px;background:rgba(0,184,230,.10);border:1px solid rgba(0,184,230,.3);display:flex;align-items:center;justify-content:space-between}
.stype-selected-name{color:#fff;font-weight:600;font-size:14px}
.stype-selected-cat{color:var(--ink-2);font-size:12px;margin-top:1px}
.stype-examples-hd{padding:5px 10px 4px;font-size:11px;color:var(--slate-3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:3px}
.stype-empty{padding:12px;text-align:center;color:var(--ink-2);font-size:13px}

/* ================================================================
   WORKSHOP VIEW — unified tools + plug-ins surface.
   Visual concept: a precision-blueprint canvas. Thin corner ticks,
   monospace section tags, restrained color. Distinctive without
   being skeuomorphic.
   ================================================================ */
.wb-canvas{
  position:relative;
  padding:18px 6px 24px;
}
/* Tiny corner ticks frame the canvas — subtle blueprint cue */
.wb-corner{
  position:absolute;width:18px;height:18px;
  border-color:rgba(255,255,255,.18);border-style:solid;border-width:0;
  pointer-events:none;
}
.wb-tl{top:0;left:0;border-top-width:1px;border-left-width:1px}
.wb-tr{top:0;right:0;border-top-width:1px;border-right-width:1px}
.wb-bl{bottom:0;left:0;border-bottom-width:1px;border-left-width:1px}
.wb-br{bottom:0;right:0;border-bottom-width:1px;border-right-width:1px}

/* Header */
.wb-head{padding:0 22px 28px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:30px}
.wb-head-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--cyan-2);
}
.wb-head-title{
  margin:10px 0 0;font-size:34px;font-weight:700;letter-spacing:-.025em;
  color:#fff;line-height:1.08;
}
.wb-head-sub{
  margin:10px 0 0;color:var(--slate);font-size:14.5px;line-height:1.55;
  max-width:560px;
}
.wb-head-stats{
  display:flex;gap:24px;margin-top:18px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate-3);
  letter-spacing:.06em;
}
.wb-head-stats b{color:#fff;font-weight:700;margin-right:6px;font-size:13px}

/* Section blocks */
.wb-section{padding:0 22px;margin-bottom:36px}
.wb-eyebrow{
  display:flex;align-items:center;gap:10px;margin:0 0 16px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--slate-2);font-weight:600;
}
.wb-eyebrow::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,.08);margin-left:6px;
}
.wb-tag{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:26px;height:18px;padding:0 6px;
  border:1px solid rgba(0,212,255,.4);
  border-radius:3px;
  color:var(--cyan-2);font-size:9.5px;letter-spacing:.08em;
  background:rgba(0,212,255,.06);
}
.wb-ct{
  font-size:9.5px;color:var(--slate-3);letter-spacing:.1em;margin-left:auto;
}

/* 01 — bench */
.wb-bench{
  border:1px dashed rgba(255,255,255,.12);
  border-radius:16px;
  background:repeating-linear-gradient(
    -45deg,
    rgba(255,255,255,.014) 0,
    rgba(255,255,255,.014) 8px,
    transparent 8px,
    transparent 18px
  );
  min-height:140px;
  display:flex;align-items:center;justify-content:center;
}
.wb-bench-empty{text-align:center;padding:28px 24px;max-width:440px}
.wb-bench-empty-glyph{
  font-size:32px;color:var(--slate-3);margin-bottom:8px;
  font-family:'JetBrains Mono',monospace;
}
.wb-bench-empty-title{color:#fff;font-size:16px;font-weight:600;letter-spacing:-.005em}
.wb-bench-empty-sub{color:var(--slate);font-size:13.5px;margin:6px 0 16px;line-height:1.5}
.wb-bench-cta{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;
  background:linear-gradient(140deg,var(--cyan-2),var(--cyan));
  color:#031428;border-radius:999px;font-size:13px;font-weight:600;
  text-decoration:none;transition:transform .18s, box-shadow .18s;
}
.wb-bench-cta span{font-size:13px}
.wb-bench-cta:hover{transform:translateY(-1px);box-shadow:0 12px 24px -10px rgba(0,212,255,.6)}

/* 02 — tools (pegboard grid) */
.wb-tool-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;
}
.wb-tool{
  position:relative;text-align:left;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  padding:16px 16px 14px;
  cursor:pointer;color:inherit;font:inherit;
  /* one chamfered corner — a small precision detail */
  clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  transition:border-color .2s, background .2s, transform .18s;
}
.wb-tool:hover{
  border-color:rgba(0,212,255,.35);
  background:rgba(0,212,255,.04);
  transform:translateY(-2px);
}
.wb-tool-glyph{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;
  background:var(--accent-bg, rgba(255,255,255,.06));
  color:var(--accent-fg, #fff);
  border:1px solid var(--accent-border, rgba(255,255,255,.08));
  margin-bottom:12px;
}
.wb-tool-body{margin-bottom:14px}
.wb-tool-name{color:#fff;font-weight:600;font-size:15px;letter-spacing:-.01em;margin-bottom:3px}
.wb-tool-use{color:var(--slate);font-size:13px;line-height:1.5}
.wb-tool-key{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--slate-3);letter-spacing:.04em;
  border-top:1px dashed rgba(255,255,255,.08);
  padding-top:8px;
}
.wb-tool[data-tone="voice"]   .wb-tool-glyph{--accent-bg:rgba(0,212,255,.18);--accent-fg:var(--cyan-2);--accent-border:rgba(0,212,255,.38)}
.wb-tool[data-tone="ops"]     .wb-tool-glyph{--accent-bg:rgba(121,224,142,.16);--accent-fg:var(--good);--accent-border:rgba(121,224,142,.38)}
.wb-tool[data-tone="growth"]  .wb-tool-glyph{--accent-bg:rgba(244,204,119,.16);--accent-fg:var(--warn);--accent-border:rgba(244,204,119,.4)}
.wb-tool[data-tone="quality"] .wb-tool-glyph{--accent-bg:rgba(255,140,134,.16);--accent-fg:var(--hot);--accent-border:rgba(255,140,134,.38)}
.wb-tool[data-tone="data"]    .wb-tool-glyph{--accent-bg:rgba(174,240,255,.16);--accent-fg:#aef0ff;--accent-border:rgba(174,240,255,.38)}

/* 03 — plug-ins (tabular row layout, status visible at a glance) */
.wb-plug-list{
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  overflow:hidden;
  background:rgba(255,255,255,.02);
}
.wb-plug-row{
  display:grid;
  grid-template-columns:14px minmax(140px, 1fr) minmax(120px, 1.4fr) 96px 96px;
  align-items:center;gap:14px;
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:13.5px;
}
.wb-plug-row:last-child{border-bottom:none}
.wb-plug-mark{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.12);
}
.wb-plug-row:has(.wb-plug-pill.live)  .wb-plug-mark{background:var(--good);box-shadow:0 0 10px rgba(121,224,142,.6)}
.wb-plug-row:has(.wb-plug-pill.ready) .wb-plug-mark{background:var(--cyan-2);box-shadow:0 0 10px rgba(0,212,255,.6)}
.wb-plug-row:has(.wb-plug-pill.setup) .wb-plug-mark{background:var(--slate-3)}
.wb-plug-name{display:flex;flex-direction:column}
.wb-plug-name b{color:#fff;font-weight:600;letter-spacing:-.005em}
.wb-plug-kind{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.1em;color:var(--slate-3);text-transform:uppercase;margin-top:2px;
}
.wb-plug-account{color:var(--slate);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wb-plug-pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;
  padding:4px 8px;border-radius:4px;text-align:center;
}
.wb-plug-pill.live { background:rgba(121,224,142,.12);color:var(--good); border:1px solid rgba(121,224,142,.3)}
.wb-plug-pill.ready{ background:rgba(0,212,255,.10); color:var(--cyan-2);border:1px solid rgba(0,212,255,.3)}
.wb-plug-pill.setup{ background:rgba(255,255,255,.05); color:var(--slate-2);border:1px solid rgba(255,255,255,.10)}
.wb-plug-pill.idle { background:rgba(255,255,255,.05); color:var(--slate-3);border:1px solid rgba(255,255,255,.10)}
.wb-plug-action{justify-self:end}
.wb-plug-btn{
  background:rgba(255,255,255,.05);color:#fff;
  border:1px solid rgba(255,255,255,.12);
  border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:500;
  letter-spacing:.005em;cursor:pointer;transition:all .15s;
}
.wb-plug-btn:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.22)}
.wb-plug-btn.primary{
  background:linear-gradient(140deg,var(--cyan-2),var(--cyan));
  color:#031428;border:none;
}
.wb-plug-btn.primary:hover{transform:translateY(-1px);box-shadow:0 10px 20px -8px rgba(0,212,255,.6)}
.wb-plug-btn.ghost{color:var(--slate-2);border-color:rgba(255,255,255,.06)}

@media (max-width:720px){
  .wb-plug-row{
    grid-template-columns:14px 1fr auto;
    grid-template-areas:
      "mark name pill"
      "mark acct acct"
      ".    act  act ";
    gap:6px 12px;
  }
  .wb-plug-mark{grid-area:mark}
  .wb-plug-name{grid-area:name}
  .wb-plug-account{grid-area:acct}
  .wb-plug-pill{grid-area:pill}
  .wb-plug-action{grid-area:act;justify-self:start}
}

/* ================================================================
   RIGHT PANE CARDS — Today stats + Adapt 1.0 device card
   ================================================================ */
.rp-card{
  position:relative;
  background:
    radial-gradient(ellipse at 100% 0%, rgba(0,212,255,.08) 0%, transparent 60%),
    linear-gradient(160deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.02) 60%);
  border:1px solid rgba(255,255,255,.07);
  border-top-color:rgba(0,212,255,.22);
  border-radius:18px;
  padding:20px 20px 18px;
  box-shadow:
    0 1px 0 rgba(0,212,255,.12) inset,
    0 14px 32px -22px rgba(0,40,80,.7);
  animation:rpFadeIn .55s cubic-bezier(.16,1,.3,1) both;
  transition:transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s cubic-bezier(.16,1,.3,1), border-color .25s;
}
.rp-card:hover{
  border-color:rgba(0,212,255,.25);
  border-top-color:rgba(0,212,255,.45);
  box-shadow:
    0 1px 0 rgba(0,212,255,.18) inset,
    0 22px 44px -22px rgba(0,80,140,.7);
}
@keyframes rpFadeIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:none}
}
.rp-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--cyan-2);font-weight:700;margin-bottom:14px;
}

.stat-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;
}
.stat-tile{
  position:relative;background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.06);border-radius:13px;
  padding:11px 12px 12px;overflow:hidden;
  transition:transform .35s cubic-bezier(.16,1,.3,1), border-color .25s, background .25s, box-shadow .35s cubic-bezier(.16,1,.3,1);
}
.stat-tile:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,.055);
  border-color:rgba(0,212,255,.32);
  box-shadow:0 10px 26px -14px rgba(0,212,255,.45);
}
.stat-tile:active{transform:translateY(0) scale(.98)}
.stat-icon{
  position:absolute;top:10px;right:10px;
  width:24px;height:24px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,212,255,.10);color:var(--cyan-2);
  border:1px solid rgba(0,212,255,.22);
}
.stat-icon svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.stat-num{
  font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.05;
}
.stat-lbl{
  font-size:10px;color:var(--slate-3);font-family:'JetBrains Mono',monospace;
  letter-spacing:.10em;text-transform:uppercase;margin-top:5px;font-weight:600;
}
.stat-sent   .stat-icon{background:rgba(121,224,142,.12);color:var(--good);border-color:rgba(121,224,142,.28)}
.stat-esc    .stat-icon{background:rgba(255,140,134,.12);color:var(--hot);border-color:rgba(255,140,134,.28)}
.stat-draft  .stat-icon{background:rgba(244,204,119,.14);color:var(--warn);border-color:rgba(244,204,119,.30)}
.stat-booked .stat-icon{background:rgba(0,212,255,.12);color:var(--cyan-2);border-color:rgba(0,212,255,.28)}

.rp-progress{
  height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;
  margin-top:4px;
}
.rp-progress-bar{
  height:100%;background:linear-gradient(90deg, var(--cyan-2), var(--good));
  border-radius:3px;transition:width .6s cubic-bezier(.22,1,.36,1);
  box-shadow:0 0 12px -1px rgba(0,212,255,.5);
}
.rp-progress-lbl{
  display:flex;justify-content:space-between;margin-top:7px;
  font-size:10px;color:var(--slate-3);
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
}

/* The "Adapt 1.0" device card — visual block + status rows */
.device-card{
  display:flex;gap:14px;align-items:stretch;
  background:
    radial-gradient(ellipse at 0% 100%, rgba(0,184,230,.10) 0%, transparent 60%),
    linear-gradient(160deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.02) 60%);
}
.device-visual{
  flex:0 0 76px;display:flex;align-items:center;justify-content:center;
}
.device-box{
  position:relative;
  width:64px;height:64px;border-radius:14px;
  background:linear-gradient(160deg, #0d2c5d 0%, #06173a 100%);
  border:1px solid rgba(0,212,255,.35);
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 22px -4px rgba(0,212,255,.45),
    inset 0 1px 0 rgba(255,255,255,.05);
}
.device-glow{
  position:absolute;inset:8px;border-radius:9px;
  background:radial-gradient(ellipse at 35% 35%, rgba(0,212,255,.45) 0%, transparent 70%);
  filter:blur(4px);
  animation:devGlow 3.6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes devGlow{
  0%,100%{opacity:.55;transform:scale(.95)}
  50%{opacity:.95;transform:scale(1.08)}
}
.device-label{
  position:relative;z-index:1;color:#fff;font-style:italic;
  font-weight:900;font-size:10px;letter-spacing:.16em;
}
.device-body{flex:1;min-width:0}
.device-name{
  color:#fff;font-size:15px;font-weight:700;letter-spacing:-.005em;margin-bottom:10px;
}
.device-rows{display:flex;flex-direction:column;gap:7px}
.device-row{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--slate-2);
}
.device-row > span:nth-child(2){flex:1}
.device-row b{color:#fff;font-weight:600;font-size:12px}
.device-row-dot{
  width:8px;height:8px;border-radius:50%;background:var(--good);
  box-shadow:0 0 0 0 rgba(121,224,142,.55);
  animation:livePulse 1.8s ease-out infinite;
  flex:0 0 8px;
}
.device-row-icon{
  width:8px;text-align:center;font-size:10px;color:var(--slate-3);
}

/* "Today's activity" feed — scrolling list of what Adapix has been doing
   (messages sent, drafts created, replies received, escalations). */
.activity-meta{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--slate-2);font-weight:600;
}
.activity-feed{
  display:flex;flex-direction:column;gap:8px;
  background:rgba(255,255,255,.025);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 12px;
  max-height:420px;overflow:auto;
}
.activity-feed::-webkit-scrollbar{width:6px}
.activity-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.activity-empty{
  padding:18px 4px;text-align:center;color:var(--slate-2);font-size:13px;
}
.activity-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:10px 10px;border-radius:10px;
  transition:background .12s;
}
.activity-row:hover{background:rgba(255,255,255,.03)}
.activity-row + .activity-row{border-top:1px solid rgba(255,255,255,.07)}
.activity-icon{
  flex:0 0 30px;height:30px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,184,230,.10);color:var(--cyan-2);
  border:1px solid rgba(0,184,230,.22);
}
.activity-icon svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
.activity-sent      .activity-icon{background:rgba(121,224,142,.10);color:var(--good);border-color:rgba(121,224,142,.25)}
.activity-reply     .activity-icon{background:rgba(0,212,255,.10);color:var(--cyan-2);border-color:rgba(0,212,255,.25)}
.activity-draft     .activity-icon{background:rgba(244,204,119,.10);color:var(--warn);border-color:rgba(244,204,119,.25)}
.activity-escalation .activity-icon,
.activity-emergency  .activity-icon{background:rgba(255,140,134,.10);color:var(--hot);border-color:rgba(255,140,134,.3)}
.activity-rejected  .activity-icon{background:rgba(127,160,214,.10);color:var(--slate-2);border-color:rgba(127,160,214,.2)}
.activity-body{flex:1;min-width:0}
.activity-label{
  color:#fff;font-size:13.5px;font-weight:600;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.activity-preview{
  margin-top:3px;color:var(--slate-2);font-size:12.5px;line-height:1.45;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.activity-ts{
  flex:0 0 auto;color:var(--slate-3);font-size:11px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
  white-space:nowrap;padding-top:6px;
}

/* ================================================================
   CONCIERGE VIEW — capability menu of things Adapix can do.
   Animated, welcoming, organized by domain.
   ================================================================ */
.cn-hero{
  position:relative;
  margin:6px 0 22px;
  padding:30px 30px 28px;
  border-radius:20px;
  background:
    radial-gradient(ellipse at 90% -10%, rgba(0,212,255,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 5% 110%, rgba(0,184,230,.14) 0%, transparent 50%),
    linear-gradient(140deg, rgba(0,184,230,.08), rgba(13,28,60,.55));
  border:1px solid rgba(0,184,230,.28);
  overflow:hidden;
  animation:cnHeroIn .55s cubic-bezier(.22,1,.36,1) both;
}
.cn-hero-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--cyan-2);font-weight:700;margin-bottom:8px;
}
.cn-hero-title{
  font-size:30px;font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1.15;
  max-width:680px;
  background:linear-gradient(90deg,#fff 0%, var(--cyan-3) 70%, var(--cyan-2) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.cn-hero-sub{
  margin-top:10px;color:var(--slate);font-size:14.5px;max-width:580px;line-height:1.55;
}
.cn-hero-glow{
  position:absolute;right:-80px;top:-40px;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle, rgba(0,212,255,.45) 0%, transparent 65%);
  filter:blur(20px);
  animation:cnGlow 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes cnHeroIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}
@keyframes cnGlow{
  0%,100%{transform:scale(1) translate(0,0);opacity:.55}
  50%   {transform:scale(1.15) translate(-12px,8px);opacity:.85}
}

.cn-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
  gap:16px;
}

.cn-card{
  position:relative;
  background:
    radial-gradient(ellipse at 100% 0%, rgba(0,212,255,.06) 0%, transparent 60%),
    rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:24px 24px 18px;
  overflow:hidden;
  transition:transform .4s cubic-bezier(.16,1,.3,1),
             border-color .25s, background .25s, box-shadow .4s cubic-bezier(.16,1,.3,1);
  opacity:0;transform:translateY(14px);
  animation:cnCardIn .55s cubic-bezier(.16,1,.3,1) forwards;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset;
}
.cn-card::after{
  content:'';
  position:absolute;left:0;top:0;right:0;bottom:0;
  border-radius:18px;pointer-events:none;
  box-shadow:0 0 0 0 rgba(0,212,255,0) inset;
  transition:box-shadow .25s;
}
.cn-card:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,.04);
  border-color:rgba(0,212,255,.35);
  box-shadow:0 18px 40px -22px rgba(0,212,255,.4);
}
.cn-card:hover::after{box-shadow:0 0 0 1px rgba(0,212,255,.18) inset}
@keyframes cnCardIn{
  to{opacity:1;transform:none}
}

.cn-icon{
  width:40px;height:40px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;
  background:rgba(0,184,230,.12);color:var(--cyan-2);
  border:1px solid rgba(0,184,230,.28);
  margin-bottom:14px;
  transition:transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s;
}
.cn-card:hover .cn-icon{
  transform:rotate(-6deg) scale(1.06);
  box-shadow:0 0 22px -4px rgba(0,212,255,.6);
}
.cn-card[data-accent="green"]   .cn-icon{background:rgba(121,224,142,.12);color:var(--good);border-color:rgba(121,224,142,.3)}
.cn-card[data-accent="yellow"]  .cn-icon{background:rgba(244,204,119,.14);color:var(--warn);border-color:rgba(244,204,119,.32)}
.cn-card[data-accent="pink"]    .cn-icon{background:rgba(255,140,134,.12);color:var(--hot);border-color:rgba(255,140,134,.3)}

.cn-card[data-accent="green"]:hover {border-color:rgba(121,224,142,.4);box-shadow:0 18px 40px -22px rgba(121,224,142,.4)}
.cn-card[data-accent="yellow"]:hover{border-color:rgba(244,204,119,.45);box-shadow:0 18px 40px -22px rgba(244,204,119,.4)}
.cn-card[data-accent="pink"]:hover  {border-color:rgba(255,140,134,.4);box-shadow:0 18px 40px -22px rgba(255,140,134,.4)}

/* The "Something Specific" card — visually distinct, sparkly,
   makes it feel like a creative open-ended option vs. the curated plays. */
.cn-card[data-accent="custom"]{
  background:
    radial-gradient(ellipse at 100% 0%, rgba(174,240,255,.14) 0%, transparent 55%),
    radial-gradient(ellipse at 0% 100%, rgba(0,212,255,.10) 0%, transparent 55%),
    linear-gradient(160deg, rgba(0,184,230,.10), rgba(13,28,60,.55));
  border-color:rgba(0,212,255,.42);
  position:relative;overflow:hidden;
}
.cn-card[data-accent="custom"]::before{
  content:'';position:absolute;inset:-1px;border-radius:inherit;
  padding:1px;
  background:linear-gradient(135deg, rgba(0,212,255,.55), transparent 40%, rgba(174,240,255,.55) 90%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:.7;pointer-events:none;
}
.cn-card[data-accent="custom"] .cn-icon{
  background:linear-gradient(140deg, rgba(0,212,255,.4), rgba(174,240,255,.25));
  color:#fff;border-color:rgba(174,240,255,.5);
  box-shadow:0 0 18px -2px rgba(0,212,255,.6);
  animation:cnSparkle 2.6s ease-in-out infinite;
}
@keyframes cnSparkle{
  0%,100%{box-shadow:0 0 14px -3px rgba(0,212,255,.55);transform:rotate(0deg)}
  50%   {box-shadow:0 0 26px 0 rgba(174,240,255,.85);transform:rotate(-8deg) scale(1.05)}
}
.cn-card[data-accent="custom"]:hover{
  border-color:rgba(174,240,255,.7);
  box-shadow:0 22px 46px -22px rgba(0,212,255,.55);
}

.cn-title{
  color:#fff;font-size:16px;font-weight:700;letter-spacing:-.005em;
  margin-bottom:5px;
}
.cn-sub{
  color:var(--slate-2);font-size:12.5px;line-height:1.5;
  margin-bottom:14px;min-height:36px;
}

.cn-tasks{display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--line);padding-top:10px}
.cn-task{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:9px;
  font-size:13px;color:var(--slate);text-align:left;line-height:1.35;
  background:transparent;border:0;cursor:pointer;
  transition:background .15s, color .15s, transform .12s;
}
.cn-task:hover{
  background:rgba(0,184,230,.08);color:#fff;transform:translateX(2px);
}
.cn-task-arrow{
  color:var(--cyan-2);font-weight:700;opacity:.6;
  transition:opacity .15s, transform .15s;
}
.cn-task:hover .cn-task-arrow{opacity:1;transform:translateX(2px)}

/* Per-category "+ Something else..." button — visually softer/italic
   so it reads as the open-ended fallback inside each domain. */
.cn-task-custom{
  font-style:italic;color:var(--slate-2);
  border-top:1px dashed rgba(0,184,230,.15);
  margin-top:4px;padding-top:11px;border-radius:0 0 9px 9px;
}
.cn-task-custom .cn-task-arrow{
  color:var(--cyan-3);opacity:.7;font-style:normal;
}
.cn-task-custom:hover{
  font-style:italic;color:#fff;
  background:linear-gradient(90deg, rgba(0,212,255,.10), rgba(174,240,255,.04));
}
.cn-task-custom:hover .cn-task-arrow{
  animation:cnSparkleSmall 1.2s ease-in-out infinite;opacity:1;
}
@keyframes cnSparkleSmall{
  0%,100%{transform:scale(1) rotate(0deg)}
  50%{transform:scale(1.2) rotate(15deg)}
}

@media (max-width: 720px){
  .cn-hero{padding:24px 20px}
  .cn-hero-title{font-size:24px}
  .cn-grid{grid-template-columns:1fr}
}

/* "What I'm watching" empty-state grid — replaces the sad
   "No items in the queue" row with something alive. */
.watching-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:12px;
  margin-top:6px;
}
.watching-cell{
  position:relative;
  background:rgba(255,255,255,.025);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 16px 16px;
}
.watching-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--good);
  box-shadow:0 0 0 0 rgba(121,224,142,.5);
  animation:livePulse 2.2s ease-out infinite;
  margin-bottom:10px;
}
.watching-label{
  font-size:13.5px;font-weight:700;color:#fff;letter-spacing:-.005em;
}
.watching-sub{
  font-size:12px;color:var(--slate-2);margin-top:3px;
}

.featured-content{display:flex;flex-direction:column;justify-content:center;gap:6px}
.featured .eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  letter-spacing:.2em;text-transform:uppercase;color:var(--cyan-2);font-weight:700;
}
.featured.hot .eyebrow{color:var(--hot)}
.featured h1{
  font-size:25px;font-weight:800;color:#fff;letter-spacing:-.022em;
  line-height:1.2;margin-top:6px;
}
.featured p{font-size:14px;color:var(--slate);line-height:1.55;margin-top:4px;max-width:560px}
.featured-actions{display:flex;gap:9px;margin-top:14px}
.featured-actions .btn{
  padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;
}
.btn-primary{
  background:linear-gradient(180deg, var(--cyan-2), var(--cyan));color:#04243a;
  box-shadow:0 8px 22px -8px rgba(0,212,255,.6);
}
.btn-primary:hover{box-shadow:0 12px 28px -6px rgba(0,212,255,.8)}
.btn-ghost{
  background:transparent;color:var(--slate);border:1px solid var(--line);
}
.btn-ghost:hover{color:#fff;background:rgba(255,255,255,.04)}

/* ================================================================
   ROW CARDS — clean rows below the featured card. Each row is one
   thing that needs attention (escalation, draft, etc.) with a CTA.
   ================================================================ */
.rows{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.row-card{
  background:rgba(255,255,255,.03);border:1px solid var(--line);
  border-radius:13px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  transition:background .15s,border-color .15s;
}
.row-card:hover{background:rgba(255,255,255,.05);border-color:rgba(0,184,230,.32)}
.row-card.hot{
  background:linear-gradient(180deg, rgba(255,96,88,.10), rgba(255,96,88,.03));
  border-color:rgba(255,96,88,.32);
}
.row-card .text{flex:1;min-width:0}
.row-card .text b{font-size:14px;color:#fff;font-weight:600;display:block;margin-bottom:2px}
.row-card .text span{font-size:12.5px;color:var(--slate-2);line-height:1.4}
.row-card .pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 8px;border-radius:6px;
  background:rgba(0,184,230,.12);color:var(--cyan-2);
}
.row-card .pill.hot{background:rgba(255,96,88,.14);color:var(--hot)}
.row-card .cta-sm{
  background:linear-gradient(180deg, var(--cyan-2), var(--cyan));color:#04243a;
  padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:700;flex:0 0 auto;
}

/* Empty state inside the main column */
.empty-row{
  text-align:center;padding:36px 20px;
  color:var(--slate);font-size:13.5px;font-style:italic;
}

/* ================================================================
   RIGHT PANE — stats + memory + device status sidebar
   ================================================================ */
.rightpane{
  border-left:1px solid var(--line);
  background:rgba(0,0,0,.14);
  padding:22px 20px 28px;
  display:flex;flex-direction:column;gap:18px;
  overflow:auto;
}
.pane-card h3{
  font-size:12.5px;color:#fff;font-weight:700;letter-spacing:.005em;
  margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;
}
.pane-card h3 .more{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate-3);font-weight:600}

.stat-row{display:flex;gap:9px;margin-bottom:10px}
.stat-card{
  flex:1;background:rgba(255,255,255,.04);border:1px solid var(--line);
  border-radius:11px;padding:12px 13px;
}
.stat-card .n{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.01em}
.stat-card .l{
  font-size:10px;color:var(--slate-3);font-family:'JetBrains Mono',monospace;
  letter-spacing:.06em;text-transform:uppercase;margin-top:3px;
}
.stat-card .dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  vertical-align:middle;margin-right:5px;
}
.stat-card .dot.up{background:var(--good);box-shadow:0 0 6px var(--good)}
.stat-card .dot.dn{background:var(--hot);box-shadow:0 0 6px var(--hot)}

.chart{
  display:flex;align-items:flex-end;gap:5px;height:80px;
  padding:8px 0 4px;
}
.chart .bar{
  flex:1;border-radius:3px 3px 0 0;min-height:4px;
  background:linear-gradient(180deg, var(--cyan-2), rgba(0,184,230,.18));
  box-shadow:0 0 6px -2px rgba(0,212,255,.4);
}

.memo{
  background:rgba(0,0,0,.18);border:1px solid var(--line);
  border-radius:9px;padding:9px 11px;font-size:12.5px;color:#cfe1ff;
  line-height:1.45;
}
.memo .cat{
  display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;
  color:var(--cyan-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;
}
.memo-list{display:flex;flex-direction:column;gap:7px}

.device-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12.5px;color:var(--slate);padding:4px 0;
}
.device-row .v{color:#fff;font-weight:600}
.device-row .v.ok{color:var(--good)}

/* ================================================================
   AUTOMATIONS — full-page view
   ================================================================ */
.autos-page{padding:28px 32px;max-width:860px;margin:0 auto}
.autos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px}
.autos-eyebrow{font-size:11px;letter-spacing:.12em;color:var(--slate-2);text-transform:uppercase;font-weight:500;margin-bottom:6px}
.autos-headline{font-size:24px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px}
.autos-tagline{font-size:14px;color:var(--slate-2);line-height:1.5}
.autos-new-btn{
  height:38px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:500;
  background:var(--cyan-2);color:#031428;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;font:inherit;flex:0 0 auto;
}
.autos-new-btn:hover{filter:brightness(1.1);box-shadow:0 6px 16px -6px rgba(0,212,255,.5)}
/* Filter tabs */
.autos-tabs{display:flex;gap:2px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:24px}
.autos-tab{
  padding:9px 16px;font-size:13px;color:var(--slate-2);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;font:inherit;
}
.autos-tab:hover{color:#fff}
.autos-tab.active{color:var(--cyan-2);border-bottom-color:var(--cyan-2);font-weight:500}
.autos-tab-count{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);border-radius:10px;font-size:11px;
  padding:0 7px;min-width:20px;height:18px;margin-left:5px;font-weight:400;
}
.autos-tab.active .autos-tab-count{background:rgba(0,212,255,.12);color:var(--cyan-2)}
/* Card list */
.autos-list{display:flex;flex-direction:column;gap:14px}
/* Automation card zones */
.auto-card{
  background:#161B22;border:1px solid rgba(255,255,255,.08);
  border-radius:12px;overflow:hidden;transition:border-color .2s;
}
.auto-card:hover{border-color:rgba(255,255,255,.16)}
.auto-card.paused{opacity:.75}
.auto-card.error-state{border-color:rgba(248,81,73,.35)}
.auto-card-top{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px 0;
}
.auto-name-row{display:flex;align-items:center;gap:10px}
.auto-status-dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.auto-status-dot.active{background:#2EA043;animation:dotPulse 2s infinite}
.auto-status-dot.paused{background:rgba(255,255,255,.25)}
@keyframes dotPulse{
  0%{box-shadow:0 0 0 0 rgba(46,160,67,.4)}
  70%{box-shadow:0 0 0 5px rgba(46,160,67,0)}
  100%{box-shadow:0 0 0 0 rgba(46,160,67,0)}
}
.auto-name{font-size:15px;font-weight:600;color:#fff}
.auto-fmt-pill{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.04em;
  border:1px solid rgba(0,212,255,.25);color:var(--cyan-2);background:rgba(0,212,255,.08);
}
.auto-fmt-pill.paused{border-color:rgba(255,255,255,.12);color:var(--slate-2);background:rgba(255,255,255,.05)}
/* Meta grid */
.auto-card-meta{
  display:grid;grid-template-columns:repeat(3,1fr);
  padding:14px 20px 0;gap:0 16px;
}
.meta-label{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--slate-2);font-weight:600;margin-bottom:3px;
}
.meta-schedule{font-size:13px;color:#fff;font-weight:500}
.meta-cron{font-size:11px;color:var(--slate-3);font-family:monospace;margin-top:2px}
.meta-task{
  font-size:13px;color:var(--slate);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;line-height:1.45;
}
.meta-task.expanded{white-space:normal}
.meta-value{font-size:13px;color:var(--slate)}
/* Run info row */
.auto-card-run{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px 0;font-size:12px;color:var(--slate-2);min-height:30px;
}
.run-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500;
}
.run-badge.ok{background:rgba(46,160,67,.12);color:#3FB950}
.run-badge.fail{background:rgba(248,81,73,.12);color:#F85149}
.run-badge.running{background:rgba(0,212,255,.08);color:var(--cyan-2)}
.run-ts{font-size:11px;color:var(--slate-3)}
/* Error banner */
.auto-error-banner{
  margin:8px 20px 0;padding:8px 12px;border-radius:8px;
  background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);
  font-size:12px;color:#F85149;line-height:1.5;
}
/* Card footer */
.auto-card-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px 14px;border-top:1px solid rgba(255,255,255,.07);margin-top:12px;
}
.auto-actions-left{display:flex;align-items:center;gap:8px}
.auto-actions-right{display:flex;align-items:center;gap:6px}
.auto-action-divider{width:1px;height:18px;background:rgba(255,255,255,.08);margin:0 2px}
/* Icon action buttons */
.auto-icon-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;flex:0 0 32px;background:transparent;
}
.auto-icon-btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.auto-icon-btn.run{color:var(--cyan-2);background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.25)}
.auto-icon-btn.run:hover:not(:disabled){background:rgba(0,212,255,.14);border-color:rgba(0,212,255,.4)}
.auto-icon-btn.dl{color:#3FB950;background:rgba(46,160,67,.07);border-color:rgba(46,160,67,.25)}
.auto-icon-btn.dl:hover{background:rgba(46,160,67,.14);border-color:rgba(46,160,67,.4)}
.auto-icon-btn.edit{color:var(--slate-2);border-color:rgba(255,255,255,.10)}
.auto-icon-btn.edit:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.auto-icon-btn.del{color:#F85149;border-color:rgba(248,81,73,.15)}
.auto-icon-btn.del:hover{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.35)}
/* Pause/resume ghost */
.auto-pause-ghost{
  height:32px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;font:inherit;
  color:var(--slate-2);background:transparent;border:1px solid rgba(255,255,255,.10);
}
.auto-pause-ghost:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.auto-pause-ghost.resume{color:#3FB950;border-color:rgba(46,160,67,.3)}
.auto-pause-ghost.resume:hover{background:rgba(46,160,67,.07)}
/* Inline delete confirm */
.auto-del-confirm{font-size:12px;color:var(--slate-2);display:flex;align-items:center;gap:8px;width:100%}
.auto-del-confirm button{
  padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font:inherit;
  background:transparent;border:1px solid;transition:all .15s;
}
.auto-del-confirm .confirm-yes{color:#F85149;border-color:rgba(248,81,73,.3)}
.auto-del-confirm .confirm-yes:hover{background:rgba(248,81,73,.1)}
.auto-del-confirm .confirm-no{color:var(--slate-2);border-color:rgba(255,255,255,.1)}
.auto-del-confirm .confirm-no:hover{color:#fff}
/* Empty state */
.autos-empty{
  text-align:center;padding:80px 40px;
  border:1px dashed rgba(255,255,255,.10);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;
}
.autos-empty-icon{font-size:36px;color:rgba(255,255,255,.2);margin-bottom:20px;line-height:1}
.autos-empty-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:8px}
.autos-empty-body{font-size:14px;color:var(--slate-2);max-width:320px;line-height:1.6;margin-bottom:28px}
/* Automation modal */
.auto-modal-backdrop{
  position:fixed;inset:0;background:rgba(4,11,26,.85);
  backdrop-filter:blur(8px);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auto-modal{
  background:linear-gradient(160deg,#0d1f3c,#07111e);
  border:1px solid rgba(0,212,255,.2);border-radius:20px;
  padding:28px 28px 24px;width:100%;max-width:520px;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.7);
  animation:modalIn .25s cubic-bezier(.16,1,.3,1) both;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
.auto-modal h2{font-size:20px;font-weight:700;color:#fff;margin:0 0 20px}
.auto-field{margin-bottom:16px}
.auto-field label{display:block;font-size:12px;font-weight:600;color:var(--slate-2);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.auto-field input,.auto-field textarea,.auto-field select{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  border-radius:9px;padding:10px 12px;color:#fff;font:inherit;font-size:13.5px;
  outline:none;transition:border-color .15s;
}
.auto-field input:focus,.auto-field textarea:focus,.auto-field select:focus{
  border-color:rgba(0,212,255,.5);box-shadow:0 0 0 2px rgba(0,212,255,.08);
}
.auto-field textarea{min-height:80px;resize:vertical;line-height:1.55}
.auto-field select option{background:#0d1f3c}
.auto-modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* Schedule preset grid */
.am-presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.am-preset{
  padding:10px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.04);color:var(--slate);font-size:13px;
  cursor:pointer;text-align:left;font:inherit;transition:all .15s;
}
.am-preset:hover{border-color:rgba(0,212,255,.3);color:#fff;background:rgba(0,212,255,.05)}
.am-preset.selected{border-color:var(--cyan-2);color:#fff;background:rgba(0,212,255,.08);font-weight:500}
.am-preset.full-width{grid-column:1/-1}
.am-time-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.am-time-label{font-size:12px;color:var(--slate-2);white-space:nowrap}
.am-custom-cron{display:none;padding-top:10px}
.am-custom-cron.visible{display:block}
.am-cron-back{background:none;border:none;color:var(--cyan-2);font-size:12px;cursor:pointer;
  padding:0 0 8px;text-decoration:underline;font:inherit}
.am-preview{font-size:11px;color:var(--slate-3);margin-top:6px;line-height:1.5}

/* ================================================================
   Mobile bottom nav — only shown when sidebars are hidden
   ================================================================ */
.bn{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;justify-content:space-around;align-items:center;
  padding:12px 16px calc(14px + env(safe-area-inset-bottom));
  border-top:1px solid var(--line);background:rgba(8,18,42,.92);
  backdrop-filter:blur(14px);z-index:5;
}
@media (min-width:981px){.bn{display:none}}
.bn button{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:9.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--slate-2);
}
.bn button .glyph{
  width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
}
.bn button .glyph svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.75;fill:none}
.bn button.on{color:var(--cyan-2)}
.bn button.on .glyph{background:rgba(0,184,230,.22);color:var(--cyan-2)}
.bn button.on .glyph svg{stroke-width:2.25}

/* Loading + toast */
.loader{padding:50px 20px;text-align:center;color:var(--slate);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.04em}
.fail{margin:16px;padding:14px;border-radius:11px;background:rgba(255,96,88,.12);border:1px solid rgba(255,96,88,.4);color:var(--hot);font-size:13.5px}
.toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
  background:rgba(13,44,93,.96);border:1px solid var(--line);color:#fff;
  padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;
  box-shadow:0 14px 30px -12px rgba(0,0,0,.6);
  opacity:0;pointer-events:none;transition:opacity .15s, transform .15s;z-index:10;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(255,96,88,.5);color:var(--hot)}

/* Patients / Queue / Settings simple list view */
.simple-card{
  background:rgba(255,255,255,.04);border:1px solid var(--line);
  border-radius:13px;padding:16px 18px;margin-bottom:10px;
}
.simple-card b{font-size:14px;font-weight:600;color:#fff;display:block;margin-bottom:3px}
.simple-card span{font-size:12.5px;color:var(--slate)}

/* ================================================================
   AI TEAM VIEW
   ================================================================ */
.team-hero{padding:32px 22px 20px;text-align:center}
.team-hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
.team-hero-title{font-size:26px;font-weight:800;line-height:1.15;margin-bottom:8px}
.team-hero-sub{font-size:13.5px;color:var(--slate);max-width:480px;margin:0 auto}

.team-category{padding:0 22px;margin-bottom:28px}
.team-cat-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.team-card{
  background:rgba(255,255,255,.03);border:1px solid var(--line);
  border-radius:14px;padding:16px 16px 14px;cursor:pointer;
  transition:background .2s cubic-bezier(.16,1,.3,1),border-color .2s,
             transform .2s cubic-bezier(.16,1,.3,1),box-shadow .2s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;gap:6px;
}
.team-card:hover{
  background:rgba(0,184,230,.09);border-color:rgba(0,184,230,.38);
  transform:translateY(-2px);box-shadow:0 10px 24px -12px rgba(0,184,230,.35);
}
.team-card:active{transform:translateY(0) scale(.98);transition-duration:.08s}
.team-card-icon{
  width:36px;height:36px;border-radius:9px;
  background:rgba(0,184,230,.10);border:1px solid rgba(0,184,230,.20);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);flex-shrink:0;margin-bottom:6px;
  transition:background .2s,border-color .2s,box-shadow .2s;
}
.team-card-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none}
.team-card:hover .team-card-icon{
  background:rgba(0,184,230,.18);border-color:rgba(0,184,230,.38);
  box-shadow:0 0 14px -4px rgba(0,184,230,.5);
}
.team-card-name{font-size:13px;font-weight:700;color:#fff}
.team-card-desc{font-size:11.5px;color:var(--slate);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Agent chat overlay */
.agent-chat-overlay{position:fixed;inset:0;background:rgba(4,11,26,.93);backdrop-filter:blur(16px);z-index:200;display:flex;flex-direction:column}
.agent-chat-header{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);background:rgba(6,14,34,.9);flex-shrink:0;min-height:64px}
.agent-chat-back{font-size:18px;color:var(--slate);cursor:pointer;padding:6px 8px;border-radius:8px;transition:color .15s,background .15s;line-height:1;display:flex;align-items:center;justify-content:center}
.agent-chat-back:hover{color:#fff;background:rgba(255,255,255,.06)}
.agent-chat-avatar{width:44px;height:44px;border-radius:12px;background:rgba(0,184,230,.1);border:1px solid rgba(0,184,230,.22);display:flex;align-items:center;justify-content:center;color:var(--cyan);padding:10px;flex-shrink:0;position:relative}
.agent-chat-avatar svg{width:100%;height:100%}
.agent-chat-avatar::after{content:'';position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid rgba(6,14,34,.9)}
.agent-chat-info{flex:1;min-width:0}
.agent-chat-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-chat-category{font-size:10.5px;color:var(--cyan);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.agent-chat-clear{font-size:11px;color:var(--slate-3);cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid var(--line);transition:color .15s,border-color .15s,background .15s;white-space:nowrap;flex-shrink:0}
.agent-chat-clear:hover{color:var(--hot);border-color:rgba(255,68,68,.4);background:rgba(255,68,68,.06)}

.agent-chat-thread{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.agent-chat-thread::-webkit-scrollbar{width:4px}
.agent-chat-thread::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.agent-chat-thread .bubble-wrap{display:flex;flex-direction:column;gap:5px;width:100%;max-width:720px}
.agent-chat-thread .bubble-wrap.user{align-self:flex-end;align-items:flex-end;max-width:560px}
.agent-chat-thread .bubble-wrap.agent{align-self:center;align-items:flex-start}
.agent-chat-thread .bubble{padding:12px 16px;border-radius:16px;font-size:13.5px;line-height:1.6;word-break:break-word}
.agent-chat-thread .bubble.user{background:rgba(0,184,230,.16);border:1px solid rgba(0,184,230,.24);border-bottom-right-radius:4px;color:#e8f4f8;white-space:pre-wrap}
.agent-chat-thread .bubble.agent{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:4px;color:#cdd8ee;white-space:normal}
.agent-chat-thread .bubble.agent h1,.agent-chat-thread .bubble.agent h2,.agent-chat-thread .bubble.agent h3{color:#e8f0fb;font-weight:600;margin:14px 0 6px;line-height:1.35}
.agent-chat-thread .bubble.agent h1{font-size:15px}
.agent-chat-thread .bubble.agent h2{font-size:14px}
.agent-chat-thread .bubble.agent h3{font-size:13.5px}
.agent-chat-thread .bubble.agent h1:first-child,.agent-chat-thread .bubble.agent h2:first-child,.agent-chat-thread .bubble.agent h3:first-child{margin-top:0}
.agent-chat-thread .bubble.agent p{margin:0 0 10px}
.agent-chat-thread .bubble.agent p:last-child{margin-bottom:0}
.agent-chat-thread .bubble.agent strong,.agent-chat-thread .bubble.agent b{color:#dce8f8;font-weight:600}
.agent-chat-thread .bubble.agent em,.agent-chat-thread .bubble.agent i{color:#b8cce0;font-style:italic}
.agent-chat-thread .bubble.agent ul,.agent-chat-thread .bubble.agent ol{margin:6px 0 10px;padding-left:20px}
.agent-chat-thread .bubble.agent ul:last-child,.agent-chat-thread .bubble.agent ol:last-child{margin-bottom:0}
.agent-chat-thread .bubble.agent li{margin-bottom:4px;line-height:1.55}
.agent-chat-thread .bubble.agent li::marker{color:var(--cyan)}
.agent-chat-thread .bubble.agent code{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:12px;background:rgba(0,184,230,.1);color:#7dd3fc;padding:1px 5px;border-radius:4px;border:1px solid rgba(0,184,230,.15)}
.agent-chat-thread .bubble.agent pre{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;overflow-x:auto;margin:10px 0}
.agent-chat-thread .bubble.agent pre:last-child{margin-bottom:0}
.agent-chat-thread .bubble.agent pre code{background:none;color:#94c6f7;padding:0;border:none;font-size:12px;border-radius:0}
.agent-chat-thread .bubble.agent hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:12px 0}
.agent-chat-thread .bubble.agent table{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0}
.agent-chat-thread .bubble.agent th,.agent-chat-thread .bubble.agent td{padding:7px 10px;border:1px solid rgba(255,255,255,.08);text-align:left}
.agent-chat-thread .bubble.agent th{background:rgba(0,184,230,.08);color:#a8c8e8;font-weight:600;font-size:11.5px;letter-spacing:.03em}
.agent-chat-thread .bubble.agent td{color:#b8cce0}
.agent-chat-thread .bubble.agent tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.agent-chat-thread .tools-used-bar{display:flex;flex-wrap:wrap;gap:5px;padding:2px 0}
.agent-chat-thread .tool-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--slate);letter-spacing:.02em;white-space:nowrap}
.agent-chat-thread .doc-download-link{font-size:11.5px;color:var(--cyan);text-decoration:none;padding:5px 10px;border:1px solid rgba(0,184,230,.3);border-radius:8px;display:inline-flex;align-items:center;gap:5px;transition:background .15s,border-color .15s}
.agent-chat-thread .doc-download-link:hover{background:rgba(0,184,230,.1);border-color:rgba(0,184,230,.5)}
.agent-chat-thread .typing{align-self:flex-start;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;border-bottom-left-radius:4px;display:inline-flex;align-items:center;gap:4px}
.agent-chat-thread .typing span{width:6px;height:6px;border-radius:50%;background:var(--slate-3);display:inline-block;animation:typing-dot 1.4s infinite ease-in-out both}
.agent-chat-thread .typing span:nth-child(1){animation-delay:0s}
.agent-chat-thread .typing span:nth-child(2){animation-delay:.2s}
.agent-chat-thread .typing span:nth-child(3){animation-delay:.4s}
@keyframes typing-dot{0%,80%,100%{transform:scale(.75);opacity:.4}40%{transform:scale(1);opacity:1}}

.agent-chat-composer{padding:14px 24px 18px;border-top:1px solid var(--line);background:rgba(6,14,34,.9);flex-shrink:0}
.agent-chat-composer-inner{display:flex;align-items:flex-end;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:8px 8px 8px 16px;transition:border-color .2s,box-shadow .2s;max-width:720px;margin:0 auto}
.agent-chat-composer-inner:focus-within{border-color:rgba(0,184,230,.4);box-shadow:0 0 0 3px rgba(0,184,230,.06)}
.agent-chat-input{flex:1;background:transparent;border:none;padding:4px 0;color:#e0eaf8;font:inherit;font-size:13.5px;resize:none;min-height:26px;max-height:120px;outline:none;line-height:1.6;color-scheme:dark}
.agent-chat-input::placeholder{color:var(--slate-3)}
.agent-chat-send{background:var(--cyan);color:#02111e;border:0;border-radius:12px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s,transform .1s;flex-shrink:0}
.agent-chat-send:hover:not(:disabled){opacity:.88;transform:scale(1.05)}
.agent-chat-send:active:not(:disabled){transform:scale(.95)}
.agent-chat-send:disabled{opacity:.3;cursor:default}
.agent-chat-send svg{width:16px;height:16px;stroke:#02111e;stroke-width:2.5;fill:none}

.agent-empty-thread{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:40px 24px}
.agent-empty-icon{width:64px;height:64px;color:var(--cyan);opacity:.3;margin-bottom:16px}
.agent-empty-icon svg{width:100%;height:100%}
.agent-empty-thread>strong{font-size:15px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:6px;letter-spacing:.01em}
.agent-empty-thread>p{font-size:13px;color:var(--slate-3);text-align:center;max-width:320px;line-height:1.5;margin:0}
.agent-empty-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:24px;max-width:480px}
.agent-empty-chip{font-size:12.5px;color:var(--slate);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:7px 14px;cursor:pointer;transition:color .15s,border-color .15s,background .15s;white-space:nowrap}
.agent-empty-chip:hover{color:#fff;border-color:rgba(0,184,230,.35);background:rgba(0,184,230,.08)}

/* --- Attach / Mic buttons (shared across chats) --- */
.chat-attach-btn,.chat-mic-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--slate);cursor:pointer;flex-shrink:0;transition:color .15s,background .15s;position:relative}
.chat-attach-btn:hover,.chat-mic-btn:hover{color:var(--cyan);background:rgba(0,184,230,.08)}
.chat-attach-btn svg,.chat-mic-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.75;fill:none;position:relative;z-index:1}
.chat-mic-btn[data-state="listening"]{color:#ff4444}
.chat-mic-btn[data-state="listening"]::before{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid #ff4444;animation:mic-pulse 1.2s ease-out infinite}
.chat-mic-btn[data-state="listening"]::after{content:"";position:absolute;inset:0;border-radius:8px;background:rgba(255,68,68,.1)}
.chat-mic-btn[data-state="processing"]{color:var(--slate);animation:mic-spin .6s ease-in-out forwards}
@keyframes mic-pulse{0%{transform:scale(.85);opacity:1}70%{transform:scale(1.3);opacity:0}100%{transform:scale(1.3);opacity:0}}
@keyframes mic-spin{0%{opacity:1;transform:rotate(0deg) scale(1)}50%{opacity:.4;transform:rotate(180deg) scale(.85)}100%{opacity:1;transform:rotate(360deg) scale(1)}}
@media(prefers-reduced-motion:reduce){.chat-mic-btn[data-state="listening"]::before{animation:none;opacity:.6;transform:scale(1.1)}.chat-mic-btn[data-state="processing"]{animation:none;opacity:.5}}

/* --- File preview chips inside composer --- */
.chat-file-preview-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 4px 0;max-width:720px;margin:0 auto}
.chat-file-preview-row:empty{display:none}
.chat-file-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,184,230,.08);border:1px solid rgba(0,184,230,.2);border-radius:8px;padding:4px 8px 4px 6px;max-width:200px}
.chat-file-chip-thumb{width:28px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0}
.chat-file-chip-icon{width:28px;height:28px;border-radius:4px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--slate)}
.chat-file-chip-icon svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.75;fill:none}
.chat-file-chip-name{font-size:11.5px;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.chat-file-chip-remove{width:16px;height:16px;border-radius:50%;border:none;background:transparent;color:var(--slate-3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;transition:color .15s,background .15s}
.chat-file-chip-remove:hover{color:#ff4444;background:rgba(255,68,68,.1)}
.chat-file-chip-remove svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none}
.chat-attachment-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--slate-3);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:2px 7px;margin-top:4px}
.chat-attachment-badge svg{width:11px;height:11px;stroke:currentColor;stroke-width:1.75;fill:none;flex-shrink:0}

/* --- Voice overlay (floating pill) --- */
.voice-overlay{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;align-items:center;gap:10px;background:#0a1628;border:1px solid rgba(0,184,230,.2);border-radius:24px;padding:18px 28px 14px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(0,184,230,.08)}
.voice-overlay[hidden]{display:none!important}
.voice-waveform{display:flex;align-items:center;gap:4px;height:36px}
.voice-bar{width:4px;border-radius:3px;background:var(--cyan);transform-origin:bottom center}
.voice-bar:nth-child(1){height:12px;animation:wave-bar 1.1s ease-in-out infinite}
.voice-bar:nth-child(2){height:20px;animation:wave-bar 1.1s ease-in-out .18s infinite}
.voice-bar:nth-child(3){height:32px;animation:wave-bar 1.1s ease-in-out .09s infinite}
.voice-bar:nth-child(4){height:20px;animation:wave-bar 1.1s ease-in-out .27s infinite}
.voice-bar:nth-child(5){height:12px;animation:wave-bar 1.1s ease-in-out .05s infinite}
@keyframes wave-bar{0%,100%{transform:scaleY(.35);opacity:.5}50%{transform:scaleY(1);opacity:1}}
