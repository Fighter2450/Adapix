            <div class="stoggle-body"><div class="stoggle-label">Customer needs a human reply</div><div class="stoggle-hint">Escalations &mdash; Adapix could not handle it automatically</div></div>
            <label class="stoggle"><input type="checkbox" checked /><span class="stoggle-track"></span></label>
          </div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Drafts are ready to review</div><div class="stoggle-hint">When Adapix writes messages waiting for your approval</div></div>
            <label class="stoggle"><input type="checkbox" checked /><span class="stoggle-track"></span></label>
          </div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Campaign pass completes</div><div class="stoggle-hint">Summary after each automated send cycle</div></div>
            <label class="stoggle"><input type="checkbox" /><span class="stoggle-track"></span></label>
          </div>
        </div>
        <button class="sform-save" data-action="save">Save changes</button>`;

    } else if (page === 'rules'){
      body = `
        <div class="scard">
          <div class="scard-title">Timing</div>
          <div class="sform-row">
            <label class="sform-label">First follow-up</label>
            <select class="sform-input sform-select" id="rules-first">
              <option value="0">Same day the campaign starts</option>
              <option value="1">1 day later</option>
              <option value="2">2 days later</option>
              <option value="3">3 days later</option>
              <option value="7">1 week later</option>
            </select>
            <div class="sform-hint">Adapix won't draft anything for a new contact until this long after their follow-up campaign starts.</div>
          </div>
          <div class="sform-row">
            <label class="sform-label">Re-contact window</label>
            <select class="sform-input sform-select" id="rules-touches">
              <option value="1">Once</option>
              <option value="2">Up to 2 times</option>
              <option value="3">Up to 3 times</option>
              <option value="0">Keep following the full schedule</option>
            </select>
            <div class="sform-hint">How many messages Adapix sends without getting a reply before it stops. A reply resets the count.</div>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title">Tone</div>
          <div class="sform-row">
            <label class="sform-label">Default message tone</label>
            <div class="stone-opts" id="rules-tone">
              <button class="stone-opt" data-tone="warm_professional">Warm Professional</button>
              <button class="stone-opt" data-tone="casual_friendly">Casual Friendly</button>
              <button class="stone-opt" data-tone="clinical_formal">Direct &amp; Formal</button>
            </div>
            <div class="sform-hint">Shapes every automated message Adapix writes for you.</div>
          </div>
        </div>
        <div class="scard">
          <div class="scard-title">Approval</div>
          <div class="stoggle-row">
            <div class="stoggle-body"><div class="stoggle-label">Auto-approve follow-ups</div><div class="stoggle-hint">Drafts send immediately instead of waiting in your Inbox for your OK. Escalations still always come to you.</div></div>
            <label class="stoggle"><input type="checkbox" id="rules-auto" /><span class="stoggle-track"></span></label>
          </div>
        </div>
        <button class="sform-save" id="rules-save">Save changes</button>`;

    } else if (page === 'account'){
      body = `
        <div class="scard">
          <div class="scard-title">Your plan</div>
          <div id="acct-plan" style="font-size:14px;color:var(--ink-2);margin-bottom:16px">Checking&hellip;</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="sform-save" id="acct-pay" style="display:none">Add payment method</button>
            <button class="sch-connect" id="acct-cancel" style="display:none;border-color:rgba(244,63,94,.4);color:#fda4af">Cancel subscription</button>
          </div>
          <div class="sform-hint" style="margin-top:12px">One plan: $99/month, everything included, after a 14-day free trial. Cancel anytime &mdash; you keep access through the end of the period you paid for.</div>
        </div>
        <div class="scard">
          <div class="scard-title">Team members</div>
          <div class="smember-row">
            <div class="smember-av">RC</div>
            <div><div class="smember-name">You</div><div class="smember-role">Owner</div></div>
          </div>
          <div style="margin-top:14px">
            <button class="sch-connect" style="font-size:13px;padding:7px 14px" data-action="invite">+ Invite team member</button>
          </div>

          <div class="scard-title" style="color:#F85149">Danger zone</div>
          <div style="font-size:13px;color:var(--slate-2);margin-bottom:14px;line-height:1.55">Deactivating pauses all automations and prevents Adapix from sending messages. You can reactivate at any time.</div>
          <button class="sdanger-btn" data-action="deactivate">Deactivate account</button>
        </div>`;
    }

    main.innerHTML = `
      <div class="spage">
        <button class="spage-back" data-action="back"><i data-lucide="arrow-left" style="width:14px;height:14px"></i> Settings</button>
        <div class="spage-head">
          <div class="spage-title">${meta.title}</div>
          <div class="spage-sub">${meta.sub}</div>
        </div>
        ${body}
      </div>`;

    renderLucide(main);

    if (page === 'channels') { loadPhoneCard(); loadEmailCard(); }
    if (page === 'profile') { loadKnowledgeCard(); }
    if (page === 'rules') { loadRulesPage(); }

    main.querySelector('[data-action="back"]').addEventListener('click', () => goSettingsView(null));

    main.querySelectorAll('.sform-save, [data-action="save"]').forEach(btn => {
      if (btn.id === 'rules-save') return; // has its own real handler
      btn.addEventListener('click', () => toast('Changes saved'));
    });
    const inv = main.querySelector('[data-action="invite"]');
    if (inv) inv.addEventListener('click', () => toast('Invite link copied — feature coming soon'));
    const deact = main.querySelector('[data-action="deactivate"]');
    if (deact) deact.addEventListener('click', () => toast('Contact support to deactivate your account', true));
    const conSms = main.querySelector('[data-action="connect-sms"]');
    if (conSms) conSms.addEventListener('click', () => toast('SMS setup coming soon'));

    main.querySelectorAll('.stone-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        main.querySelectorAll('.stone-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Specialty picker (profile page only)
    if (page === 'profile') {
      const stypeSearch = main.querySelector('#stype-search');
      const stypeDD    = main.querySelector('#stype-dropdown');
      const stypeSel   = main.querySelector('#stype-selected');
      const stypeSelN  = main.querySelector('#stype-selected-name');
      const stypeSelC  = main.querySelector('#stype-selected-cat');
      const stypeClr   = main.querySelector('#stype-clear');

      function stypeFuzzy(it, q){
        const n = it.name.toLowerCase(), c = it.cat.toLowerCase();
        if (n.startsWith(q)) return 1000;
        const ni = n.indexOf(q); if (ni >= 0) return 800 - ni;
        const ci = c.indexOf(q); if (ci >= 0) return 400 - ci;
        return -1;
      }

      function stypeRenderDD(items, showHdr){
        const rows = items.map(it =>
          `<div class="stype-row" data-id="${it.id}"><b>${it.name}</b><span class="stype-cat">${it.cat}</span></div>`
        ).join('');
        const hdr = showHdr ? '<div class="stype-examples-hd">Examples — start typing to search 200+ types</div>' : '';
        const notListed = '<div class="stype-row notlisted" data-id="__other"><b>Not listed — describe it yourself</b><span class="stype-cat">free text</span></div>';
        stypeDD.innerHTML = items.length === 0
          ? '<div class="stype-empty">No matches — try another word</div>' + notListed
          : hdr + rows + notListed;
        stypeDD.hidden = false;
        stypeDD.querySelectorAll('[data-id]').forEach(el => {
          el.addEventListener('mousedown', e => {
            e.preventDefault();
            const id = el.dataset.id;
            if (id === '__other'){
              stypeSearch.value = '';
              stypeDD.hidden = true;
              stypeSel.hidden = true;
              return;
            }
            const it = BUSINESS_TYPES.find(x => x.id === id);
            if (!it) return;
            stypeSearch.value = it.name;
            stypeSelN.textContent = it.name;
            stypeSelC.textContent = it.cat;
            stypeSel.hidden = false;
            stypeDD.hidden = true;
          });
        });
      }

      function stypeShowDefaults(){
        const items = STYPE_DEFAULTS.map(id => BUSINESS_TYPES.find(b => b.id === id)).filter(Boolean);
        stypeRenderDD(items, true);
      }

      stypeSearch.addEventListener('focus', stypeShowDefaults);
      stypeSearch.addEventListener('input', () => {
        const q = stypeSearch.value.trim().toLowerCase();
        if (!q){ stypeShowDefaults(); return; }
        const items = BUSINESS_TYPES
          .map(it => ({it, s: stypeFuzzy(it, q)}))
          .filter(x => x.s >= 0)
          .sort((a, b) => b.s - a.s)
          .slice(0, 8)
          .map(x => x.it);
        stypeRenderDD(items, false);
      });
      stypeSearch.addEventListener('blur', () => { setTimeout(() => { stypeDD.hidden = true; }, 120); });
      stypeClr.addEventListener('click', () => {
        stypeSearch.value = '';
        stypeSel.hidden = true;
      });
    }
  }

  function renderRightPane(){
    const feed = state.feed || {};
    const d = feed.digest || {};
    const sent = d.sent_today || 0;
    const esc = (feed.escalations || []).length;
    const dr = (feed.approvals || []).length;
    const booked = d.booked_recent || 0;
    const totalMsgs = sent + dr;
    const arc = Math.min(100, Math.round((sent / Math.max(1, totalMsgs)) * 100));
    const rp = document.getElementById('rightpane');
    if (!rp) return;
    rp.innerHTML =
        '<div class="rp-card today-card">'
      +   '<div class="rp-eyebrow">Today</div>'
      +   '<div class="stat-grid">'
      +     '<div class="stat-tile stat-sent"><div class="stat-icon"><i data-lucide="send"></i></div><div class="stat-num">'+sent+'</div><div class="stat-lbl">Sent</div></div>'
      +     '<div class="stat-tile stat-esc"><div class="stat-icon"><i data-lucide="alert-circle"></i></div><div class="stat-num">'+esc+'</div><div class="stat-lbl">Flagged</div></div>'
      +     '<div class="stat-tile stat-draft"><div class="stat-icon"><i data-lucide="file-edit"></i></div><div class="stat-num">'+dr+'</div><div class="stat-lbl">Drafts</div></div>'
      +     '<div class="stat-tile stat-booked"><div class="stat-icon"><i data-lucide="calendar-check"></i></div><div class="stat-num">'+booked+'</div><div class="stat-lbl">Booked</div></div>'
      +   '</div>'
      +   '<div class="rp-progress"><div class="rp-progress-bar" style="width:'+arc+'%"></div></div>'
      +   '<div class="rp-progress-lbl"><span>'+sent+' sent</span><span>'+dr+' pending review</span></div>'
      + '</div>'
      + '<div class="rp-card device-card">'
      +   '<div class="device-visual"><div class="device-box"><div class="device-glow"></div><div class="device-label">ADAPT</div></div></div>'
      +   '<div class="device-body">'
      +     '<div class="rp-eyebrow" style="margin-bottom:8px">Your appliance</div>'
      +     '<div class="device-name">Adapt 1.0</div>'
      +     '<div class="device-rows">'
      +       '<div class="device-row"><div class="device-row-dot"></div><span>Connection</span><b>Online</b></div>'
      +       '<div class="device-row"><span class="device-row-icon">⏱</span><span>Uptime</span><b>'+formatUptime(Date.now()-(state._bootedAt||Date.now()))+'</b></div>'
      +       '<div class="device-row"><span class="device-row-icon">⌥</span><span>Version</span><b>v0.1.0</b></div>'
      +     '</div>'
      +   '</div>'
      + '</div>';
    renderLucide(rp);
  }

  function formatUptime(ms){
    const s = Math.floor(ms/1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s/60);
    if (m < 60) return m + 'm';
    const h = Math.floor(m/60);
    return h + 'h ' + (m%60) + 'm';
  }

  async function loadFeed(){
    const [feed, calls] = await Promise.all([
      fetch('/api/v1/feed', {credentials:'include'}).then(r=>r.json()).catch(()=>({})),
      fetch('/api/v1/calls', {credentials:'include'}).then(r=>r.json()).catch(()=>null),
    ]);
    state.feed = feed;
    if (calls) state.calls = calls;
  }

  function goView(name){
    state.view = name;
    state._userNavigated = true;
    state.settingsPage = null;
    state.contactsPage = null;
    document.querySelectorAll('#leftnav button, #bn button').forEach(b => {
      b.classList.toggle('on', b.dataset.view === name);
    });
    render();
    if (name === 'inbox') refreshFeed();
  }

  function goSettingsView(page){
    state.settingsPage = page;
    renderSettingsLink();
    if (page === 'notifications') setTimeout(initNotifPage, 50);
    if (page === 'account') setTimeout(initAccountBilling, 50);
    if (page === 'profile') setTimeout(initWebsiteImport, 50);
  }

  function bindNav(){
    // Delegated so navigation works no matter when (or how often) the nav
    // buttons are painted — a click can never land on an unbound button.
    document.addEventListener('click', (e) => {
      const b = e.target.closest('#leftnav button[data-view], #bn button[data-view]');
      if (b) goView(b.dataset.view);
    });

    const runBtn = document.getElementById('run-campaigns');
    if (runBtn) runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      runBtn.innerHTML = '<i data-lucide="loader-2" style="animation:spin .7s linear infinite"></i><span>Running…</span>';
      renderLucide(runBtn);
      try {
        const r = await fetch('/api/v1/campaigns/run', {method:'POST', credentials:'include'});
        const j = await r.json();
        const composed = (j.results||[]).reduce((s,x)=>s+(x.composed||0),0);
        const errs = (j.errors||[]).length;
        if (errs && !composed) {
          toast('Campaign pass hit an error — Claude API may be busy. Will retry in 5 min.');
        } else if (composed > 0) {
          toast(composed + ' message' + (composed===1?'':'s') + ' drafted — check the Queue tab to approve.');
          await loadFeed(); render();
        } else {
          toast('No messages due right now. Campaigns are up to date.');
        }
      } catch(e) {
        toast('Could not reach server. Is it running?');
      } finally {
        runBtn.disabled = false;
        runBtn.innerHTML = '<i data-lucide="play"></i><span>Run</span>';
        renderLucide(runBtn);
      }
    });
  }

  (async function init(){
    state._bootedAt = Date.now();
    bindNav();
    if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': '1.75' } });
    await loadFeed();
    document.getElementById('loader')?.remove();
    const params = new URLSearchParams(window.location.search);
    // Don't stomp a tab the user already clicked while the feed was loading.
    if (params.get('tab') === 'settings' && !state._userNavigated) {
      state.view = 'settings';
      state.settingsPage = 'channels';
    }
    render();
    setInterval(()=>{ try { renderRightPane(); } catch(_){} }, 60000);
  })();
})();
</script>

<script>
// ----- push notifications: one-tap enable prompt -----
(function(){
  if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) return;
  if (Notification.permission === 'denied') return;
  if (localStorage.getItem('adapix-push-dismissed')) return;

  function b64ToU8(base64){
    var pad = '='.repeat((4 - base64.length % 4) % 4);
    var b = (base64 + pad).replace(/-/g, '+').replace(/_/g, '/');
    var raw = atob(b), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  async function alreadySubscribed(){
    try {
      var reg = await window.adapixSwReg();
      return !!(await reg.pushManager.getSubscription());
    } catch(_) { return false; }
  }

  async function subscribe(){
    var reg = await window.adapixSwReg();
    var res = await fetch('/api/v1/notify/vapid-public-key', {credentials:'include'});
    if (!res.ok) throw new Error('push not configured');
    var key = (await res.json()).public_key;
    var sub = await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:b64ToU8(key)});
    var j = sub.toJSON();
    await fetch('/api/v1/notify/subscribe', {method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({endpoint:j.endpoint, keys:j.keys, user_agent:navigator.userAgent})});
  }
  window.adapixSubscribePush = subscribe;

  async function maybePrompt(){
    if (await alreadySubscribed()) return;
    var card = document.createElement('div');
    card.className = 'push-prompt';
    card.innerHTML = '<b>Never miss a draft</b>' +
      '<p>Get a ping on this device when a follow-up is waiting for your OK or a customer needs you.</p>' +
      '<div class="row"><button class="yes">Turn on notifications</button><button class="no">Not now</button></div>';
    document.body.appendChild(card);
    card.querySelector('.no').addEventListener('click', function(){
      localStorage.setItem('adapix-push-dismissed', '1');
      card.remove();
    });
    card.querySelector('.yes').addEventListener('click', async function(){
      this.disabled = true; this.textContent = 'Enabling…';
      try {
        if (Notification.permission !== 'granted') {
          var p = await Notification.requestPermission();
          if (p !== 'granted') { card.remove(); return; }
        }
        await subscribe();
        card.innerHTML = '<b>Notifications on</b><p>This device will ping when something needs you.</p>';
        setTimeout(function(){ card.remove(); }, 3500);
      } catch(e) {
        card.innerHTML = '<b>Could not enable</b><p>' + (e.message || 'Try again from Settings later.') + '</p>';
        setTimeout(function(){ card.remove(); }, 4000);
      }
    });
  }
  // give the app a beat to boot before asking
  setTimeout(maybePrompt, 6000);
})();
</script>

<script>
/* ================================================================
   MOTION LAYER — auto entrance + counters (UI/UX Pro Max)
   Observes #main; on every view re-render it staggers cards in and
   counts up any numeric stat values. No render-function edits needed.
   ================================================================ */
(function(){
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const main = document.getElementById('main');
  if (!main) return;

  // Elements that should stagger-fade in on each render
  const ENTER_SEL = [
    '.hero-card', '.home-stat-card', '.row-card', '.team-card',
    '.team-category', '.activity-row', '.scard', '.rp-card', '.empty-row'
  ].join(',');

  function animateEntrance(root){
    if (reduce) return;
    const items = root.querySelectorAll(ENTER_SEL);
    let i = 0;
    items.forEach(el=>{
      if (el.dataset.entered) return;
      el.dataset.entered = '1';
      const delay = Math.min(i * 38, 320);  // cap stagger so long lists aren't slow
      el.style.opacity = '0';
      el.style.animation = `fadeSlideUp var(--dur-med) var(--ease-out) ${delay}ms both`;
      i++;
    });
  }

  function animateCounters(root){
    const vals = root.querySelectorAll('.home-stat-val');
    vals.forEach(el=>{
      if (el.dataset.counted) return;
      const target = parseInt((el.textContent||'').replace(/[^0-9]/g,''), 10);
      if (!Number.isFinite(target) || target <= 0){ el.dataset.counted='1'; return; }
      el.dataset.counted = '1';
      if (reduce){ el.textContent = String(target); return; }
      const dur = 700, start = performance.now();
      const tick = (now)=>{
        const t = Math.min((now - start)/dur, 1);
        const eased = 1 - Math.pow(1 - t, 3);          // easeOutCubic
        el.textContent = String(Math.round(eased * target));
        if (t < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    });
  }

  let raf = 0;
  const obs = new MutationObserver(()=>{
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(()=>{ animateEntrance(main); animateCounters(main); });
  });
  obs.observe(main, {childList:true, subtree:true});

  // Initial pass
  animateEntrance(main);
  animateCounters(main);
})();
</script>
