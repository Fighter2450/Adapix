      <p style="font-size:13.5px;color:var(--ink-2);margin-bottom:22px;max-width:640px">Set up how Adapix sends on your behalf, write a one-off message, and see every SMS and email that's gone out or come in.</p>

      <div class="scard" id="msg-email-card">
        <div class="scard-title">Your email connection</div>
        <div id="email-card-body" style="font-size:13px;color:var(--ink-2)">Loading…</div>
      </div>
      <div class="scard">
        <div class="scard-title">Your texting line</div>
        <div class="sch-row" id="msg-imessage-row">
          <div class="sch-icon"><i data-lucide="message-square" style="width:16px;height:16px"></i></div>
          <div class="sch-body"><div class="sch-name">iMessage line</div><div class="sch-val" id="msg-imessage-val">Checking…</div></div>
          <span class="sch-badge off" id="msg-imessage-badge">…</span>
          <button class="sch-connect" id="msg-sms-connect">Set up my line</button>
        </div>
        <div class="sform-hint" style="margin-top:10px">Every business texts from its OWN dedicated line — blue-bubble iMessage on Apple devices, never a shared number. Until your line is set up, texts fall back to standard SMS.</div>
      </div>

      <div class="scard">
        <div class="scard-title">Write a message</div>
        <div class="mtabs">
          <button class="mtab active" data-channel="sms">Text (SMS)</button>
          <button class="mtab" data-channel="email">Email</button>
        </div>
        <div class="sform-row">
          <label class="sform-label" id="msg-to-label">Phone number</label>
          <input class="sform-input" id="msg-to" placeholder="(555) 000-0000" />
        </div>
        <div class="sform-row" id="msg-name-row">
          <label class="sform-label">Contact name (if new)</label>
          <input class="sform-input" id="msg-contact-name" placeholder="Only needed if this isn't an existing contact" />
        </div>
        <div class="sform-row" id="msg-subject-row" hidden>
          <label class="sform-label">Subject</label>
          <input class="sform-input" id="msg-subject" placeholder="Subject line" />
        </div>
        <div class="sform-row">
          <label class="sform-label">Message</label>
          <textarea class="sform-input" id="msg-body" rows="5" style="resize:vertical" placeholder="Write your message…"></textarea>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="sch-connect" id="msg-queue">Queue for approval</button>
          <button class="sform-save" id="msg-send">Send now</button>
        </div>
        <div class="sform-hint" style="margin-top:10px">Queue it and it waits in your Inbox until you approve it, like everything else Adapix drafts. Send now delivers immediately through the same connections above.</div>
      </div>

      <div class="home-section-head" style="margin-top:26px">
        <span class="section-eyebrow" style="margin:0">All messages</span>
        <button class="home-see-all" id="msg-refresh">Refresh ›</button>
      </div>
      <div id="msg-list"><div style="padding:30px;text-align:center;color:var(--ink-3)">Loading…</div></div>
    `;
    renderLucide(main);
    loadEmailCard();

    // Per-business iMessage line status (each org has its OWN Blooio line,
    // stored on the Organization row — never a shared sender).
    api('/api/v1/database').then(d => {
      const val = document.getElementById('msg-imessage-val');
      const badge = document.getElementById('msg-imessage-badge');
      const btn = document.getElementById('msg-sms-connect');
      if (!val || !badge) return;
      if (d.imessage_connected) {
        val.textContent = (d.imessage_number || 'Your dedicated line') + ' — texts go blue on Apple devices';
        badge.textContent = 'Connected';
        badge.classList.remove('off');
        if (btn) btn.style.display = 'none';
      } else {
        val.textContent = 'No dedicated line yet — texts send as standard SMS';
        badge.textContent = 'Not set up';
      }
    }).catch(()=>{
      const val = document.getElementById('msg-imessage-val');
      if (val) val.textContent = 'No dedicated line yet — texts send as standard SMS';
      const badge = document.getElementById('msg-imessage-badge');
      if (badge) badge.textContent = 'Not set up';
    });

    const smsConnect = document.getElementById('msg-sms-connect');
    if (smsConnect) smsConnect.addEventListener('click', () => toast('Ask Adapix to provision your dedicated texting line — self-serve setup coming soon'));

    const retryNum = document.getElementById('retry-calling-number');
    if (retryNum) retryNum.addEventListener('click', async (e) => {
      e.stopPropagation();
      retryNum.disabled = true; retryNum.textContent = 'Retrying…';
      try {
        await api('/api/v1/calling-number/retry', {method:'POST'});
        toast('Retrying — check back in a minute');
      } catch(_){ toast('Could not retry', true); retryNum.disabled = false; retryNum.textContent = 'Retry'; }
    });

    // Channel tabs swap the "To" field's meaning and toggle the subject line.
    const toEl = document.getElementById('msg-to');
    const toLabel = document.getElementById('msg-to-label');
    const subjectRow = document.getElementById('msg-subject-row');
    let channel = 'sms';
    main.querySelectorAll('.mtab').forEach(btn => {
      btn.addEventListener('click', () => {
        main.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        channel = btn.dataset.channel;
        const isEmail = channel === 'email';
        subjectRow.hidden = !isEmail;
        toLabel.textContent = isEmail ? 'Email address' : 'Phone number';
        toEl.placeholder = isEmail ? 'you@customer.com' : '(555) 000-0000';
        toEl.value = ''; // switching channels means switching what "To" even means
      });
    });

    async function loadMessages(){
      const listEl = document.getElementById('msg-list');
      listEl.innerHTML = '<div style="padding:30px;text-align:center;color:var(--ink-3)">Loading…</div>';
      try {
        const j = await api('/api/v1/messages?channel=sms,email&limit=50');
        const msgs = j.messages || [];
        listEl.innerHTML = msgs.length ? '<div class="rows">' + msgs.map(m => {
          const inbound = m.direction === 'inbound';
          const icon = m.channel === 'email' ? 'mail' : 'message-square';
          const when = m.created_at ? new Date(m.created_at).toLocaleString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : '';
          const snippet = (m.subject ? m.subject + ' — ' : '') + (m.body || '').slice(0, 140);
          return `
          <div class="row-card">
            <div style="flex:0 0 auto;color:var(--ink-3)"><i data-lucide="${icon}" style="width:16px;height:16px"></i></div>
            <div class="text" style="flex:1"><b>${escapeHTML(m.contact_name)} ${inbound ? '→ you' : '← Adapix'}</b><span>${escapeHTML(snippet)}</span></div>
            <span class="pill ${m.status === 'pending_approval' ? 'hot' : ''}">${escapeHTML((m.status || '').replace('_', ' '))}</span>
            <span style="color:var(--ink-3);font-size:11.5px;flex:0 0 auto;white-space:nowrap">${when}</span>
          </div>`;
        }).join('') + '</div>' : `
          <div style="text-align:center;padding:40px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px">
            <div style="font-size:13.5px;color:var(--ink-2)">No SMS or emails yet — write one above to get started.</div>
          </div>`;
        renderLucide(listEl);
      } catch(_){
        listEl.innerHTML = '<div style="padding:30px;text-align:center;color:var(--ink-3)">Could not load — try refreshing.</div>';
      }
    }
    loadMessages();
    document.getElementById('msg-refresh').addEventListener('click', (e) => { e.preventDefault(); loadMessages(); });

    async function compose(queue){
      const to = toEl.value.trim();
      const bodyText = document.getElementById('msg-body').value.trim();
      if (!to) { toast(channel === 'email' ? 'Enter an email address' : 'Enter a phone number', true); return; }
      if (!bodyText) { toast('Write a message first', true); return; }
      const btn = queue ? document.getElementById('msg-queue') : document.getElementById('msg-send');
      const original = btn.textContent;
      btn.disabled = true; btn.textContent = queue ? 'Queuing…' : 'Sending…';
      try {
        const r = await api('/api/v1/messages/compose', { method: 'POST', body: JSON.stringify({
          channel, to,
          contact_name: document.getElementById('msg-contact-name').value.trim(),
          subject: document.getElementById('msg-subject').value.trim(),
          body: bodyText,
          queue,
        })});
        if (queue) {
          toast('Queued — approve it from your Inbox');
        } else if (r.ok) {
          toast('Sent');
        } else {
          toast('Could not send — check your connection above', true);
        }
        document.getElementById('msg-body').value = '';
        document.getElementById('msg-contact-name').value = '';
        loadMessages();
        refreshFeed();
      } catch(e){
        toast(e.message || 'Something went wrong', true);
      }
      btn.disabled = false; btn.textContent = original;
    }
    document.getElementById('msg-queue').addEventListener('click', () => compose(true));
    document.getElementById('msg-send').addEventListener('click', () => compose(false));
  }

  // -------- STATION view — the departures board for everything in the pipeline --------
  // Every call, SMS, and email moving through Adapix, shown like a train
  // station board: BOARDING (waiting for your approval), DEPARTING (approved,
  // about to send), DEPARTED (sent), DELAYED (failed), CANCELLED (rejected) —
  // plus an Arrivals board for everything coming back in (replies, call
  // outcomes). Auto-refreshes every 15s while you're watching.
  let stationTimer = null;
  function renderStationView(){
    if (stationTimer) { clearInterval(stationTimer); stationTimer = null; }
    main.innerHTML = `
      <div class="section-eyebrow">Station</div>
      <h1 class="page-title" style="margin-bottom:6px">Everything moving through Adapix</h1>
      <p style="font-size:13.5px;color:var(--ink-2);margin-bottom:22px;max-width:640px">Every call, text, and email in the pipeline — boarding while it waits for your OK, departing when it sends, arriving when customers reply. Updates live.</p>
      <div id="station-boards"><div style="padding:40px;text-align:center;color:var(--ink-3)">Loading the board…</div></div>
    `;
    renderLucide(main);

    const STATUS_MAP = {
      pending_approval: {label: 'BOARDING',  cls: 'boarding',  hint: 'waiting for your OK'},
      composed:         {label: 'SCHEDULED', cls: 'scheduled', hint: 'drafted, not queued yet'},
      approved:         {label: 'DEPARTING', cls: 'departing', hint: 'approved — sending'},
      sent:             {label: 'DEPARTED',  cls: 'departed',  hint: 'delivered'},
      failed:           {label: 'DELAYED',   cls: 'delayed',   hint: 'send failed'},
      rejected:         {label: 'CANCELLED', cls: 'cancelled', hint: 'you rejected it'},
    };
    const ORDER = {pending_approval: 0, approved: 1, composed: 2, sent: 3, failed: 4, rejected: 5};
    const CHANNEL_ICON = {call: 'phone', sms: 'message-square', email: 'mail'};

    function boardRow(m, isArrival){
      const st = isArrival
        ? {label: 'ARRIVED', cls: 'departed', hint: m.channel === 'call' ? 'call finished — outcome logged' : 'reply received'}
        : (STATUS_MAP[m.status] || {label: (m.status || '').toUpperCase(), cls: 'scheduled', hint: ''});
      const when = m.created_at ? new Date(m.created_at).toLocaleString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : '—';
      const dest = m.channel === 'email' ? (m.contact_email || '') : (m.contact_phone || '');
      const snippet = (m.subject ? m.subject + ' — ' : '') + (m.body || '').slice(0, 90);
      const cancelBtn = (!isArrival && m.status === 'pending_approval')
        ? `<button class="st-cancel" data-cancel-msg="${m.id}" title="Cancel this message — it will never send">✕</button>`
        : '';
      return `
        <div class="station-row">
          <span class="st-time">${when}</span>
          <span class="st-ch"><i data-lucide="${CHANNEL_ICON[m.channel] || 'send'}" style="width:14px;height:14px"></i>${(m.channel || '').toUpperCase()}</span>
          <span class="st-who"><b>${escapeHTML(m.contact_name)}</b><span class="st-dest">${escapeHTML(dest)}</span></span>
          <span class="st-snippet">${escapeHTML(snippet)}</span>
          <span class="st-status-wrap"><span class="st-status ${st.cls}" title="${escapeHTML(st.hint)}"><span class="st-dot"></span>${st.label}</span>${cancelBtn}</span>
        </div>`;
    }

    function queueRow(q){
      const due = new Date(q.due_at + 'Z');
      const dueTxt = q.due_now
        ? 'due — composing on the next pass'
        : 'due ' + due.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      const dest = q.channel === 'email' ? (q.contact_email || '') : (q.contact_phone || '');
      const what = 'Day ' + q.day + (q.intent ? ' — ' + q.intent.replace(/_/g, ' ') : '') + ' · ' + q.workflow.replace(/_/g, ' ');
      return `
        <div class="station-row">
          <span class="st-time">${due.toLocaleString('en-US', {month:'short', day:'numeric'})}</span>
          <span class="st-ch"><i data-lucide="${CHANNEL_ICON[q.channel] || 'send'}" style="width:14px;height:14px"></i>${(q.channel || '').toUpperCase()}</span>
          <span class="st-who"><b>${escapeHTML(q.contact_name)}</b><span class="st-dest">${escapeHTML(dest)}</span></span>
          <span class="st-snippet">${escapeHTML(what)}</span>
          <span class="st-status-wrap"><span class="st-status ${q.due_now ? 'departing' : 'scheduled'}" title="${escapeHTML(dueTxt)}"><span class="st-dot"></span>${q.due_now ? 'COMPOSING' : 'QUEUED'}</span><button class="st-cancel" data-stop-campaign="${q.campaign_id}" title="Stop this contact's follow-up campaign">✕</button></span>
        </div>`;
    }

    async function refreshBoard(){
      const el = document.getElementById('station-boards');
      if (!el) return;
      try {
        const [j, qj] = await Promise.all([
          api('/api/v1/messages?channel=sms,email,call&limit=80'),
          api('/api/v1/station/queue').catch(() => ({queue: []})),
        ]);
        const msgs = j.messages || [];
        const queue = qj.queue || [];
        const departures = msgs.filter(m => m.direction === 'outbound')
          .sort((a, b) => (ORDER[a.status] ?? 9) - (ORDER[b.status] ?? 9) || (b.created_at || '').localeCompare(a.created_at || ''))
          .slice(0, 25);
        const arrivals = msgs.filter(m => m.direction === 'inbound').slice(0, 10);
        const boarding = departures.filter(m => m.status === 'pending_approval').length;
        const dueNow = queue.filter(q => q.due_now).length;

        el.innerHTML = `
          <div class="station-board">
            <div class="station-board-head">
              <span class="station-board-title">▲ Departures</span>
              <span class="station-board-sub">${boarding ? boarding + ' boarding — waiting for your OK in the Inbox' : 'nothing waiting on you'}</span>
            </div>
            ${departures.length ? departures.map(m => boardRow(m, false)).join('') : '<div class="station-empty">No outbound calls, texts, or emails in the pipeline yet.</div>'}
          </div>
          <div class="station-board" style="margin-top:22px">
            <div class="station-board-head">
              <span class="station-board-title">◷ In queue</span>
              <span class="station-board-sub">${queue.length ? queue.length + ' follow-up' + (queue.length === 1 ? '' : 's') + ' scheduled' + (dueNow ? ' — ' + dueNow + ' composing on the next pass' : '') : 'what the AI will write next, before it writes it'}</span>
            </div>
            ${queue.length ? queue.slice(0, 15).map(queueRow).join('') : '<div class="station-empty">Nothing scheduled — start a campaign from Contacts and upcoming follow-ups will line up here.</div>'}
          </div>
          <div class="station-board" style="margin-top:22px">
            <div class="station-board-head">
              <span class="station-board-title">▼ Arrivals</span>
              <span class="station-board-sub">replies and call outcomes coming back in</span>
            </div>
            ${arrivals.length ? arrivals.map(m => boardRow(m, true)).join('') : '<div class="station-empty">Nothing has come back in yet.</div>'}
          </div>`;
        renderLucide(el);

        // Cancel a boarding message (rejects it — it will never send)
        el.querySelectorAll('[data-cancel-msg]').forEach(btn => btn.addEventListener('click', async () => {
          btn.disabled = true;
          try {
            await api(`/api/v1/approvals/${btn.dataset.cancelMsg}/reject`, { method:'POST', body: JSON.stringify({reason: 'cancelled from Station'}) });
            toast('Cancelled — it will never send');
            refreshBoard();
          } catch(_){ toast('Could not cancel', true); btn.disabled = false; }
        }));
        // Stop a queued campaign (no further follow-ups for that contact)
        el.querySelectorAll('[data-stop-campaign]').forEach(btn => btn.addEventListener('click', async () => {
          btn.disabled = true;
          try {
            await api(`/api/v1/campaigns/${btn.dataset.stopCampaign}/stop`, { method:'POST', body: JSON.stringify({}) });
            toast('Campaign stopped — no more follow-ups for this contact');
            refreshBoard();
          } catch(_){ toast('Could not stop', true); btn.disabled = false; }
        }));
      } catch(_){
        el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-3)">Could not load the board — try again in a moment.</div>';
      }
    }
    refreshBoard();
    stationTimer = setInterval(() => {
      if (state.view !== 'station') { clearInterval(stationTimer); stationTimer = null; return; }
      refreshBoard();
    }, 15000);
  }

  let inboxTimer = null;
  function renderInboxView(){
    if (inboxTimer) { clearInterval(inboxTimer); inboxTimer = null; }
    inboxTimer = setInterval(() => {
      if (state.view !== 'inbox') { clearInterval(inboxTimer); inboxTimer = null; return; }
      refreshFeed();
    }, 20000);
    const feed = state.feed || {};
    const escs  = feed.escalations || [];
    // Pending calls have their own home in the Calls tab — don't duplicate them here.
    const apprs = (feed.approvals || []).filter(m => m.channel !== 'call');
    const total = escs.length + apprs.length;
    const hasEsc = escs.length > 0;

    let html = '<div class="section-eyebrow">Inbox · ' + total + ' item' + (total===1?'':'s') + '</div>';

    if (hasEsc) {
      html += '<div class="hero-card alert" style="margin-bottom:20px">'
        + '<div class="hero-top"><div class="hero-pill alert"><span class="hero-pill-dot"></span>' + escs.length + ' waiting for you</div><span class="hero-updated">Needs your attention</span></div>'
        + '<div class="hero-body"><div class="hero-icon"><i data-lucide="alert-triangle" style="width:18px;height:18px"></i></div>'
        + '<div class="hero-text"><h2>' + escs.length + ' ' + (escs.length>1?'people are':'person is') + ' waiting to hear back from you</h2>'
        + '<p style="color:var(--ink-2)">' + (escs.length>1?'These ones are':'This one is') + ' too important for Adapix to answer on its own. Take a quick look and reply yourself.</p></div></div></div>';
    }

    if (!total){
      html += `
        <div style="text-align:center;padding:48px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px">
          <div style="font-size:32px;margin-bottom:12px;color:var(--good)">✓</div>
          <div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:8px">You're all caught up.</div>
          <div style="font-size:13.5px;color:var(--ink-2);max-width:340px;margin:0 auto;line-height:1.6">
            Nothing needs you right now. Adapix will let you know the moment something does.
          </div>
        </div>`;
    } else {
      if (escs.length){
        html += '<div class="section-eyebrow" style="color:var(--hot);margin-bottom:12px">Reply to these yourself · ' + escs.length + '</div>';
        html += '<div class="rows">' + escs.map(e => {
          const fromCall = e.channel === 'call';
          const detail = fromCall ? (e.call_summary || e.reasoning || '') : (e.reasoning || '');
          const nameLine = fromCall
            ? `<i data-lucide="phone-incoming" style="width:12px;height:12px;color:var(--cyan)"></i> ${escapeHTML(e.patient)}`
            : escapeHTML(e.patient);
          const channelForReply = (e.channel === 'sms' || e.channel === 'email') ? e.channel : 'sms';
          const canReply = channelForReply === 'email' ? e.has_email : e.has_phone;
          return `
          <div class="row-card hot" data-esc-id="${e.id}" style="cursor:pointer;flex-wrap:wrap" data-action="esc-toggle" title="Click to reply or mark handled">
            <div class="text"><b style="display:inline-flex;align-items:center;gap:6px">${nameLine}</b><span>${escapeHTML(escLabel(e.category) + (detail ? ' · ' + detail : ''))}</span></div>
            <span class="pill hot">${escapeHTML(escLabel(e.category))}</span>
            <span style="color:var(--ink-3);font-size:18px;flex:0 0 auto">›</span>
            <div data-esc-editor hidden style="flex-basis:100%;margin-top:12px;padding-top:12px;border-top:1px solid rgba(244,63,94,.2);cursor:default" onclick="event.stopPropagation()">
              ${e.triggering_body ? `<div style="font-size:13px;color:var(--ink-2);background:rgba(255,255,255,.03);border-radius:8px;padding:10px 12px;margin-bottom:10px;white-space:pre-wrap">${escapeHTML(e.triggering_body)}</div>` : ''}
              ${canReply ? `
              <textarea data-esc-reply rows="3" placeholder="Type your reply…" style="width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--ink);font-family:inherit;font-size:13.5px;resize:vertical;margin-bottom:8px"></textarea>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-primary" style="padding:6px 14px;font-size:12px" data-action="esc-reply" data-id="${e.id}">Send &amp; mark handled</button>
                <button class="btn btn-ghost" style="padding:6px 14px;font-size:12px" data-action="esc-resolve" data-id="${e.id}">Mark handled, no reply</button>
              </div>` : `
              <div style="font-size:13px;color:var(--ink-3);margin-bottom:8px">No ${channelForReply === 'email' ? 'email' : 'phone number'} on file for this contact — handle it your own way, then clear it here.</div>
              <button class="btn btn-primary" style="padding:6px 14px;font-size:12px" data-action="esc-resolve" data-id="${e.id}">Mark handled</button>`}
            </div>
          </div>`;
        }).join('') + '</div>';
      }
      if (apprs.length){
        html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:24px;margin-bottom:12px">'
             + '<span class="section-eyebrow" style="margin:0">Ready to send — just say OK · ' + apprs.length + '</span>'
             + (apprs.length > 1
                ? '<span style="display:flex;gap:8px">'
                  + '<button class="btn btn-primary" style="padding:6px 14px;font-size:12px" data-action="bulk-approve">Send all ' + apprs.length + '</button>'
                  + '<button class="btn btn-ghost" style="padding:6px 14px;font-size:12px" data-action="bulk-reject">Reject all</button>'
                  + '</span>'
                : '')
             + '</div>';
        html += '<div class="rows">' + apprs.map(m => `
          <div class="row-card" data-draft-id="${m.id}" style="cursor:default;align-items:flex-start;flex-wrap:wrap">
            <div class="text" style="flex:1;min-width:200px">
              <b>${escapeHTML(m.patient)}${m.touch_label ? ` <span style="font-weight:600;font-size:11px;color:var(--ink-3);background:rgba(124,58,237,.12);border:1px solid var(--border);border-radius:999px;padding:2px 9px;vertical-align:1px;white-space:nowrap">${escapeHTML(m.touch_label)}</span>` : ''}</b>
              ${m.subject ? `<span style="color:var(--ink);font-weight:600">${escapeHTML(m.subject)}</span>` : ''}
              <span data-draft-preview data-action="draft-edit" data-id="${m.id}" style="cursor:text" title="Click to edit before sending">${escapeHTML((m.body||'').slice(0,220))}</span>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="btn btn-primary" style="padding:6px 12px;font-size:12px" data-action="draft-approve" data-id="${m.id}">Send</button>
              <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" data-action="draft-edit" data-id="${m.id}">Edit</button>
              <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" data-action="draft-reject" data-id="${m.id}">Reject</button>
            </div>
            <div data-draft-editor hidden style="flex-basis:100%;margin-top:10px">
              <textarea class="sform-input" rows="5" style="resize:vertical;font-size:13px">${escapeHTML(m.body || '')}</textarea>
              <div style="display:flex;gap:6px;margin-top:8px">
                <button class="btn btn-primary" style="padding:6px 12px;font-size:12px" data-action="draft-save-send" data-id="${m.id}">Save &amp; Send</button>
                <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" data-action="draft-edit-cancel">Cancel</button>
              </div>
            </div>
          </div>`).join('') + '</div>';
      }
    }
    main.innerHTML = html;
    renderLucide(main);

    async function approveDraft(id, btn, editedBody){
      btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Sending…';
      try {
        await api(`/api/v1/approvals/${id}/approve`, { method:'POST', body: JSON.stringify(editedBody != null ? {edited_body: editedBody} : {}) });
        toast('Sent');
        load();
      } catch(e){
        toast('Could not send', true);
        btn.disabled = false; btn.textContent = orig;
      }
    }
    main.querySelectorAll('[data-action="draft-approve"]').forEach(btn => {
      btn.addEventListener('click', () => approveDraft(btn.dataset.id, btn, null));
    });
    const bulkA = main.querySelector('[data-action="bulk-approve"]');
    if (bulkA) bulkA.addEventListener('click', async () => {
      if (!confirm('Send all ' + apprs.length + ' drafts as written? Read them first — this is the whole batch.')) return;
      bulkA.disabled = true;
      let ok = 0, fail = 0;
      for (const m of apprs){
        bulkA.textContent = 'Sending ' + (ok + fail + 1) + '/' + apprs.length + '…';
        try { await api(`/api/v1/approvals/${m.id}/approve`, {method:'POST', body: JSON.stringify({})}); ok++; }
        catch(_){ fail++; }
      }
      toast(ok + ' sent' + (fail ? ', ' + fail + ' failed' : ''));
      renderInboxView();
    });
    const bulkR = main.querySelector('[data-action="bulk-reject"]');
    if (bulkR) bulkR.addEventListener('click', async () => {
      if (!confirm('Reject all ' + apprs.length + ' drafts? Nothing will send; Adapix takes the hint.')) return;
      bulkR.disabled = true;
      let done = 0;
      for (const m of apprs){
        bulkR.textContent = 'Rejecting ' + (++done) + '/' + apprs.length + '…';
        try { await api(`/api/v1/approvals/${m.id}/reject`, {method:'POST', body: JSON.stringify({})}); } catch(_){}
      }
      toast('All rejected');
      renderInboxView();
    });
    // Escalations: toggle the inline reply/resolve panel, then act.
    main.querySelectorAll('[data-action="esc-toggle"]').forEach(row => {
      row.addEventListener('click', () => {
        const editor = row.querySelector('[data-esc-editor]');
        if (editor) editor.hidden = !editor.hidden;
        if (editor && !editor.hidden){
          const ta = editor.querySelector('[data-esc-reply]');
          if (ta) ta.focus();
        }
      });
    });
    main.querySelectorAll('[data-action="esc-resolve"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Marking…';
        try {
          await api(`/api/v1/escalations/${btn.dataset.id}/resolve`, {method:'POST', body: JSON.stringify({})});
          toast('Marked handled');
          refreshFeed();
        } catch(e){ toast('Could not mark handled', true); btn.disabled = false; btn.textContent = orig; }
      });
    });
    main.querySelectorAll('[data-action="esc-reply"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const editor = btn.closest('[data-esc-editor]');
        const ta = editor ? editor.querySelector('[data-esc-reply]') : null;
        const body = ta ? ta.value.trim() : '';
        if (!body){ toast('Write a reply first', true); return; }
        btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Sending…';
        try {
          await api(`/api/v1/escalations/${btn.dataset.id}/reply`, {method:'POST', body: JSON.stringify({body})});
          toast('Sent — marked handled');
          refreshFeed();
        } catch(e){ toast(e.message || 'Could not send', true); btn.disabled = false; btn.textContent = orig; }
      });
    });

    // Edit before sending — the approve endpoint has always accepted an
    // edited_body; this finally puts that control in the owner's hands.
    main.querySelectorAll('[data-action="draft-edit"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('[data-draft-id]');
        const editor = card.querySelector('[data-draft-editor]');
        editor.hidden = !editor.hidden;
        if (!editor.hidden) editor.querySelector('textarea').focus();
      });
    });
    main.querySelectorAll('[data-action="draft-edit-cancel"]').forEach(btn => {
      btn.addEventListener('click', () => { btn.closest('[data-draft-editor]').hidden = true; });
    });
    main.querySelectorAll('[data-action="draft-save-send"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const editor = btn.closest('[data-draft-editor]');
        const text = editor.querySelector('textarea').value.trim();
        if (!text) { toast('Message is empty', true); return; }
        approveDraft(btn.dataset.id, btn, text);
      });
    });
    main.querySelectorAll('[data-action="draft-reject"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        try {
          await api(`/api/v1/approvals/${id}/reject`, { method:'POST', body: JSON.stringify({}) });
          toast('Draft rejected');
          load();
        } catch(e){ toast('Could not reject', true); }
      });
    });
  }

  // -------- RESULTS view (stats dashboard + activity) --------
  // -------- CALLS view --------
  async function renderCallsView(){
    main.innerHTML = '<div class="loader">loading…</div>';

    let calls;
    try { calls = await api('/api/v1/calls'); }
    catch(_){ calls = { pending: [], history: [] }; }
    state.calls = calls;

    if (!state.patients){
      try { state.patients = (await api('/api/v1/patients')).patients || []; }
      catch(_){ state.patients = []; }
    }
    const callable = state.patients.filter(p => p.phone);

    const contactOptions = callable.length
      ? callable.map(p => `<option value="${p.id}">${escapeHTML((p.first_name||'')+' '+(p.last_name||''))} — ${escapeHTML(p.phone)}</option>`).join('')
      : '<option value="">No contacts with a phone number yet</option>';

    const pendingRows = calls.pending.length
      ? calls.pending.map(c => `
        <div class="row-card" data-call-id="${c.id}">
          <div class="text">
            <b>${escapeHTML(c.patient)}</b>
            <span>Goal: ${escapeHTML((c.goal||'').slice(0,160))}</span>
          </div>
          <span class="pill">awaiting approval</span>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-primary" style="padding:6px 12px;font-size:12px" data-action="call-approve" data-id="${c.id}">Approve &amp; call</button>
            <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" data-action="call-reject" data-id="${c.id}">Reject</button>
          </div>
        </div>`).join('')
      : '<div class="activity-empty">No calls waiting on you right now.</div>';

    const historyRows = calls.history.length
      ? calls.history.map(c => {
          const placed = c.direction === 'outbound';
          const icon = placed ? 'phone-outgoing' : (c.status === 'failed' ? 'phone-off' : 'phone-incoming');
          const label = placed
            ? (c.status === 'failed' ? 'Call could not be placed' : 'Call placed — goal: ' + (c.goal||'').slice(0,120))
            : (c.summary || 'Call ended');
          const hasRecording = !placed && c.recording_url;
          const hasTranscript = !placed && c.transcript;
          const extras = (hasRecording || hasTranscript) ? `
            <div class="call-recording" id="rec-${c.id}">
              ${hasRecording ? `<audio controls preload="none" src="${escapeHTML(c.recording_url)}" style="width:100%;height:32px;margin-top:8px"></audio>` : ''}
              ${hasTranscript ? `
                <button class="call-transcript-toggle" data-toggle="tr-${c.id}">Show transcript</button>
                <div class="call-transcript" id="tr-${c.id}" hidden>${escapeHTML(c.transcript)}</div>` : ''}
            </div>` : '';
          return `
          <div class="activity-row activity-${placed ? (c.status==='failed'?'call_failed':'call_placed') : 'call_outcome'}" style="flex-direction:column;align-items:stretch">
            <div style="display:flex;align-items:center;gap:10px">
              <div class="activity-icon"><i data-lucide="${icon}"></i></div>
              <div class="activity-body">
                <div class="activity-label">${escapeHTML(c.patient)}</div>
                <div class="activity-preview">${escapeHTML(label)}</div>
              </div>
              <div class="activity-ts">${c.created_at ? timeAgo(new Date(c.created_at)) : ''}</div>
            </div>
            ${extras}
          </div>`;
        }).join('')
      : '<div class="activity-empty">No calls yet — queue one above to get started.</div>';

    main.innerHTML = `
      <div class="section-eyebrow">Calls</div>

      <div class="scard" style="margin-bottom:20px">
        <div class="scard-title">Queue a call</div>
        <div class="sform-row">
          <label class="sform-label">Who to call</label>
          <select class="sform-input sform-select" id="cv-contact">${contactOptions}</select>
        </div>
        <div class="sform-row">
          <label class="sform-label">What should the call accomplish?</label>
          <textarea class="sform-input" id="cv-goal" rows="2" placeholder="e.g. Follow up on their quote, answer questions, and offer to book a time."></textarea>
          <div class="sform-hint">This is the plan you're approving — Adapix can't have a live call approved word-by-word, so you approve the goal up front and review what happened afterward.</div>
        </div>
        <button class="sform-save" id="cv-queue">Queue call</button>
      </div>

      <div class="section-eyebrow" style="margin-bottom:12px">Awaiting your approval · ${calls.pending.length}</div>
      <div class="rows" id="cv-pending" style="margin-bottom:24px">${pendingRows}</div>

      <div class="section-eyebrow" style="margin-bottom:12px">Recent calls</div>
      <div class="activity-feed" id="cv-history">${historyRows}</div>
    `;
    renderLucide(main);

    main.querySelector('#cv-queue').addEventListener('click', async () => {
      const patientId = main.querySelector('#cv-contact').value;
      const goal = main.querySelector('#cv-goal').value.trim();
      if (!patientId) { toast('Add a contact with a phone number first', true); return; }
      if (!goal) { toast('Describe what the call should accomplish', true); return; }
      const btn = main.querySelector('#cv-queue');
      btn.disabled = true; btn.textContent = 'Queuing…';
      try {
        await api('/api/v1/calls/queue', { method:'POST', body: JSON.stringify({ patient_id: Number(patientId), goal }) });
        toast('Call queued — approve it below to place it');
        renderCallsView();
      } catch(e){
        toast('Could not queue the call', true);
        btn.disabled = false; btn.textContent = 'Queue call';
      }
    });

    main.querySelectorAll('[data-action="call-approve"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        btn.disabled = true; btn.textContent = 'Calling…';
        try {
          await api(`/api/v1/approvals/${id}/approve`, { method:'POST', body: JSON.stringify({}) });
          toast('Placing the call now');
          renderCallsView();
        } catch(e){
          toast('Could not place the call', true);
          btn.disabled = false; btn.textContent = 'Approve & call';
        }
      });
    });
    main.querySelectorAll('[data-action="call-reject"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        try {
          await api(`/api/v1/approvals/${id}/reject`, { method:'POST', body: JSON.stringify({}) });
          toast('Call plan rejected');
          renderCallsView();
        } catch(e){ toast('Could not reject', true); }
      });
    });

    main.querySelectorAll('.call-transcript-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = document.getElementById(btn.dataset.toggle);
        if (!panel) return;
        const show = panel.hidden;
        panel.hidden = !show;
        btn.textContent = show ? 'Hide transcript' : 'Show transcript';
      });
    });
  }

  // -------- CONTACTS / PATIENTS view --------
  async function renderPatientsView(){
    if (state.contactsPage === 'import') { renderContactsImport(); return; }
    if (state.contactsPage === 'add')    { renderContactAdd(); return; }

    if (!state.contactsSearch) main.innerHTML = '<div class="loader">loading…</div>';
    try {
      const qs = state.contactsSearch ? ('?q=' + encodeURIComponent(state.contactsSearch)) : '';
      const j = await fetch('/api/v1/patients' + qs, {credentials:'include'}).then(r=>r.json());
      state.patients = j.patients || [];
    } catch(_){ state.patients = []; }

    const addBtn = `<button id="go-add" class="btn btn-primary" style="padding:8px 16px;font-size:13px"><i data-lucide="user-plus" style="width:15px;height:15px"></i>Add contact</button>`;
    const importBtn = `<button id="go-import" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--ink-2);font-size:13px;font-weight:600;cursor:pointer"><i data-lucide="upload" style="width:15px;height:15px"></i>Import CSV</button>`;
    const actionBtns = `<div style="display:flex;gap:8px">${addBtn}${importBtn}</div>`;
    const searchBox = `<input id="contacts-search" value="${escapeHTML(state.contactsSearch||'')}" placeholder="Search name, phone, email…" style="width:100%;max-width:340px;background:var(--bg-2);border:1px solid var(--border);border-radius:9px;padding:9px 13px;color:var(--ink);font-family:inherit;font-size:13.5px;margin-bottom:16px" />`;

    if (!state.patients.length && !state.contactsSearch){
      main.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div class="section-eyebrow" style="margin:0">Contacts</div>
          ${actionBtns}
        </div>
        <div class="empty-row" style="text-align:center;padding:48px 24px">
          <div style="font-size:32px;margin-bottom:12px;opacity:.3">👤</div>
          <div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:6px">No contacts yet</div>
          <div style="font-size:13px;color:var(--ink-2);margin-bottom:20px">Add someone and Adapix starts following up for you — automatically.</div>
          <button id="go-add-empty" class="btn btn-primary" style="margin:0 auto"><i data-lucide="user-plus" style="width:15px;height:15px"></i>Add your first contact</button>
        </div>`;
    } else {
      const statusColors = {consulted_not_started:'var(--warn)',treatment_started:'var(--good)',explicitly_declined:'var(--hot)',paused:'var(--ink-3)'};
      main.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
          <div class="section-eyebrow" style="margin:0">Contacts · ${state.patients.length}</div>
          ${actionBtns}
        </div>
        ${searchBox}
        ${!state.patients.length ? `<div style="text-align:center;padding:32px 20px;color:var(--ink-2);font-size:13.5px">No contacts match "${escapeHTML(state.contactsSearch)}"</div>` : ''}
        <div class="rows">${state.patients.slice(0,200).map(p => `
          <div class="row-card" style="cursor:default">
            <div class="text">
              <b>${escapeHTML((p.first_name||'') + ' ' + (p.last_name||''))}</b>${p.needs_attention ? ` <span title="No reply in ${p.silent_days} days" style="font-size:11px;font-weight:700;color:#fda4af;background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.3);border-radius:999px;padding:2px 9px;vertical-align:1px;white-space:nowrap">Quiet ${p.silent_days}d</span>` : ''}
              <span>${escapeHTML(p.preferred_channel||'sms')}${p.treatment_type ? ' · ' + escapeHTML(p.treatment_type) : ''}${p.treatment_plan_amount ? ' · $' + Number(p.treatment_plan_amount).toLocaleString() : ''}</span>
            </div>
            <span class="pill" style="color:${statusColors[p.status]||'var(--ink-3)'};">${escapeHTML(statusLabel(p.status))}</span>
            ${p.status !== 'treatment_started' ? `<button class="btn btn-ghost" style="padding:5px 11px;font-size:12px;flex-shrink:0;border-color:rgba(52,211,153,.35);color:#6ee7b7" data-action="mark-won" data-id="${p.id}" data-name="${escapeHTML((p.first_name||'') + ' ' + (p.last_name||''))}" data-amount="${p.treatment_plan_amount || ''}">Won \u2713</button>` : ''}
          </div>`).join('')}
        </div>`;
    }
    renderLucide(main);
    const wire = (id, fn) => { const el = main.querySelector('#'+id); if (el) el.addEventListener('click', fn); };
    main.querySelectorAll('[data-action="mark-won"]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const suggested = btn.dataset.amount || '';
        const raw = prompt('Nice. Roughly how much is this job worth? (numbers only)', suggested);
        if (raw === null) return;
        const amount = parseFloat(String(raw).replace(/[^0-9.]/g, ''));
        btn.disabled = true;
        try {
          await api('/api/v1/wins', {method:'POST', body: JSON.stringify({patient_id: Number(btn.dataset.id), amount: isNaN(amount) ? null : amount})});
          toast('Logged \u2014 ' + btn.dataset.name.trim() + ' marked as won' + (isNaN(amount) ? '' : ' \u00b7 $' + Math.round(amount).toLocaleString()));
          renderPatientsView();
        } catch(_){ toast('Could not log the win', true); btn.disabled = false; }
      });
    });
    const searchInput = main.querySelector('#contacts-search');
    if (searchInput){
      let searchTimer = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        const val = searchInput.value;
        searchTimer = setTimeout(() => { state.contactsSearch = val; renderPatientsView(); }, 300);
      });
      // Every render replaces this input node, which drops focus mid-typing —
      // restore it and put the cursor back at the end.
      if (state.contactsSearchFocused){
        searchInput.focus();
        const len = searchInput.value.length;
        searchInput.setSelectionRange(len, len);
      }
      searchInput.addEventListener('focus', () => { state.contactsSearchFocused = true; });
      searchInput.addEventListener('blur', () => { state.contactsSearchFocused = false; });
    }
    wire('go-import',    () => goContactsView('import'));
    wire('go-add',       () => goContactsView('add'));
    wire('go-add-empty', () => goContactsView('add'));
  }

  function goContactsView(page){
    state.contactsPage = page;
    renderPatientsView();
  }

      if (!payload.first_name && !payload.last_name) { toast('Add a name first', true); return; }

        btn.disabled = false; btn.textContent = 'Add contact';

      }
    });
  }

  function renderContactsImport(){
    main.innerHTML = `
      <button class="spage-back" id="ci-back">← Contacts</button>
      <div class="spage-head">
        <div class="spage-title">Import contacts</div>
        <div class="spage-sub">Upload a spreadsheet of your contacts and Adapix starts following up automatically. All it needs is a name, plus a phone number or email.</div>
      </div>

      <div class="scard" style="margin-bottom:16px">

    async function handleFile(file){
      if (!file || !file.name.toLowerCase().endsWith('.csv')){ toast('Please select a .csv file'); return; }
      pendingFile = file;
      dropzone.style.opacity = '.4';
      dropzone.style.pointerEvents = 'none';

      const fd = new FormData();
      fd.append('file', file);
      fd.append('preview', 'true');

      try {
        const j = await fetch('/api/v1/contacts/import', {method:'POST', credentials:'include', body:fd}).then(r=>r.json());
        const rows = j.preview || [];
        const total = j.total || 0;
        const cols = (j.columns || []).filter(c => c);

        previewTitle.textContent = total + ' contact' + (total !== 1 ? 's' : '') + ' found';
        importBtn.textContent = 'Import ' + total + ' contact' + (total !== 1 ? 's' : '') + ' →';

        const th = cols.map(c => `<th>${escapeHTML(c)}</th>`).join('');
        const trs = rows.map(r => `<tr>${cols.map(c => `<td>${escapeHTML(r[c]||'')}</td>`).join('')}</tr>`).join('');
        previewTable.innerHTML = `<table class="ci-table"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`
          + (total > 5 ? `<div style="padding:8px 10px;font-size:11px;color:var(--ink-3)">Showing first 5 of ${total} rows</div>` : '');

        uploadCard.style.display = 'none';
        previewCard.style.display = 'block';
      } catch(e){
        toast('Could not read CSV — check the file format');
        dropzone.style.opacity = '';
        dropzone.style.pointerEvents = '';
      }
    }

    importBtn.addEventListener('click', async () => {
      if (!pendingFile) return;
      importBtn.textContent = 'Importing…';
      importBtn.disabled = true;

      const fd = new FormData();
      fd.append('file', pendingFile);
      fd.append('preview', 'false');
      const chaseEl = main.querySelector('#ci-chase');
      fd.append('chase', chaseEl && !chaseEl.checked ? 'none' : 'all');

      try {
        const j = await fetch('/api/v1/contacts/import', {method:'POST', credentials:'include', body:fd}).then(r=>r.json());
        previewCard.style.display = 'none';
        successEl.style.display = 'block';
        main.querySelector('#ci-success-count').textContent = j.imported + ' contact' + (j.imported !== 1 ? 's' : '') + ' imported'
          + (j.duplicates ? ' \u00b7 ' + j.duplicates + ' already existed (skipped)' : '');
        if (j.errors && j.errors.length) toast(j.errors.length + ' row(s) skipped — check format');
      } catch(e){
        toast('Import failed — please try again');
        importBtn.textContent = 'Import contacts →';
        importBtn.disabled = false;
      }
    });

    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });

    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
  }

      const thread = document.getElementById('agent-thread');

    // --- Pending file attachments ---
    let pendingFiles = [];

    function renderAgentFileChips(){
      const row = document.getElementById('agent-file-preview');

      pendingFiles.forEach((pf, i) => {
        const chip = document.createElement('div');

        pendingFiles.push(pf);
      });
      fileInput.value = '';
      renderAgentFileChips();

    // --- Voice (Web Speech API) ---
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    const voiceOverlay = document.getElementById('voice-overlay');
    const voiceLabel = voiceOverlay ? voiceOverlay.querySelector('.voice-label') : null;

    function voiceError(msg) {
      if (voiceLabel) voiceLabel.textContent = msg;
      if (voiceOverlay) {
        voiceOverlay.removeAttribute('hidden');
        setTimeout(() => {
          voiceOverlay.setAttribute('hidden', '');
          if (voiceLabel) voiceLabel.textContent = 'Listening…';
        }, 3000);
      }
    }

    function stopVoice() {
      try { if (recognition) recognition.stop(); } catch(_) {}
      recognition = null;
      micBtn.dataset.state = 'idle';
      micBtn.setAttribute('aria-label', 'Voice input');
      if (voiceOverlay) voiceOverlay.setAttribute('hidden', '');
      if (voiceLabel) voiceLabel.textContent = 'Listening…';
    }

    if (!SpeechRec) {
      micBtn.style.opacity = '0.35';
      micBtn.style.cursor = 'not-allowed';
      micBtn.title = 'Voice input not supported in this browser (use Chrome or Edge)';
    } else {
      micBtn.addEventListener('click', () => {
        if (micBtn.dataset.state === 'listening') { stopVoice(); return; }

        recognition = new SpeechRec();
        recognition.continuous = true;      // keep listening until user stops
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        let baseLen = input.value.length;  // where to splice in new text
        let finalTranscript = '';

        micBtn.dataset.state = 'listening';
        micBtn.setAttribute('aria-label', 'Stop recording');
        if (voiceLabel) voiceLabel.textContent = 'Listening…';
        if (voiceOverlay) voiceOverlay.removeAttribute('hidden');

        recognition.onresult = (e) => {
          let interim = '';
          // Only process new results (from resultIndex onward)
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
            else interim = e.results[i][0].transcript;
          }
          input.value = input.value.substring(0, baseLen) + finalTranscript + interim;
          input.dispatchEvent(new Event('input'));
        };

        recognition.onend = () => {
          // In continuous mode onend fires on stop() or network drop
          if (micBtn.dataset.state === 'listening') stopVoice();
        };

        recognition.onerror = (e) => {
          const MSGS = {
            'not-allowed':         'Microphone access denied — check browser permissions',
            'service-not-allowed': 'Speech service blocked — try Chrome on localhost',
            'no-speech':           'No speech detected — try speaking louder',
            'network':             'Network error — speech API needs internet',
            'audio-capture':       'No microphone found',
          };
          if (e.error !== 'aborted') voiceError(MSGS[e.error] || `Mic error: ${e.error}`);
          stopVoice();
        };

        try { recognition.start(); }
        catch(err) { voiceError('Could not start microphone: ' + err.message); stopVoice(); }
      });
    }

    // Voice stop button
    if (voiceOverlay) {
      voiceOverlay.querySelector('.voice-stop-btn')?.addEventListener('click', stopVoice);
    }

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';

    });

    input.addEventListener('keydown', e => {

    sendBtn.addEventListener('click', sendAgentMessage);

    async function sendAgentMessage(){
      const text = input.value.trim();
      if (!text && !pendingFiles.length) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      const thread = document.getElementById('agent-thread');
      thread.querySelector('.agent-empty-thread')?.remove();

      // Show user bubble with attachment badges
      const fileNames = pendingFiles.map(f => f.file.name);
      appendBubble(thread, 'user', text || '(attachment)', null, null, null, fileNames);

      // Build FormData (supports files)
      const fd = new FormData();
      fd.append('message', text);
      pendingFiles.forEach(pf => fd.append('files', pf.file));
      pendingFiles = [];
      renderAgentFileChips();

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      thread.appendChild(typing);
      thread.scrollTop = thread.scrollHeight;

      try {
        const r = await fetch('/api/v1/team-agents/' + slug + '/chat/send', {
          method: 'POST',
          credentials: 'include',
          body: fd,
        });
        const j = await r.json();
        typing.remove();
        appendBubble(thread, 'agent', j.reply || j.detail || 'Error', j.tools_used, j.document_path, slug);
      } catch(e) {
        typing.remove();
        appendBubble(thread, 'agent', 'Something went wrong — please try again.');
      } finally {
        sendBtn.disabled = false;
        thread.scrollTop = thread.scrollHeight;
        input.focus();
      }
    }

    async function loadAgentHistory(slug){
      try {
        const r = await fetch('/api/v1/team-agents/' + slug + '/chat/history', {credentials:'include'});
        const j = await r.json();
        const msgs = j.messages || [];
        if (!msgs.length) return;
        const thread = document.getElementById('agent-thread');
        thread.innerHTML = '';
        msgs.forEach(m => appendBubble(thread, m.role === 'user' ? 'user' : 'agent', m.content, m.tools_used));
        thread.scrollTop = thread.scrollHeight;
      } catch(_){}
    }

    function appendBubble(thread, role, text, toolsUsed, documentPath, slug, attachmentNames){
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap ' + role;
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      if (role === 'agent' && window.marked) {
        div.innerHTML = marked.parse(text || '');
      } else {
        div.textContent = text;
      }
      wrap.appendChild(div);
      if (role === 'agent' && toolsUsed && toolsUsed.length) {
        const bar = document.createElement('div');
        bar.className = 'tools-used-bar';
        bar.innerHTML = toolsUsed.map(t => `<span class="tool-tag">${escapeHTML(t)}</span>`).join('');
        wrap.appendChild(bar);
      }
      if (documentPath) {
        const dl = document.createElement('a');
        dl.className = 'doc-download-link';
        dl.href = '/api/v1/team-agents/' + (slug||'') + '/documents/' + encodeURIComponent(documentPath);
        dl.textContent = '📄 ' + documentPath;
        dl.target = '_blank';
        wrap.appendChild(dl);
      }
      // Attachment badges on user bubbles
      if (role === 'user' && attachmentNames && attachmentNames.length) {
        attachmentNames.forEach(name => {
          const badge = document.createElement('div');
          badge.className = 'chat-attachment-badge';
          badge.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${escapeHTML(name)}`;
          wrap.appendChild(badge);
        });
      }
      thread.appendChild(wrap);
    }

    input.focus();
  }

  async function loadAutomations(){
    const r = await fetch('/api/v1/automations', {credentials:'include'});
    if (!r.ok) return [];
    return (await r.json()).automations || [];
  }

  function cronToHuman(cron){
    try {
      const parts = cron.split(' ');
      if (parts.length < 5) return cron;
      const [min, hr, dom, , dow] = parts;
      if (hr === '*') return 'Every hour';
      const h = parseInt(hr), m = parseInt(min);
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const time = h12 + ':' + (m < 10 ? '0'+m : String(m)) + ' ' + ampm;
      if (dow === '1-5') return 'Weekdays at ' + time;
      if (dow !== '*'){
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        return 'Every ' + (days[parseInt(dow)] || dow) + ' at ' + time;
      }
      if (dom !== '*') return 'Monthly, day ' + dom + ' at ' + time;
      return 'Daily at ' + time;
    } catch(_){ return cron; }
  }

  function timeAgo(iso){
    if (!iso) return 'Never';
    const ms = Date.now() - new Date(iso).getTime();
    const s = Math.floor(ms/1000);
    if (s < 60) return 'Just now';
    const m = Math.floor(s/60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m/60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
  }

  function detectPreset(cron){
    try {
      const [min, hr, dom, , dow] = (cron||'0 9 * * *').split(' ');
      if (hr === '*') return { preset:'hourly', hour:'9', minute:'00', ampm:'AM' };
      const h = parseInt(hr), m = parseInt(min);
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const mm = m < 10 ? '0'+m : String(m);
      if (dow === '1-5') return { preset:'weekdays', hour:String(h12), minute:mm, ampm };
      if (dow === '1')   return { preset:'mon',      hour:String(h12), minute:mm, ampm };
      if (dom !== '*')   return { preset:'monthly',  hour:String(h12), minute:mm, ampm };
      if (dow === '*')   return { preset:'daily',    hour:String(h12), minute:mm, ampm };
      return { preset:'custom', hour:'9', minute:'00', ampm:'AM', customCron: cron };
    } catch(_){
      return { preset:'daily', hour:'9', minute:'00', ampm:'AM' };
    }
  }

  function buildCronFromModal(){
    const preset = (document.getElementById('am-selected-preset')||{}).value || 'daily';
    if (preset === 'hourly') return '0 * * * *';
    if (preset === 'custom'){
      return ((document.getElementById('am-custom-cron-val')||{}).value||'').trim() || '0 9 * * *';
    }
    const hr12 = Math.min(12, Math.max(1, parseInt(((document.getElementById('am-hour')||{}).value)||'9') || 9));
    const m    = Math.min(59, Math.max(0,  parseInt(((document.getElementById('am-min')||{}).value)||'0')  || 0));
    const ampm = ((document.getElementById('am-ampm')||{}).value) || 'AM';
    const hr24 = ampm === 'PM' ? (hr12 === 12 ? 12 : hr12 + 12) : (hr12 === 12 ? 0 : hr12);
    if (preset === 'daily')    return m+' '+hr24+' * * *';
    if (preset === 'weekdays') return m+' '+hr24+' * * 1-5';
    if (preset === 'mon')      return m+' '+hr24+' * * 1';
    if (preset === 'monthly')  return m+' '+hr24+' 1 * *';
    return m+' '+hr24+' * * *';
  }

      +   '</div>'

      + '</div>'

        btn.classList.add('selected');

  async function handlePluginAction(key, action){
    if (action === 'help'){
      toast('Add credentials to your .env file, then restart the server.');
      return;
    }
    if (action === 'connect'){
      const path = key === 'google'
        ? '/api/v1/oauth/google/start'
        : key === 'microsoft' ? '/api/v1/oauth/microsoft/start' : null;
      if (!path) { toast('This plug-in does not need a connect step.'); return; }
      const r = await fetch(path, {credentials:'include'}).then(r => r.json());
      if (r.url) window.location.href = r.url;
      return;
    }
    if (action === 'test'){
      toast('Sending test message for ' + key + '…');
      try {
        const r = await fetch('/api/v1/' + key + '/test', {
          method: 'POST',
          credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({to: 'test@adapix.com'}),
        });
        const j = await r.json().catch(()=>({}));
        if (r.ok) toast(key + ' test sent successfully.');
        else toast('Test failed: ' + (j.detail || r.status));
      } catch(e) {
        toast('Test failed — check that ' + key + ' credentials are set in .env');
      }
      return;
    }
  }

  // Settings -> Business profile: website import (read site -> review -> apply)
  async function initWebsiteImport(){
    const urlIn = document.getElementById('wi-url');
    const start = document.getElementById('wi-start');
    const status = document.getElementById('wi-status');
    const review = document.getElementById('wi-review');
    const preview = document.getElementById('wi-preview');
    const apply = document.getElementById('wi-apply');
    if (!urlIn || !start) return;
    let pollTimer = null;

    function paint(j){
      review.style.display = 'none';
      if (j.url && !urlIn.value) urlIn.value = j.url;
      if (j.status === 'running'){
        status.innerHTML = '<b style="color:var(--violet, #a78bfa)">Reading your website\u2026</b> this usually takes under a minute.';
        if (!pollTimer) pollTimer = setInterval(refresh, 5000);
        return;
      }
      if (pollTimer){ clearInterval(pollTimer); pollTimer = null; }
      if (j.status === 'failed'){
        status.innerHTML = '<b style="color:#fbbf24">Couldn\u2019t read the site.</b> ' + escapeHTML(j.error || '') + ' \u2014 check the address and try again.';
      } else if (j.status === 'ready'){
        const pv = j.preview || {};
        status.textContent = '';
        preview.innerHTML = '<b style="color:var(--ink)">Here\u2019s what Adapix found:</b><br>' +
          (pv.business_name ? 'Business: <b style="color:var(--ink)">' + escapeHTML(pv.business_name) + '</b><br>' : '') +
          (pv.phone ? 'Phone: ' + escapeHTML(pv.phone) + '<br>' : '') +
          (pv.hours ? 'Hours: ' + escapeHTML(pv.hours) + '<br>' : '') +
          (pv.description ? escapeHTML(pv.description) + '<br>' : '') +
          pv.services + ' services with pricing \u00b7 ' + pv.knowledge + ' FAQ answers' +
          '<br><span style="color:var(--ink-3)">Applying only fills blanks and adds new items \u2014 anything you\u2019ve already taught stays as-is. You can edit everything in the Database tab after.</span>';
        review.style.display = '';
      } else if (j.status === 'applied'){
        status.innerHTML = '<b style="color:#34d399">Imported.</b> Review or edit it anytime in the Database tab.';
      } else {
        status.textContent = '';
      }
    }
    async function refresh(){
      try { paint(await api('/api/v1/website-import')); } catch(_){}
    }
    start.addEventListener('click', async () => {
      const url = urlIn.value.trim();
      if (!url){ toast('Enter your website address', true); return; }
      start.disabled = true; start.textContent = 'Starting\u2026';
      try {
        await api('/api/v1/website-import', {method:'POST', body: JSON.stringify({url})});
        toast('Adapix is reading your website');
        refresh();
      } catch(e){ toast(e.message || 'Could not start the import', true); }
      start.disabled = false; start.textContent = 'Read my website';
    });
    apply.addEventListener('click', async () => {
      apply.disabled = true; apply.textContent = 'Adding\u2026';
      try {
        const r = await api('/api/v1/website-import/apply', {method:'POST'});
        toast('Added ' + (r.services_added||0) + ' services and ' + (r.knowledge_added||0) + ' answers from your site');
        refresh();
      } catch(e){ toast('Could not apply the import', true); }
      apply.disabled = false; apply.textContent = 'Add this to my business info';
    });
    refresh();
  }

  // Settings -> Account: live plan status + add-card + cancel
  async function initAccountBilling(){
    const box = document.getElementById('acct-plan');
    const pay = document.getElementById('acct-pay');
    const cancel = document.getElementById('acct-cancel');
    if (!box) return;
    async function refresh(){
      try {
        const j = await api('/api/v1/billing/status');
        if (!j.configured){
          box.innerHTML = 'Billing isn\'t live yet &mdash; you\'re on the free trial and nothing is owed.';
          return;
        }
        if (j.status === 'trialing'){
          box.innerHTML = '<b style="color:#34d399">Free trial active.</b> Your card is on file; the first $99 charge lands when the trial ends.';
          cancel.style.display = '';
        } else if (j.status === 'active'){
          box.innerHTML = '<b style="color:#34d399">Subscription active</b> &mdash; $99/month.';
          cancel.style.display = '';
        } else if (j.status === 'past_due'){
          box.innerHTML = '<b style="color:#fbbf24">Payment problem</b> &mdash; the last charge failed. Update your card to keep Adapix running.';
          pay.style.display = '';
        } else if (j.status === 'canceled'){
          box.innerHTML = 'Subscription canceled. You can restart anytime.';
          pay.textContent = 'Restart subscription';
          pay.style.display = '';
        } else {
          box.innerHTML = 'You\'re on the <b style="color:var(--ink)">free trial</b> with no card on file. Add one so Adapix keeps working when the trial ends.';
          pay.style.display = '';
        }
      } catch(_){ box.textContent = 'Could not load billing status.'; }
    }
    pay.addEventListener('click', async () => {
      pay.disabled = true; pay.textContent = 'Opening secure checkout\u2026';
      try {
        const j = await api('/api/v1/billing/checkout', {method:'POST'});
        if (j.url){ window.location.href = j.url; return; }
        throw new Error('no url');
      } catch(e){ toast('Could not open checkout', true); pay.disabled = false; pay.textContent = 'Add payment method'; }
    });
    cancel.addEventListener('click', async () => {
      if (!confirm('Cancel your subscription? Adapix keeps working until the end of the period you already paid for.')) return;
      cancel.disabled = true;
      try {
        await api('/api/v1/billing/cancel', {method:'POST'});
        toast('Subscription set to cancel at the end of the period');
        refresh();
      } catch(e){ toast('Could not cancel — email us and we\'ll do it by hand', true); }
      cancel.disabled = false;
    });
    refresh();
  }

  // Settings -> Notifications page wiring (elements exist only on that page)
  async function initNotifPage(){
    const status = document.getElementById('notif-status');
    const enable = document.getElementById('notif-enable');
    const test = document.getElementById('notif-test');
    if (!status || !enable) return;
    const supported = ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
    async function refresh(){
      if (!supported){
        status.innerHTML = 'This browser cannot do push notifications. On iPhone: open this site in Safari, tap Share &rarr; <b style="color:var(--ink)">Add to Home Screen</b>, then open Adapix from the new icon and come back here.';
        enable.style.display = 'none';
        return;
      }
      if (Notification.permission === 'denied'){
        status.innerHTML = '<b style="color:#fbbf24">Blocked by the browser.</b> Click the icon next to the address bar &rarr; Notifications &rarr; Allow, then refresh this page.';
        enable.style.display = 'none';
        return;
      }
      let sub = null;
      try { const reg = await window.adapixSwReg(); sub = await reg.pushManager.getSubscription(); } catch(_){}
      if (sub){
        status.innerHTML = '<b style="color:#34d399">Notifications are ON for this device.</b>';
        enable.style.display = 'none';
        test.style.display = '';
      } else {
        status.textContent = 'Notifications are off on this device.';
        enable.style.display = '';
        test.style.display = 'none';
      }
    }
    enable.addEventListener('click', async () => {
      enable.disabled = true; enable.textContent = 'Enabling…';
      try {
        if (Notification.permission !== 'granted'){
          const perm = await Notification.requestPermission();
          if (perm !== 'granted'){ enable.disabled = false; enable.textContent = 'Turn on notifications'; refresh(); return; }
        }
        await window.adapixSubscribePush();
        toast('Notifications on — this device will ping when something needs you');
      } catch(e){ toast('Could not enable: ' + (e.message || e), true); enable.disabled = false; enable.textContent = 'Turn on notifications'; }
      refresh();
    });
    test.addEventListener('click', async () => {
      test.disabled = true;
      try { await api('/api/v1/notify/test', {method:'POST', body: JSON.stringify({})}); toast('Test sent — check your notifications'); }
      catch(e){ toast('Test failed — is this device subscribed?', true); }
      test.disabled = false;
    });
    refresh();
  }

        ${oauthButtons}
        <div id="smtp-form" hidden style="margin-top:16px;max-width:440px">
          <div class="sform-row"><label class="sform-label">Email address</label><input class="sform-input" id="smtp-email" type="email" placeholder="you@icloud.com" autocomplete="email"></div>
          <div class="sform-row">
            <label class="sform-label">App password</label>
            <input class="sform-input" id="smtp-password" type="password" placeholder="app-specific password" autocomplete="off">
            <div class="sform-hint">Not your normal login password — most providers (iCloud, Yahoo, AOL) have an "app-specific password" you create in your account's security settings.</div>
          </div>
          <div class="sform-2col">
            <div class="sform-row"><label class="sform-label">Mail server</label><input class="sform-input" id="smtp-host" placeholder="auto-detected"></div>
            <div class="sform-row"><label class="sform-label">Port</label><input class="sform-input" id="smtp-port" type="number" value="587"></div>
          </div>
          <button class="sform-save" id="smtp-connect">Connect</button>
        </div>`;
      renderLucide(el);

      const toggle = document.getElementById('smtp-toggle');
      if (toggle) toggle.addEventListener('click', () => {
        const form = document.getElementById('smtp-form');
        form.hidden = !form.hidden;
        if (!form.hidden) document.getElementById('smtp-email').focus();
      });

      // Prefill server/port from the email domain once it's typed
      const emailInput = document.getElementById('smtp-email');
      if (emailInput) emailInput.addEventListener('blur', async () => {
        const v = emailInput.value.trim();
        if (!v.includes('@')) return;
        try {
          const d = await api('/api/v1/email/smtp/detect?email=' + encodeURIComponent(v));
          const hostEl = document.getElementById('smtp-host');
          const portEl = document.getElementById('smtp-port');
          if (hostEl && !hostEl.value) hostEl.value = d.host || '';
          if (portEl && d.port) portEl.value = d.port;
        } catch(_){}
      });

      const connect = document.getElementById('smtp-connect');
      if (connect) connect.addEventListener('click', async () => {
        const val = id => (document.getElementById(id)?.value || '').trim();
        if (!val('smtp-email').includes('@')) { toast('Enter your email address', true); return; }

        connect.disabled = true; connect.textContent = 'Checking the connection…';
        try {
          await api('/api/v1/email/smtp/connect', { method:'POST', body: JSON.stringify({
            email: val('smtp-email'), password: val('smtp-password'),
            host: val('smtp-host'), port: Number(val('smtp-port')) || 587,
          })});
          toast('Email connected');
          loadEmailCard();
        } catch(e){
          toast('Could not connect — check the app password and server', true);
          connect.disabled = false; connect.textContent = 'Connect';
        }
      });
    }
  }

  // Settings → Follow-up rules — real values in, real engine behavior out.
  async function loadRulesPage(){
    let r;
    try { r = await api('/api/v1/rules'); }
    catch(_){ toast('Could not load your rules', true); return; }

    const firstEl = document.getElementById('rules-first');
    const touchesEl = document.getElementById('rules-touches');
    const autoEl = document.getElementById('rules-auto');
    const toneWrap = document.getElementById('rules-tone');
    if (!firstEl || !touchesEl || !autoEl || !toneWrap) return;

    firstEl.value = String(r.first_followup_days);
    touchesEl.value = String(r.max_touches);
    autoEl.checked = !!r.auto_approve;
    let tone = r.tone || 'warm_professional';
    function paintTone(){
      toneWrap.querySelectorAll('.stone-opt').forEach(b => b.classList.toggle('active', b.dataset.tone === tone));
    }
    paintTone();
    toneWrap.querySelectorAll('.stone-opt').forEach(b => b.addEventListener('click', () => { tone = b.dataset.tone; paintTone(); }));

    const saveBtn = document.getElementById('rules-save');
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {
        await api('/api/v1/rules', { method:'POST', body: JSON.stringify({
          first_followup_days: Number(firstEl.value),
          max_touches: Number(touchesEl.value),
          auto_approve: autoEl.checked,
          tone,
        })});
        toast('Rules saved — they apply from the next follow-up pass');
      } catch(_){ toast('Could not save', true); }
      saveBtn.disabled = false; saveBtn.textContent = 'Save changes';
    });
  }

            <div class="sch-icon"><i data-lucide="message-square" style="width:16px;height:16px"></i></div>

          <div class="scard-title">Notify me when</div>
