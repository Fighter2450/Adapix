<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Set a new password — Adapix</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0b1c;--card:#17142e;--ink:#ece9ff;--ink2:#b8b2e0;--ink3:#827aa8;--border:rgba(124,58,237,.22);--purple:#7c3aed;--violet:#a78bfa;--rose:#f43f5e;--cyan:#22d3ee;--green:#34d399}
body{background:var(--bg);color:var(--ink2);font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:34px 30px}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:22px}
.logo img{width:30px;height:30px}.logo span{color:#fff;font-weight:800;font-size:19px;letter-spacing:-.02em}
h1{color:#fff;font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.sub{font-size:14px;color:var(--ink3);margin-bottom:22px;line-height:1.5}
label{display:block;color:var(--ink2);font-size:13px;font-weight:600;margin-bottom:7px}
.input-wrap{position:relative}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:11px;padding:13px 14px;color:#fff;font-size:15px;font-family:inherit;outline:none}
input:focus{border-color:var(--violet)}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink3);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.hint{font-size:12px;color:var(--ink3);margin-top:6px}
.btn{width:100%;margin-top:18px;background:linear-gradient(135deg,var(--purple),var(--rose));color:#fff;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.btn:disabled{opacity:.6;cursor:default}
.msg{margin-top:16px;font-size:13.5px;line-height:1.5;padding:12px 14px;border-radius:10px;display:none}
.msg.ok{display:block;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);color:#a7f3d0}
.msg.err{display:block;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.3);color:#fda4af}
.foot{margin-top:22px;font-size:13.5px;color:var(--ink3);text-align:center}
.foot a{color:var(--violet);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="/static/favicon.svg" alt=""><span>Adapix</span></div>
  <h1>Set a new password</h1>
  <p class="sub">Pick a new password for your account. You'll be signed in with it right away.</p>
  <form id="form" novalidate>
    <label for="password">New password</label>
    <div class="input-wrap">
      <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="8">
      <button type="button" class="pwd-toggle" id="pwd-toggle">Show</button>
    </div>
    <div class="hint">At least 8 characters.</div>
    <button class="btn" type="submit" id="btn">Set new password</button>
  </form>
  <div class="msg" id="msg"></div>
  <div class="foot"><a href="/login">← Back to sign in</a></div>
</div>
<script>
(function(){
  var form=document.getElementById('form'),btn=document.getElementById('btn'),msg=document.getElementById('msg');
  var pwd=document.getElementById('password'),toggle=document.getElementById('pwd-toggle');
  var token=new URLSearchParams(location.search).get('token')||'';
  if(!token){
    form.style.display='none';
    msg.className='msg err';
    msg.innerHTML='This reset link is missing its token. <a href="/forgot-password" style="color:#fda4af;text-decoration:underline">Request a new one</a>.';
  }
  toggle.addEventListener('click',function(){
    var show=pwd.type==='password';pwd.type=show?'text':'password';toggle.textContent=show?'Hide':'Show';
  });
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    btn.disabled=true;btn.textContent='Saving…';msg.className='msg';
    var fd=new FormData();fd.append('token',token);fd.append('password',pwd.value);
    try{
      var r=await fetch(new URL('/auth/reset',document.baseURI).href,{method:'POST',body:fd});
      if(r.ok){
        msg.className='msg ok';msg.textContent='Password updated! Taking you to sign in…';
        form.style.display='none';
        setTimeout(function(){location.href='/login';},1600);
      }else{
        var d=await r.json().catch(function(){return{};});
        msg.className='msg err';msg.textContent=(d&&d.detail)||'Something went wrong. Please try again.';
        btn.disabled=false;btn.textContent='Set new password';
      }
    }catch(_){
      msg.className='msg err';msg.textContent='Network error. Please try again.';
      btn.disabled=false;btn.textContent='Set new password';
    }
  });
})();
</script>
</body>
</html>
