<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Documents — Adapix</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0b1c;--card:#17142e;--card2:#211c3d;--ink:#ece9ff;--ink2:#b8b2e0;--ink3:#827aa8;--border:rgba(124,58,237,.22);--purple:#7c3aed;--violet:#a78bfa;--rose:#f43f5e;--cyan:#22d3ee}
body{background:var(--bg);color:var(--ink2);font-family:Inter,system-ui,sans-serif;min-height:100vh;padding:40px 24px 80px}
.wrap{max-width:720px;margin:0 auto}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:26px}
.logo img{width:28px;height:28px}.logo span{color:#fff;font-weight:800;font-size:18px;letter-spacing:-.02em}
h1{color:#fff;font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.sub{font-size:14px;color:var(--ink3);margin-bottom:26px;line-height:1.5}
.back{display:inline-block;margin-bottom:18px;font-size:13.5px;color:var(--violet);text-decoration:none}
.row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px 18px;margin-bottom:10px}
.row .doc{flex:0 0 34px;height:34px;border-radius:9px;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.25);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:15px;font-weight:700}
.row .meta{flex:1;min-width:0}
.row .meta b{color:var(--ink);font-weight:600;font-size:15px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta span{color:var(--ink3);font-size:12.5px}
.dl{flex:0 0 auto;background:linear-gradient(135deg,var(--purple),var(--rose));color:#fff;text-decoration:none;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:700}
.empty,.msg{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:26px 20px;text-align:center;font-size:14px;color:var(--ink3);line-height:1.55}
.msg.err{background:rgba(244,63,94,.07);border-color:rgba(244,63,94,.3);color:#fda4af}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/app">&larr; Back to dashboard</a>
  <div class="logo"><img src="/static/favicon.svg" alt=""><span>Adapix</span></div>
  <h1>Documents</h1>
  <p class="sub">Files generated on your account — newest first. This page is founder-only and isn't linked from the main navigation.</p>
  <div id="list"><div class="empty">Loading…</div></div>
</div>
<script>
(function(){
  var list=document.getElementById('list');
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmt(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }catch(_){ return ''; } }
  fetch('/api/v1/documents',{credentials:'include'})
    .then(function(r){
      if(r.status===404||r.status===401){ throw {kind:'auth'}; }
      if(!r.ok){ throw {kind:'err'}; }
      return r.json();
    })
    .then(function(d){
      var docs=(d&&d.documents)||[];
      if(!docs.length){ list.innerHTML='<div class="empty">No documents yet. Anything Adapix generates will show up here.</div>'; return; }
      list.innerHTML=docs.map(function(x){
        return '<div class="row"><div class="doc">DOC</div>'
          +'<div class="meta"><b>'+esc(x.title)+'</b><span>'+fmt(x.created_at)+(x.size_kb?(' · '+x.size_kb+' KB'):'')+'</span></div>'
          +'<a class="dl" href="'+esc(x.url)+'">Download</a></div>';
      }).join('');
    })
    .catch(function(e){
      if(e&&e.kind==='auth'){ list.innerHTML='<div class="msg err">This page is for the account owner. <a href="/login" style="color:#fda4af;text-decoration:underline">Sign in</a>.</div>'; }
      else{ list.innerHTML='<div class="msg err">Couldn\'t load documents. Try again in a moment.</div>'; }
    });
})();
</script>
</body>
</html>
